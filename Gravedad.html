<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravity Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-cad: #cbd5e1;
            --grid-line: #e2e8f0; 
            --grid-dot: #94a3b8;
            --grid-size: 20px;
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
        }
        body {
            margin: 0; padding: 0;
            overflow: hidden;
            background: var(--bg-cad);
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            touch-action: none; /* Bloqueo estricto de gestos */
            -webkit-tap-highlight-color: transparent;
            color: #1e293b;
        }
        
        .cad-background {
            background-color: var(--bg-cad);
            background-image: 
                radial-gradient(circle, var(--grid-dot) 2px, transparent 2px),
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size), var(--grid-size) var(--grid-size), var(--grid-size) var(--grid-size);
            background-position: 10px 10px, 0 0, 0 0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }
        .cad-background.playing {
            background-color: #fca5a5;
            transition: background-color 0.5s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 4px 15px -1px rgba(0, 0, 0, 0.1);
            padding-top: max(var(--sat), 0.5rem);
        }
        
        ::-webkit-scrollbar { display: none; }

        .block-btn { transition: transform 0.1s; }
        .block-btn:active { transform: scale(0.95); }

        .touch-target {
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col h-[100dvh] w-screen" onload="initApp()">

    <!-- PANTALLA DE INICIO -->
    <div id="welcome-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 text-white transition-opacity duration-500">
        <div class="absolute inset-0 cad-background opacity-20 pointer-events-none"></div>
        <div class="relative z-10 flex flex-col items-center p-6 text-center">
            <div class="w-24 h-24 mb-6 bg-blue-600 rounded-3xl shadow-[0_0_40px_rgba(37,99,235,0.6)] flex items-center justify-center rotate-12">
                <svg class="w-12 h-12 text-white -rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            </div>
            <h1 class="text-4xl sm:text-5xl font-black mb-2 tracking-tight">GRAVITY<br><span class="text-blue-500">STUDIO</span></h1>
            <p class="text-slate-400 mb-10 font-medium max-w-xs">Diseña estructuras, calcula la caída y llega a la meta.</p>
            
            <button onclick="startGame()" class="w-full max-w-[280px] touch-target py-4 rounded-2xl bg-blue-600 text-white text-lg font-bold tracking-wide hover:bg-blue-700 shadow-lg shadow-blue-600/30 active:scale-95 transition-all">
                INICIAR PRUEBA
            </button>
        </div>
    </div>

    <!-- HEADER UNIFICADO (Controles + Piezas) -->
    <header id="main-header" class="hidden glass-panel flex flex-col z-20 shrink-0 relative">
        <!-- Fila Superior: Controles -->
        <div class="flex items-center justify-between px-3 sm:px-4 pb-2">
            <div class="flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <div>
                    <h1 class="font-bold text-xs sm:text-sm tracking-wide text-slate-800" id="main-title">GRAVITY STUDIO</h1>
                    <p class="text-[10px] text-blue-600 uppercase tracking-widest font-mono font-bold" id="level-indicator">Nivel 1</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="toggleCreatorMode()" id="btn-creator" class="touch-target px-3 rounded-xl bg-slate-100 border border-slate-300 text-slate-600 text-[10px] sm:text-xs font-bold hover:bg-slate-200 transition-colors">
                    ⚙️ CREADOR
                </button>
                <button onclick="resetLevel()" class="touch-target px-3 rounded-xl bg-slate-100 text-slate-600 hover:text-slate-900 border border-slate-300 hover:bg-slate-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </div>

        <!-- Fila Inferior: Inventario de Piezas (Barra Superior) -->
        <div class="flex gap-3 px-3 pb-3 overflow-x-auto w-full items-center border-t border-slate-200 pt-2" id="top-tray-items">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1 pr-2">Piezas:</span>
            
            <div class="block-btn flex flex-col items-center gap-1 min-w-[50px] cursor-pointer" onclick="spawnBlock('wood')">
                <div class="w-12 h-12 rounded-lg bg-slate-50 border border-slate-200 flex items-center justify-center shadow-sm">
                    <div class="w-8 h-3 bg-amber-600 rounded-sm border border-amber-800"></div>
                </div>
                <span class="text-[9px] text-slate-500 font-bold">Madera</span>
            </div>

            <div class="block-btn flex flex-col items-center gap-1 min-w-[50px] cursor-pointer" onclick="spawnBlock('bounce')">
                <div class="w-12 h-12 rounded-lg bg-slate-50 border border-slate-200 flex items-center justify-center shadow-sm">
                    <div class="w-8 h-3 bg-slate-800 rounded-sm border border-pink-500 flex items-center justify-center">
                        <div class="w-6 h-1 bg-pink-500 rounded-full"></div>
                    </div>
                </div>
                <span class="text-[9px] text-slate-500 font-bold">Rebote</span>
            </div>

            <div class="block-btn flex flex-col items-center gap-1 min-w-[50px] cursor-pointer" onclick="spawnBlock('u_shape')">
                <div class="w-12 h-12 rounded-lg bg-slate-50 border border-slate-200 flex items-center justify-center shadow-sm">
                    <div class="w-6 h-5 border-b-4 border-l-4 border-r-4 border-amber-600 rounded-b-sm"></div>
                </div>
                <span class="text-[9px] text-slate-500 font-bold">Forma U</span>
            </div>

            <div class="block-btn flex flex-col items-center gap-1 min-w-[50px] cursor-pointer" onclick="spawnBlock('metal')">
                <div class="w-12 h-12 rounded-lg bg-slate-50 border border-slate-200 flex items-center justify-center shadow-sm">
                    <div class="w-8 h-3 bg-slate-400 rounded-sm border border-slate-500 flex justify-between px-1 items-center">
                        <div class="w-1 h-1 bg-slate-700 rounded-full"></div>
                        <div class="w-1 h-1 bg-slate-700 rounded-full"></div>
                    </div>
                </div>
                <span class="text-[9px] text-slate-500 font-bold">Metal</span>
            </div>

            <div class="block-btn flex flex-col items-center gap-1 min-w-[50px] cursor-pointer" onclick="spawnBlock('l_shape')">
                <div class="w-12 h-12 rounded-lg bg-slate-50 border border-slate-200 flex items-center justify-center shadow-sm relative">
                    <div class="w-5 h-6 border-b-4 border-l-4 border-slate-400 rounded-bl-sm absolute top-3 left-3"></div>
                </div>
                <span class="text-[9px] text-slate-500 font-bold">Ángulo</span>
            </div>
            
            <div class="block-btn flex flex-col items-center gap-1 min-w-[50px] cursor-pointer" onclick="spawnBlock('tunnel')">
                <div class="w-12 h-12 rounded-lg bg-slate-50 border border-slate-200 flex items-center justify-center shadow-sm relative">
                    <div class="w-8 h-1.5 bg-slate-400 border border-slate-500 rounded-sm absolute top-3"></div>
                    <div class="w-8 h-1.5 bg-slate-400 border border-slate-500 rounded-sm absolute bottom-3"></div>
                </div>
                <span class="text-[9px] text-slate-500 font-bold">Túnel</span>
            </div>
        </div>
    </header>

    <!-- WORKSPACE / CANVAS -->
    <main class="flex-1 relative overflow-hidden bg-slate-800">
        <div id="grid-bg" class="absolute inset-0 cad-background pointer-events-none"></div>
        
        <!-- Canvas de físicas -->
        <canvas id="gameCanvas" class="absolute inset-0 z-10" style="touch-action: none;"></canvas>

        <!-- Menú Contextual Flotante -->
        <div id="context-menu" class="hidden absolute z-30 transform -translate-x-1/2 -translate-y-full pb-6 flex gap-3 pointer-events-auto">
            <button onclick="rotateSelected()" class="w-12 h-12 flex items-center justify-center bg-blue-500 text-white rounded-full shadow-xl hover:bg-blue-600 border-2 border-white active:scale-95 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v5h5"></path></svg>
            </button>
            <button onclick="deleteSelected()" class="w-12 h-12 flex items-center justify-center bg-red-500 text-white rounded-full shadow-xl hover:bg-red-600 border-2 border-white active:scale-95 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>
        
        <!-- FAB PRINCIPAL (Posicionado abajo a la derecha para fácil acceso con el pulgar) -->
        <button id="btn-play" onclick="handleMainAction()" class="absolute bottom-6 right-4 z-40 w-16 h-16 rounded-full bg-blue-600 shadow-[0_5px_15px_rgba(37,99,235,0.4)] flex items-center justify-center text-white border-2 border-white hover:scale-105 transition-transform">
            <svg id="icon-play" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-stop" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
            <svg id="icon-save" class="w-8 h-8 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
        </button>
    </main>

    <!-- MODALES / OVERLAYS -->
    <div id="overlay-msg" class="absolute inset-0 z-50 hidden items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4">
        <div class="bg-white border-2 border-slate-200 p-8 rounded-3xl shadow-2xl text-center w-full max-w-sm transform scale-95 opacity-0 transition-all duration-300" id="overlay-box">
            <h2 id="msg-title" class="text-3xl font-black mb-2 text-slate-800">¡Completado!</h2>
            <p id="msg-desc" class="text-base text-slate-500 mb-8 font-medium">Secuencia exitosa.</p>
            <div class="flex flex-col gap-3" id="msg-buttons">
                <button id="msg-btn" onclick="nextLevel()" class="w-full touch-target rounded-xl bg-blue-600 text-white font-bold tracking-wide hover:bg-blue-700 shadow-md">Siguiente Nivel</button>
            </div>
        </div>
    </div>

    <div id="toast" class="absolute top-32 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-full text-sm font-bold opacity-0 transition-opacity z-50 pointer-events-none shadow-lg">
        Aviso
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN Y ESTADO
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let width, height;
        const GRID = 20; 
        
        let gameState = 'START'; 
        let isCreatorMode = false;
        let currentLevelIdx = 0;
        
        let lastTime = 0;
        
        let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 10 };
        let startPos = { x: 0, y: 0 };
        let goalPortal = { x: 0, y: 0, r: 30 };
        
        let stuckFrames = 0;
        let globalIdCounter = 1000; 
        
        let staticBlocks = []; 
        let userBlocks = [];   
        
        let selectedBlock = null;
        let draggingBlock = null;
        let draggingSpecial = null; 
        let dragOffset = { x: 0, y: 0 };
        
        let particles = [];
        let trail = [];

        const CATALOG = {
            wood: { w: 100, h: 20, bounce: 0.4, type: 'wood' },
            bounce: { w: 80, h: 20, bounce: 1.2, type: 'bounce' },
            metal: { w: 60, h: 20, bounce: 0.1, type: 'metal' },
            l_shape: { w: 60, h: 60, bounce: 0.1, type: 'metal', parts: [{x:0, y:0, w:20, h:60}, {x:20, y:40, w:40, h:20}] },
            u_shape: { w: 80, h: 60, bounce: 0.4, type: 'wood', parts: [{x:0, y:0, w:20, h:60}, {x:20, y:40, w:40, h:20}, {x:60, y:0, w:20, h:60}] },
            tunnel: { w: 80, h: 80, bounce: 0.1, type: 'metal', parts: [{x:0, y:0, w:80, h:20}, {x:0, y:60, w:80, h:20}] }
        };

        // Diseño Responsivo: Las coordenadas son % de la pantalla (0.0 a 1.0)
        let levelsLayouts = [
            { 
                name: "La Rampa Dinámica", 
                setup: (w, h) => {
                    return {
                        start: { x: w * 0.2, y: h * 0.15 },
                        goal: { x: w * 0.8, y: h * 0.8 },
                        static: [
                            { x: w * 0.7, y: h * 0.9, w: 100, h: 20, type: 'metal', id: 1, angle: 0 }
                        ]
                    };
                }
            },
            { 
                name: "El Trampolín", 
                setup: (w, h) => {
                    return {
                        start: { x: w * 0.2, y: h * 0.15 },
                        goal: { x: w * 0.8, y: h * 0.4 },
                        static: [
                            { x: w * 0.2, y: h * 0.6, w: 60, h: 20, type: 'metal', id: 1, angle: 0 }
                        ]
                    };
                }
            },
            { 
                name: "Pasaje Estrecho", 
                setup: (w, h) => {
                    return {
                        start: { x: w * 0.5, y: h * 0.1 },
                        goal: { x: w * 0.5, y: h * 0.85 },
                        static: [
                            { x: w * 0.3, y: h * 0.4, w: 80, h: 20, type: 'wood', id: 1, angle: 0 },
                            { x: w * 0.7, y: h * 0.4, w: 80, h: 20, type: 'wood', id: 2, angle: 0 }
                        ]
                    };
                }
            }
        ];

        // ==========================================
        // INICIALIZACIÓN Y FLUJO
        // ==========================================
        function initApp() {
            window.addEventListener('resize', () => { resize(); resetSim(); });
            resize();
            setupTouchInput();
            
            history.pushState({page: 'home'}, '', '');
            window.addEventListener('popstate', handlePopState);
            
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            const ws = document.getElementById('welcome-screen');
            ws.style.opacity = '0';
            setTimeout(() => {
                ws.classList.add('hidden');
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('main-header').classList.add('flex');
                
                gameState = 'EDIT';
                loadLevel(0);
            }, 500);
        }

        function handlePopState(e) {
            history.pushState({page: 'game'}, '', window.location.pathname);
            if (gameState !== 'START') showExitModal();
        }

        function showExitModal() {
            gameState = 'PAUSED';
            const overlay = document.getElementById('overlay-msg');
            const box = document.getElementById('overlay-box');
            
            document.getElementById('msg-title').innerText = "¿Salir del juego?";
            document.getElementById('msg-title').className = "text-2xl font-black mb-2 text-slate-800";
            document.getElementById('msg-desc').innerText = "Tu progreso no se guardará.";
            
            const btnContainer = document.getElementById('msg-buttons');
            btnContainer.innerHTML = `
                <button onclick="resumeGame()" class="w-full touch-target rounded-xl bg-slate-200 text-slate-800 font-bold hover:bg-slate-300 shadow-md mb-2">Continuar Jugando</button>
                <button onclick="window.location.reload()" class="w-full touch-target rounded-xl bg-red-500 text-white font-bold hover:bg-red-600 shadow-md">Salir</button>
            `;
            
            overlay.classList.remove('hidden');
            overlay.style.display = 'flex';
            setTimeout(() => {
                box.classList.remove('scale-95', 'opacity-0');
                box.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function resumeGame() {
            const overlay = document.getElementById('overlay-msg');
            const box = document.getElementById('overlay-box');
            box.classList.remove('scale-100', 'opacity-100');
            box.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.style.display = '';
                gameState = 'EDIT';
            }, 300);
        }

        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;
            
            // Relación de pixeles 1:1, nada de zooms extraños
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            updateContextMenu(); 
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        function loadLevel(idx) {
            currentLevelIdx = idx;
            let layoutGenerator = levelsLayouts[idx] || levelsLayouts[0];
            
            document.getElementById('level-indicator').innerText = isCreatorMode ? 'MODO CREADOR' : `Nivel ${idx + 1}`;
            
            // Calculamos posiciones usando el tamaño físico actual
            let layout = layoutGenerator.setup(width, height);
            
            startPos = { x: layout.start.x, y: layout.start.y };
            goalPortal = { x: layout.goal.x, y: layout.goal.y, r: 30 };
            
            // Ajustamos al GRID
            startPos.x = Math.round(startPos.x / GRID) * GRID;
            startPos.y = Math.round(startPos.y / GRID) * GRID;
            goalPortal.x = Math.round(goalPortal.x / GRID) * GRID;
            goalPortal.y = Math.round(goalPortal.y / GRID) * GRID;

            staticBlocks = JSON.parse(JSON.stringify(layout.static));
            staticBlocks.forEach(b => { 
                if(b.angle === undefined) b.angle = 0; 
                // Ajustamos estáticos al grid físico
                b.x = Math.round(b.x / GRID) * GRID;
                b.y = Math.round(b.y / GRID) * GRID;
            });
            
            userBlocks = []; 
            selectedBlock = null;
            
            resetSim();
            showToast(`Cargando Nivel ${idx + 1}`);
        }

        function resetSim() {
            if (gameState === 'START') return;
            gameState = 'EDIT';
            ball.x = startPos.x;
            ball.y = startPos.y;
            ball.vx = 0; ball.vy = 0;
            trail = []; particles = [];
            stuckFrames = 0;
            
            document.getElementById('grid-bg').classList.remove('playing');
            document.getElementById('icon-play').classList.remove('hidden');
            document.getElementById('icon-stop').classList.add('hidden');
            updateContextMenu();
        }

        function toggleCreatorMode() {
            isCreatorMode = !isCreatorMode;
            const btn = document.getElementById('btn-creator');
            const title = document.getElementById('main-title');
            
            if (isCreatorMode) {
                btn.classList.add('bg-blue-600', 'text-white');
                btn.classList.remove('bg-slate-100', 'text-slate-600');
                title.innerText = "CREATOR STUDIO";
                document.getElementById('icon-play').classList.add('hidden');
                document.getElementById('icon-save').classList.remove('hidden');
                
                userBlocks = [];
                resetSim();
                showToast("Modo Creador Activado");
            } else {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-100', 'text-slate-600');
                title.innerText = "GRAVITY STUDIO";
                document.getElementById('icon-play').classList.remove('hidden');
                document.getElementById('icon-save').classList.add('hidden');
                
                loadLevel(currentLevelIdx); 
            }
        }

        function handleMainAction() {
            if (isCreatorMode) {
                // Guardar custom layout
                const newLvl = {
                    name: "Nivel Usuario",
                    setup: (w, h) => {
                        return {
                            start: { x: startPos.x, y: startPos.y },
                            goal: { x: goalPortal.x, y: goalPortal.y },
                            static: JSON.parse(JSON.stringify(staticBlocks))
                        };
                    }
                };
                levelsLayouts.push(newLvl);
                showToast("¡Nivel Guardado!");
                toggleCreatorMode();
                loadLevel(levelsLayouts.length - 1);
            } else {
                if (gameState === 'EDIT') {
                    gameState = 'PLAY';
                    selectedBlock = null;
                    updateContextMenu();
                    document.getElementById('grid-bg').classList.add('playing');
                    document.getElementById('icon-play').classList.add('hidden');
                    document.getElementById('icon-stop').classList.remove('hidden');
                    spawnParticles(startPos.x, startPos.y, '#f59e0b', 20); 
                } else {
                    resetSim();
                }
            }
        }

        function spawnBlock(type) {
            if (gameState !== 'EDIT') resetSim();
            const tpl = CATALOG[type];
            
            // Aparece en el centro superior (debajo del header)
            let bx = Math.round((width/2 - tpl.w/2) / GRID) * GRID;
            let by = Math.round((height * 0.15) / GRID) * GRID;

            const newBlock = {
                x: bx, y: by, w: tpl.w, h: tpl.h,
                bounce: tpl.bounce, type: tpl.type, 
                parts: tpl.parts ? JSON.parse(JSON.stringify(tpl.parts)) : [{x:0, y:0, w:tpl.w, h:tpl.h}],
                angle: 0,
                id: globalIdCounter++
            };

            while(checkOverlap(newBlock)) {
                newBlock.y += GRID; 
            }

            if (isCreatorMode) staticBlocks.push(newBlock);
            else userBlocks.push(newBlock);
            
            selectedBlock = newBlock;
            updateContextMenu();
            spawnParticles(newBlock.x + newBlock.w/2, newBlock.y + newBlock.h/2, '#94a3b8', 10);
        }

        function deleteSelected() {
            if (selectedBlock) {
                const id = selectedBlock.id;
                if(isCreatorMode) staticBlocks = staticBlocks.filter(b => b.id !== id);
                else userBlocks = userBlocks.filter(b => b.id !== id);
                spawnParticles(selectedBlock.x + selectedBlock.w/2, selectedBlock.y + selectedBlock.h/2, '#ef4444', 15);
                selectedBlock = null;
                updateContextMenu();
            }
        }

        function rotateSelected() {
            if (!selectedBlock) return;
            selectedBlock.angle += Math.PI / 4; 
            if (selectedBlock.angle >= Math.PI * 2) selectedBlock.angle = 0;
            updateContextMenu();
        }

        function updateContextMenu() {
            const menu = document.getElementById('context-menu');
            if (selectedBlock && gameState === 'EDIT') {
                menu.classList.remove('hidden');
                menu.style.left = `${selectedBlock.x + selectedBlock.w / 2}px`;
                menu.style.top = `${selectedBlock.y - 20}px`; 
            } else {
                menu.classList.add('hidden');
            }
        }

        function showMessage(title, desc, isWin) {
            gameState = 'DONE';
            const overlay = document.getElementById('overlay-msg');
            const box = document.getElementById('overlay-box');
            const btnContainer = document.getElementById('msg-buttons');
            
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-title').className = `text-3xl font-black mb-2 ${isWin ? 'text-blue-600' : 'text-red-500'}`;
            document.getElementById('msg-desc').innerText = desc;
            
            if (isWin) {
                btnContainer.innerHTML = `<button onclick="nextLevel()" class="w-full touch-target rounded-xl bg-blue-600 text-white font-bold tracking-wide hover:bg-blue-700 shadow-md">Siguiente Nivel</button>`;
            } else {
                btnContainer.innerHTML = `<button onclick="hideMessage()" class="w-full touch-target rounded-xl bg-slate-200 text-slate-800 font-bold hover:bg-slate-300 shadow-md">Volver a intentar</button>`;
            }
            
            overlay.classList.remove('hidden');
            overlay.style.display = 'flex';
            setTimeout(() => {
                box.classList.remove('scale-95', 'opacity-0');
                box.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function hideMessage() {
            const overlay = document.getElementById('overlay-msg');
            const box = document.getElementById('overlay-box');
            box.classList.remove('scale-100', 'opacity-100');
            box.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.style.display = '';
                resetSim(); 
            }, 300);
        }

        function nextLevel() {
            hideMessage();
            if (currentLevelIdx < levelsLayouts.length - 1) {
                loadLevel(currentLevelIdx + 1);
            } else { 
                showToast("¡Felicidades! Completaste todos los niveles.");
                loadLevel(0); 
            }
        }

        function resetLevel() {
            loadLevel(currentLevelIdx);
        }

        // ==========================================
        // SISTEMA TÁCTIL ABSOLUTO (Estilo Lego)
        // ==========================================
        function setupTouchInput() {
            
            // Extractor de coordenadas seguro
            const getEventPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                let x, y;
                if (e.touches && e.touches.length > 0) {
                    x = e.touches[0].clientX;
                    y = e.touches[0].clientY;
                } else {
                    x = e.clientX;
                    y = e.clientY;
                }
                return { 
                    x: x - rect.left, 
                    y: y - rect.top 
                };
            };

            const handleDown = (pos) => {
                if (gameState !== 'EDIT') return;

                if (isCreatorMode) {
                    if (Math.hypot(pos.x - goalPortal.x, pos.y - goalPortal.y) < goalPortal.r + 30) { draggingSpecial = 'goal'; return; }
                    if (Math.hypot(pos.x - startPos.x, pos.y - startPos.y) < 40) { draggingSpecial = 'start'; return; }
                }

                let arr = isCreatorMode ? staticBlocks : userBlocks;
                for (let i = arr.length - 1; i >= 0; i--) {
                    let b = arr[i];
                    
                    let cx = b.x + b.w/2;
                    let cy = b.y + b.h/2;
                    let angle = b.angle || 0;
                    
                    let dx = pos.x - cx;
                    let dy = pos.y - cy;
                    let localX = dx * Math.cos(-angle) - dy * Math.sin(-angle) + b.w/2;
                    let localY = dx * Math.sin(-angle) + dy * Math.cos(-angle) + b.h/2;
                    
                    // Hitbox permisiva para dedos gordos
                    let pad = 24; 
                    let hit = b.parts.some(p => 
                        localX >= p.x - pad && localX <= p.x + p.w + pad && 
                        localY >= p.y - pad && localY <= p.y + p.h + pad
                    );

                    if (hit) {
                        selectedBlock = b;
                        draggingBlock = b;
                        dragOffset.x = pos.x - b.x;
                        dragOffset.y = pos.y - b.y;
                        
                        // Traer al frente
                        arr.splice(i, 1);
                        arr.push(b);
                        
                        updateContextMenu();
                        return;
                    }
                }
                selectedBlock = null;
                updateContextMenu();
            };

            const handleMove = (pos) => {
                if (!draggingBlock && !draggingSpecial) return;
                
                if (draggingSpecial === 'goal') {
                    goalPortal.x = Math.round(pos.x / GRID) * GRID;
                    goalPortal.y = Math.round(pos.y / GRID) * GRID;
                } else if (draggingSpecial === 'start') {
                    startPos.x = Math.round(pos.x / GRID) * GRID;
                    startPos.y = Math.round(pos.y / GRID) * GRID;
                } else if (draggingBlock) {
                    let rawX = pos.x - dragOffset.x;
                    let rawY = pos.y - dragOffset.y;
                    draggingBlock.x = Math.round(rawX / GRID) * GRID;
                    draggingBlock.y = Math.round(rawY / GRID) * GRID;
                    updateContextMenu();
                }
            };

            const handleUp = () => {
                draggingBlock = null;
                draggingSpecial = null;
            };

            // Eventos Táctiles Puros (Bloqueando Scroll y recargas con preventDefault)
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleDown(getEventPos(e)); }, { passive: false });
            window.addEventListener('touchmove', (e) => { 
                if(draggingBlock || draggingSpecial) { e.preventDefault(); handleMove(getEventPos(e)); }
            }, { passive: false });
            window.addEventListener('touchend', (e) => { handleUp(); }, { passive: false });
            window.addEventListener('touchcancel', (e) => { handleUp(); }, { passive: false });

            // Eventos de Ratón (Para PC o ratones de tablet)
            canvas.addEventListener('mousedown', (e) => { handleDown(getEventPos(e)); });
            window.addEventListener('mousemove', (e) => { handleMove(getEventPos(e)); });
            window.addEventListener('mouseup', (e) => { handleUp(); });
        }

        function checkOverlap(b1) {
            let all = [...staticBlocks, ...userBlocks];
            let cx1 = b1.x + b1.w/2;
            let cy1 = b1.y + b1.h/2;
            
            for (let b2 of all) {
                if (b1.id === b2.id) continue;
                let cx2 = b2.x + b2.w/2;
                let cy2 = b2.y + b2.h/2;
                
                if (Math.hypot(cx1 - cx2, cy1 - cy2) < GRID * 0.5) {
                    return true;
                }
            }
            return false;
        }

        // ==========================================
        // FÍSICAS INDEPENDIENTES DE Hz (DELTA TIME)
        // ==========================================
        function updatePhysics(dt) {
            if (gameState !== 'PLAY') return;

            ball.vy += 0.4 * dt; 
            
            if (Math.abs(ball.vx) > 0.1 || Math.abs(ball.vy) > 0.1) {
                trail.push({ x: ball.x, y: ball.y, life: 1.0 });
                if (trail.length > 20) trail.shift();
            }

            ball.x += ball.vx * dt;
            ball.y += ball.vy * dt;
            
            ball.vx *= Math.pow(0.99, dt);
            ball.vy *= Math.pow(0.99, dt);

            let ballSpeed = Math.hypot(ball.vx, ball.vy);

            if (ballSpeed < 0.25) {
                stuckFrames += 1 * dt;
                if (stuckFrames > 120) {
                    showMessage("¡Te atascaste!", "La simulación se detuvo por falta de impulso.", false);
                    return;
                }
            } else {
                stuckFrames = 0;
            }

            const allBlocks = [...staticBlocks, ...userBlocks];
            for (let b of allBlocks) {
                let parts = b.parts || [{x:0, y:0, w:b.w, h:b.h}];
                let angle = b.angle || 0;
                let cx = b.x + b.w/2;
                let cy = b.y + b.h/2;

                let dx = ball.x - cx;
                let dy = ball.y - cy;
                let localBallX = dx * Math.cos(-angle) - dy * Math.sin(-angle) + b.w/2;
                let localBallY = dx * Math.sin(-angle) + dy * Math.cos(-angle) + b.h/2;
                let localBall = { x: localBallX, y: localBallY, r: ball.r };
                
                for (let p of parts) {
                    let col = circleRectCollide(localBall, p);
                    
                    if (col.hit) {
                        let overlap = ball.r - col.distance;
                        
                        let globalNx = col.nx * Math.cos(angle) - col.ny * Math.sin(angle);
                        let globalNy = col.nx * Math.sin(angle) + col.ny * Math.cos(angle);

                        ball.x += globalNx * overlap;
                        ball.y += globalNy * overlap;

                        let dot = ball.vx * globalNx + ball.vy * globalNy;
                        
                        if (dot < 0) {
                            let bounceFactor = b.bounce || 0.5;
                            if (b.type === 'bounce' && ballSpeed > 15) bounceFactor = 0.8;

                            ball.vx -= (1 + bounceFactor) * dot * globalNx;
                            ball.vy -= (1 + bounceFactor) * dot * globalNy;

                            let tangentX = -globalNy; let tangentY = globalNx;
                            let tangentDot = ball.vx * tangentX + ball.vy * tangentY;
                            ball.vx -= tangentDot * 0.1 * tangentX;
                            ball.vy -= tangentDot * 0.1 * tangentY;

                            if (ballSpeed > 2) {
                                let colorHex = b.type === 'bounce' ? '#ec4899' : (b.type === 'wood' ? '#d97706' : '#94a3b8');
                                spawnParticles(ball.x - globalNx*ball.r, ball.y - globalNy*ball.r, colorHex, b.type==='bounce'?15:5);
                            }
                        }
                    }
                }
            }

            // Detectar caída fuera usando medidas físicas absolutas
            if (ball.y > height + 50 || ball.x < -50 || ball.x > width + 50) {
                showMessage("¡Perdiste!", "El sujeto cayó fuera del área de prueba.", false);
            }

            let distToGoal = Math.hypot(ball.x - goalPortal.x, ball.y - goalPortal.y);
            if (distToGoal < goalPortal.r) {
                ball.vx += (goalPortal.x - ball.x) * 0.1 * dt;
                ball.vy += (goalPortal.y - ball.y) * 0.1 * dt;
                ball.vx *= Math.pow(0.8, dt); 
                ball.vy *= Math.pow(0.8, dt);
                
                if (distToGoal < 5) {
                    spawnParticles(goalPortal.x, goalPortal.y, '#0ea5e9', 40); 
                    showMessage("¡Conexión Perfecta!", "Precisión calculada exitosamente.", true);
                }
            }
        }

        function circleRectCollide(circle, rect) {
            let testX = circle.x; let testY = circle.y;
            let nx = 0, ny = 0;
            
            if (circle.x < rect.x) { testX = rect.x; nx = -1; }
            else if (circle.x > rect.x + rect.w) { testX = rect.x + rect.w; nx = 1; }
            
            if (circle.y < rect.y) { testY = rect.y; ny = -1; }
            else if (circle.y > rect.y + rect.h) { testY = rect.y + rect.h; ny = 1; }

            let distX = circle.x - testX; 
            let distY = circle.y - testY;
            let distance = Math.hypot(distX, distY);

            if (distance <= circle.r) {
                if (distance > 0) {
                    nx = distX / distance;
                    ny = distY / distance;
                }
                return { hit: true, nx, ny, distance };
            }
            return { hit: false };
        }

        // ==========================================
        // RENDER / DIBUJO PURO (Sin hacks de escala)
        // ==========================================
        function draw() {
            ctx.clearRect(0, 0, width, height); 
            if(gameState === 'START') return;

            drawTrail();
            drawPortal();

            const allBlocks = [...staticBlocks, ...userBlocks];
            for (let b of allBlocks) drawBlock(b);

            drawBall();
            updateAndDrawParticles();

            if (gameState === 'EDIT') {
                ctx.strokeStyle = isCreatorMode ? '#3b82f6' : 'rgba(100, 116, 139, 0.4)';
                ctx.setLineDash([4, 4]); ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(startPos.x, startPos.y, 20, 0, Math.PI * 2); ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = '#475569'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
                ctx.fillText('INICIO', startPos.x, startPos.y - 25);
            }
        }

        function drawBlock(b) {
            ctx.save();
            ctx.translate(b.x + b.w/2, b.y + b.h/2);
            ctx.rotate(b.angle || 0);
            ctx.translate(-b.w/2, -b.h/2);

            let parts = b.parts || [{x:0, y:0, w:b.w, h:b.h}];

            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 5; ctx.shadowOffsetY = 3;
            for (let p of parts) {
                if (b.type === 'wood') ctx.fillStyle = '#f59e0b';
                else if (b.type === 'bounce') ctx.fillStyle = '#334155';
                else ctx.fillStyle = '#cbd5e1';
                ctx.fillRect(p.x, p.y, p.w, p.h);
            }
            
            ctx.shadowBlur = 0; 
            for (let p of parts) {
                if (b.type === 'wood') {
                    ctx.fillStyle = 'rgba(0,0,0,0.05)';
                    ctx.fillRect(p.x, p.y + p.h/2 - 2, p.w, 4);
                    ctx.strokeStyle = '#b45309';
                    ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
                } else if (b.type === 'bounce') {
                    ctx.shadowColor = '#ec4899'; ctx.shadowBlur = 10;
                    ctx.fillStyle = '#ec4899';
                    ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#be185d';
                    ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
                } else if (b.type === 'metal') {
                    ctx.fillStyle = '#64748b'; 
                    ctx.beginPath(); ctx.arc(p.x+6, p.y+p.h/2, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(p.x+p.w-6, p.y+p.h/2, 2, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#94a3b8';
                    ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
                }
            }

            if (b === selectedBlock && gameState === 'EDIT') {
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 2; ctx.setLineDash([4, 4]); ctx.lineDashOffset = -Date.now() / 50; 
                ctx.strokeRect(-2, -2, b.w + 4, b.h + 4); 
                ctx.setLineDash([]);
            }
            
            if (!isCreatorMode && staticBlocks.includes(b)) {
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(8, 0); ctx.lineTo(0, 8); ctx.fill();
                ctx.beginPath(); ctx.moveTo(b.w, 0); ctx.lineTo(b.w-8, 0); ctx.lineTo(b.w, 8); ctx.fill();
            }

            ctx.restore();
        }

        function drawBall() {
            ctx.save(); ctx.translate(ball.x, ball.y);
            ctx.shadowColor = 'rgba(245, 158, 11, 0.4)'; ctx.shadowBlur = 10;
            ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0; ctx.strokeStyle = '#b45309'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, ball.r - 2, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
        }

        function drawTrail() {
            if (trail.length < 2) return;
            ctx.save(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(trail[0].x, trail[0].y);
            for (let i = 1; i < trail.length; i++) ctx.lineTo(trail[i].x, trail[i].y);
            ctx.lineWidth = ball.r; ctx.strokeStyle = 'rgba(251, 191, 36, 0.3)'; ctx.stroke();
            for(let p of trail) p.life -= 0.05; 
            trail = trail.filter(p => p.life > 0);
            ctx.restore();
        }

        function drawPortal() {
            const time = Date.now() / 1000;
            ctx.save(); ctx.translate(goalPortal.x, goalPortal.y);
            ctx.translate(0, Math.sin(time * 2) * 3); ctx.rotate(time * 0.5);

            ctx.strokeStyle = '#0284c7'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.setLineDash([15, 20]); ctx.arc(0, 0, goalPortal.r, 0, Math.PI * 2); ctx.stroke();

            ctx.rotate(-time); ctx.beginPath(); ctx.setLineDash([5, 15]);
            ctx.strokeStyle = '#0ea5e9'; ctx.arc(0, 0, goalPortal.r * 0.7, 0, Math.PI * 2); ctx.stroke();
            ctx.setLineDash([]);

            let pulse = 0.3 + Math.sin(time * 5) * 0.2;
            ctx.fillStyle = `rgba(14, 165, 233, ${pulse})`;
            ctx.beginPath(); ctx.arc(0, 0, goalPortal.r * 0.4, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4 + 1;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, color: color, life: 1.0, size: Math.random() * 3 + 2 });
            }
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function gameLoop(time) {
            requestAnimationFrame(gameLoop);
            
            if (!lastTime) lastTime = time;
            let dt = (time - lastTime) / 16.666; 
            lastTime = time;
            
            if (dt > 3) dt = 3; 

            updatePhysics(dt);
            draw();
        }

    </script>
</body>
