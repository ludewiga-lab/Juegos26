<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Plinko Arcade Real Style</title>
    <style>
        :root {
            --plinko-blue: #1c354e;
            --plinko-yellow: #f1d331;
            --p1: #ff4444; --p2: #44ff44; --p3: #3399ff; --p4: #ffaa00;
        }

        body {
            margin: 0; 
            background: #222; 
            font-family: 'Arial Black', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            /* Uso de dvh para evitar recortes por barras de navegador en móvil */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
        }

        #game-container {
            position: relative; 
            width: 100vw; 
            height: 100vh;
            height: 100dvh;
            max-width: 450px;
            background: var(--plinko-blue); 
            border: 4px solid var(--plinko-yellow);
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            touch-action: none;
        }

        #setup-screen, #win-screen {
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.95);
            z-index: 100; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            color: white; 
            text-align: center;
        }

        #win-screen { display: none; }

        .btn-setup {
            background: var(--plinko-yellow); 
            border: none; 
            padding: 12px 24px;
            margin: 8px; 
            font-size: 1.2rem; 
            font-weight: 900; 
            border-radius: 12px;
            cursor: pointer; 
            box-shadow: 0 4px 0 #b39b1a; 
            color: #1c354e;
        }

        #scoreboard {
            display: flex; 
            justify-content: space-around; 
            background: #111;
            padding: 4px; 
            border-bottom: 2px solid var(--plinko-yellow);
            flex-shrink: 0;
        }

        .score-pill { 
            padding: 3px 6px; 
            border-radius: 8px; 
            font-size: 0.65rem; 
            font-weight: bold; 
            color: #fff; 
        }

        canvas { 
            flex-grow: 1; 
            flex-shrink: 1;
            width: 100%; 
            min-height: 0;
            cursor: crosshair; 
        }

        #controls { 
            padding: 8px 12px 12px 12px; 
            background: #111; 
            border-top: 3px solid var(--plinko-yellow);
            flex-shrink: 0;
            z-index: 10;
        }

        #action-btn {
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px;
            background: var(--plinko-yellow); 
            font-size: 1.1rem; 
            font-weight: 900;
            box-shadow: 0 4px 0 #b39b1a; 
            cursor: pointer; 
            color: #1c354e;
            text-transform: uppercase;
        }

        #action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b39b1a;
        }

        #action-btn:disabled { background: #555; box-shadow: none; color: #888; }

        #message-overlay {
            position: absolute; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: var(--plinko-yellow); 
            color: #1c354e; 
            padding: 15px;
            border-radius: 15px; 
            font-weight: 900; 
            display: none; 
            z-index: 50;
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 3px solid white; 
            width: 60%; 
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-screen">
        <h1 style="color:var(--plinko-yellow); font-size: 2.5rem; margin:0; text-shadow: 3px 3px 0 #000;">PLINKO</h1>
        <p style="margin: 10px 0; font-size: 0.9rem;">¿CUÁNTOS JUGADORES?</p>
        <div style="display:flex; flex-wrap: wrap; justify-content: center;">
            <button class="btn-setup" onclick="startGame(1)">1</button>
            <button class="btn-setup" onclick="startGame(2)">2</button>
            <button class="btn-setup" onclick="startGame(3)">3</button>
            <button class="btn-setup" onclick="startGame(4)">4</button>
        </div>
    </div>

    <div id="win-screen">
        <h1 id="winner-text" style="color:var(--plinko-yellow); font-size: 2.2rem;">¡GANADOR!</h1>
        <button class="btn-setup" onclick="location.reload()">REINTENTAR</button>
    </div>

    <div id="message-overlay"></div>
    <div id="scoreboard"></div>
    <div id="turn-info" style="color:var(--plinko-yellow); text-align:center; padding:5px; font-size:0.75rem; font-weight: 900; background:rgba(0,0,0,0.5)">...</div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        <button id="action-btn" disabled>ELIGE TU CESTA</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const actionBtn = document.getElementById('action-btn');
const scoreboard = document.getElementById('scoreboard');
const turnInfo = document.getElementById('turn-info');
const msgOverlay = document.getElementById('message-overlay');
const winScreen = document.getElementById('win-screen');
const winnerText = document.getElementById('winner-text');

let numPlayers = 0, currentPlayer = 0, gameState = 'choosing';
let players = [], pins = [], slots = [], walls = [], ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 10, active: false, settleTimer: 0, color: '#fff' };
let launchX = 0;
const playerColors = ['#ff4444', '#44ff44', '#3399ff', '#ffaa00'];
const WIN_SCORE = 5;

function showMessage(text) {
    msgOverlay.innerText = text;
    msgOverlay.style.display = 'block';
    setTimeout(() => { msgOverlay.style.display = 'none'; }, 2000);
}

function startGame(n) {
    numPlayers = n;
    players = Array.from({length: n}, (_, i) => ({ id: i+1, color: playerColors[i], choice: null, score: 0 }));
    document.getElementById('setup-screen').style.display = 'none';
    init();
}

function init() {
    resize();
    createBoard();
    updateUI();
    loop();
    window.addEventListener('resize', () => { resize(); createBoard(); });
}

function resize() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    launchX = canvas.width / 2;
}

function createBoard() {
    pins = []; slots = []; walls = [];
    const rows = 8; 
    const spacingX = canvas.width / 7;
    
    const slotHeight = 85;
    const topMargin = 70;
    const playableHeight = canvas.height - slotHeight - topMargin;
    const spacingY = playableHeight / rows;

    for (let r = 0; r < rows; r++) {
        let cols = (r % 2 === 0) ? 6 : 5;
        let startX = (canvas.width - (cols - 1) * spacingX) / 2;
        for (let c = 0; c < cols; c++) {
            pins.push({ x: startX + c * spacingX, y: topMargin + r * spacingY, r: 6 });
        }
        
        let zigX = (r % 2 === 0) ? 12 : 35;
        walls.push({x: zigX, y: topMargin + r * spacingY, side: 'left'});
        walls.push({x: canvas.width - zigX, y: topMargin + r * spacingY, side: 'right'});
    }

    const slotW = canvas.width / 4;
    for (let i = 0; i < 4; i++) {
        slots.push({ x: i * slotW, y: canvas.height - slotHeight, w: slotW, h: slotHeight });
    }
}

function updateUI() {
    scoreboard.innerHTML = players.map(p => 
        `<div class="score-pill" style="background:${p.color}; border: 2px solid ${currentPlayer === p.id-1 ? 'white' : 'transparent'}">
            P${p.id}: ${p.score}/${WIN_SCORE}
        </div>`
    ).join('');
    
    const pNeedingChoice = players.find(p => p.choice === null);
    if (pNeedingChoice) {
        turnInfo.innerHTML = `P${pNeedingChoice.id}: TOCA UNA CESTA ABAJO`;
        gameState = 'choosing';
        actionBtn.disabled = true;
    } else {
        turnInfo.innerHTML = `P${players[currentPlayer].id}: ARRASTRA PARA APUNTAR`;
        gameState = 'positioning';
        actionBtn.disabled = false;
        actionBtn.innerText = "¡SOLTAR BOLA!";
    }
}

function handleInput(clientX, clientY, isDown) {
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    if (gameState === 'choosing' && isDown) {
        slots.forEach((s, i) => {
            if (x > s.x && x < s.x + s.w && y > s.y - 20) {
                if (!players.some(p => p.choice === i)) {
                    const p = players.find(p => p.choice === null);
                    if (p) { p.choice = i; updateUI(); }
                } else {
                    showMessage("CESTA OCUPADA");
                }
            }
        });
    }

    if (gameState === 'positioning') {
        launchX = Math.max(30, Math.min(canvas.width - 30, x));
    }
}

canvas.addEventListener('pointerdown', e => handleInput(e.clientX, e.clientY, true));
canvas.addEventListener('pointermove', e => {
    if (e.buttons > 0 || e.pointerType === 'touch') {
        handleInput(e.clientX, e.clientY, false);
    }
});

actionBtn.addEventListener('click', () => {
    if (gameState === 'positioning' && !ball.active) {
        gameState = 'dropping';
        actionBtn.disabled = true;
        ball.active = true;
        ball.x = launchX; ball.y = 40;
        ball.vx = (Math.random() - 0.5) * 4; ball.vy = 3;
        ball.color = players[currentPlayer].color;
        ball.settleTimer = 0;
    }
});

function loop() {
    if (ball.active) {
        ball.vy += 0.25;
        ball.x += ball.vx; ball.y += ball.vy;

        walls.forEach((w, i) => {
            const nextW = walls[i+2];
            if(nextW && w.side === nextW.side) {
                if (w.side === 'left' && ball.x < Math.max(w.x, nextW.x) + ball.radius && ball.y > w.y && ball.y < nextW.y) {
                    ball.vx = Math.abs(ball.vx) * 0.6 + 1.5;
                    ball.x = Math.max(w.x, nextW.x) + ball.radius;
                }
                if (w.side === 'right' && ball.x > Math.min(w.x, nextW.x) - ball.radius && ball.y > w.y && ball.y < nextW.y) {
                    ball.vx = -Math.abs(ball.vx) * 0.6 - 1.5;
                    ball.x = Math.min(w.x, nextW.x) - ball.radius;
                }
            }
        });

        pins.forEach(p => {
            const dx = ball.x - p.x, dy = ball.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < ball.radius + p.r) {
                const angle = Math.atan2(dy, dx);
                const speed = Math.sqrt(ball.vx**2 + ball.vy**2);
                ball.x = p.x + Math.cos(angle) * (ball.radius + p.r);
                ball.y = p.y + Math.sin(angle) * (ball.radius + p.r);
                ball.vx = Math.cos(angle) * speed * 0.75 + (Math.random()-0.5) * 1.5;
                ball.vy = Math.sin(angle) * speed * 0.75;
            }
        });

        const slotW = canvas.width / 4;
        for(let i=1; i<4; i++) {
            const sepX = i * slotW;
            if (ball.y > canvas.height - 95 && Math.abs(ball.x - sepX) < 6) {
                ball.vx *= -0.4;
                ball.x = ball.x < sepX ? sepX - 7 : sepX + 7;
            }
        }

        if (ball.y > canvas.height - ball.radius - 8) {
            ball.y = canvas.height - ball.radius - 8;
            ball.vy *= -0.15; ball.vx *= 0.6;
            ball.settleTimer++;
            if (ball.settleTimer > 35) finalizeTurn();
        }
    }
    draw();
    requestAnimationFrame(loop);
}

function finalizeTurn() {
    ball.active = false;
    const hitIndex = Math.floor(ball.x / (canvas.width / 4));
    const ownerOfSlot = players.find(p => p.choice === hitIndex);
    const launcher = players[currentPlayer];
    
    if (ownerOfSlot) {
        ownerOfSlot.score += 1;
        if (ownerOfSlot.id === launcher.id) {
            showMessage(`¡P${launcher.id} ANOTA!`);
        } else {
            showMessage(`P${launcher.id} REGALÓ PUNTO A P${ownerOfSlot.id}`);
        }
    } else {
        showMessage(`P${launcher.id} FALLÓ`);
    }

    const winner = players.find(p => p.score >= WIN_SCORE);
    if (winner) {
        winnerText.innerText = `¡P${winner.id} GANA!`;
        winnerText.style.color = winner.color;
        winScreen.style.display = 'flex';
        return;
    }

    currentPlayer = (currentPlayer + 1) % numPlayers;
    if (currentPlayer === 0) players.forEach(pl => pl.choice = null);
    updateUI();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "var(--plinko-yellow)";
    ctx.beginPath();
    ctx.moveTo(0,0);
    walls.filter(w => w.side === 'left').forEach(w => ctx.lineTo(w.x, w.y));
    ctx.lineTo(0, canvas.height); ctx.fill();

    ctx.beginPath();
    ctx.moveTo(canvas.width, 0);
    walls.filter(w => w.side === 'right').forEach(w => ctx.lineTo(w.x, w.y));
    ctx.lineTo(canvas.width, canvas.height); ctx.fill();

    ctx.fillStyle = "rgba(241, 211, 49, 0.3)";
    ctx.font = "900 28px Arial";
    ctx.textAlign = "center";
    ctx.fillText("PLINKO", canvas.width/2, 40);

    slots.forEach((s, i) => {
        const playerWhoChose = players.find(p => p.choice === i);
        ctx.fillStyle = "var(--plinko-yellow)";
        ctx.fillRect(s.x, s.y, 6, s.h);
        if(i === 3) ctx.fillRect(s.x + s.w - 6, s.y, 6, s.h);

        if (playerWhoChose) {
            ctx.fillStyle = playerWhoChose.color;
            ctx.globalAlpha = 0.3;
            ctx.fillRect(s.x + 6, s.y, s.w - 12, s.h);
            ctx.globalAlpha = 1;
            ctx.fillRect(s.x + 6, s.y + s.h - 10, s.w - 12, 10);
            
            ctx.fillStyle = "white";
            ctx.font = "bold 13px Arial";
            ctx.fillText("P" + playerWhoChose.id, s.x + s.w/2, s.y + s.h/2);
        }
    });

    pins.forEach(p => {
        ctx.fillStyle = "#b39b1a";
        ctx.beginPath(); ctx.arc(p.x + 2, p.y + 2, p.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "var(--plinko-yellow)";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    });

    if (gameState === 'positioning') {
        ctx.fillStyle = players[currentPlayer].color;
        ctx.shadowBlur = 10; ctx.shadowColor = "black";
        ctx.beginPath(); ctx.arc(launchX, 35, ball.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    } else if (ball.active) {
        ctx.fillStyle = ball.color;
        ctx.shadowBlur = 10; ctx.shadowColor = "black";
        ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}
</script>
</body>
</html>
