<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Torre de Hanoi — Templo Místico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg-deep:    #06080f;
    --bg-mid:     #0d1220;
    --surface:    #111827;
    --gold:       #c9993a;
    --gold-light: #f0c060;
    --gold-dim:   #7a5a1a;
    --teal:       #1de9b6;
    --teal-dim:   #0a6650;
    --crimson:    #e53935;
    --text:       #d4c8a8;
    --text-dim:   #7a6e50;
    --safe-bot: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
}

html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
}

/* ── BACKGROUND ───────────────────────────────────────────────────────── */
#bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
}

.bg-gradient {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
        radial-gradient(ellipse 80% 40% at 50% 100%, rgba(201,153,58,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 20% 50%,  rgba(29,233,182,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 50%,  rgba(229,57,53,0.05) 0%, transparent 60%),
        linear-gradient(180deg, #06080f 0%, #0d1220 60%, #111827 100%);
}

/* ── LAYOUT WRAPPER ───────────────────────────────────────────────────── */
#app {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
    padding-top: calc(var(--safe-top) + 8px);
    padding-bottom: calc(var(--safe-bot) + 8px);
    padding-left: 12px; padding-right: 12px;
    overflow-y: auto; overflow-x: hidden;
}

/* ── HEADER ───────────────────────────────────────────────────────────── */
header {
    text-align: center;
    padding: 8px 0 4px;
    width: 100%;
}

.title-rune {
    font-size: clamp(0.55rem, 1.5vw, 0.75rem);
    letter-spacing: 0.5em;
    color: var(--teal);
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4px;
    font-family: 'Cinzel', serif;
}

h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    letter-spacing: 0.05em;
    background: linear-gradient(160deg, var(--gold-light) 0%, var(--gold) 50%, #f0c060 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    line-height: 1.1;
    position: relative;
}

h1::after {
    content: '';
    display: block;
    margin: 6px auto 0;
    width: clamp(60px, 20%, 120px);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* ── STATS ROW ────────────────────────────────────────────────────────── */
.stats-row {
    display: flex;
    gap: 8px;
    margin: 8px 0;
    width: 100%;
    max-width: 520px;
    justify-content: center;
    flex-wrap: wrap;
}

.stat-pill {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,153,58,0.2);
    border-radius: 50px;
    padding: 5px 14px;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.8vw, 0.8rem);
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
}

.stat-pill .label { color: var(--text-dim); }
.stat-pill .value {
    color: var(--gold-light);
    font-weight: 700;
    min-width: 20px;
    text-align: center;
    transition: transform 0.2s;
}

.stat-pill .value.bump {
    animation: bump 0.3s ease;
}

@keyframes bump {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.4); color: #fff; }
}

/* ── CONTROLS ─────────────────────────────────────────────────────────── */
.controls {
    display: flex;
    gap: 8px;
    margin: 6px 0 8px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 520px;
}

.diff-btn, .action-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--gold-dim);
    background: rgba(201,153,58,0.08);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: clamp(0.6rem, 1.8vw, 0.75rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
}

.diff-btn:hover, .action-btn:hover {
    background: rgba(201,153,58,0.2);
    border-color: var(--gold);
    transform: translateY(-1px);
}

.diff-btn:active, .action-btn:active { transform: scale(0.95); }

.diff-btn.active {
    background: rgba(201,153,58,0.28);
    border-color: var(--gold-light);
    color: var(--gold-light);
    box-shadow: 0 0 12px rgba(201,153,58,0.3);
}

.action-btn {
    background: rgba(29,233,182,0.08);
    border-color: var(--teal-dim);
    color: var(--teal);
}

.action-btn:hover {
    background: rgba(29,233,182,0.2);
    border-color: var(--teal);
}

/* ── GAME AREA ────────────────────────────────────────────────────────── */
.game-area {
    position: relative;
    width: 100%;
    max-width: 660px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Flying disk canvas (on top) */
#anim-canvas {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
}

/* Towers container */
.towers-container {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
    padding: 0 4px;
    position: relative;
}

/* Base platform */
.platform {
    width: 100%;
    height: clamp(10px, 2.5vw, 18px);
    background: linear-gradient(180deg, var(--gold-dim) 0%, #3a2a08 100%);
    border-radius: 6px 6px 3px 3px;
    box-shadow: 0 4px 20px rgba(201,153,58,0.25), inset 0 1px 0 rgba(240,192,96,0.4);
    margin-top: 4px;
    position: relative;
}

.platform::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg,
        transparent 0%, rgba(240,192,96,0.15) 30%,
        rgba(240,192,96,0.05) 50%, rgba(240,192,96,0.15) 70%, transparent 100%);
    border-radius: inherit;
}

/* Individual tower */
.tower {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 4px;
    cursor: pointer;
    position: relative;
    -webkit-tap-highlight-color: transparent;
}

/* Tower label */
.tower-label {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.5rem, 1.4vw, 0.65rem);
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    transition: color 0.2s;
}

.tower.target .tower-label { color: var(--teal); }
.tower.source .tower-label  { color: var(--gold); }

/* The peg (pole) */
.peg-wrapper {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
}

.peg {
    width: clamp(8px, 2vw, 12px);
    background: linear-gradient(90deg, #2a3040, var(--surface), #2a3040);
    border-radius: 4px 4px 0 0;
    box-shadow: 0 0 8px rgba(0,0,0,0.5), inset 1px 0 0 rgba(255,255,255,0.07);
    transition: box-shadow 0.3s;
    z-index: 1;
}

.tower.target .peg { box-shadow: 0 0 16px rgba(29,233,182,0.5); }
.tower.source .peg  { box-shadow: 0 0 16px rgba(201,153,58,0.6); }

/* Tower hover glow */
.tower-glow {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 60px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    filter: blur(12px);
    z-index: 0;
}

.tower:hover .tower-glow, .tower.target .tower-glow { opacity: 1; }
.tower.target .tower-glow { background: rgba(29,233,182,0.3); opacity: 1; }
.tower.source .tower-glow  { background: rgba(201,153,58,0.3); opacity: 1; }
.tower:not(.target):not(.source):hover .tower-glow { background: rgba(255,255,255,0.1); opacity: 1; }

/* Disks */
.disk-stack {
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    width: 100%;
    position: relative;
    z-index: 2;
}

.disk {
    border-radius: clamp(4px, 1.5vw, 8px);
    height: clamp(16px, 4vw, 26px);
    margin-bottom: clamp(2px, 0.5vw, 4px);
    cursor: pointer;
    position: relative;
    transition: box-shadow 0.2s;
    overflow: hidden;
    will-change: transform;
}

.disk::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: rgba(255,255,255,0.18);
    border-radius: inherit inherit 0 0;
}

.disk::after {
    content: '';
    position: absolute;
    inset: 1px;
    border-radius: calc(clamp(4px,1.5vw,8px) - 1px);
    border-top: 1px solid rgba(255,255,255,0.3);
    border-bottom: 1px solid rgba(0,0,0,0.4);
    pointer-events: none;
}

.disk.lifting {
    animation: lift-disk 0.15s ease forwards;
}

@keyframes lift-disk {
    to { transform: translateY(-8px) scale(1.03); box-shadow: 0 12px 30px rgba(0,0,0,0.7); }
}

.disk.selected {
    transform: translateY(-12px) scale(1.04);
    box-shadow: 0 0 20px currentColor, 0 8px 30px rgba(0,0,0,0.8);
    z-index: 5;
    animation: float-selected 2s ease-in-out infinite;
}

@keyframes float-selected {
    0%,100% { transform: translateY(-12px) scale(1.04); }
    50%      { transform: translateY(-18px) scale(1.04); }
}

.disk.landing {
    animation: land-disk 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

@keyframes land-disk {
    from { transform: translateY(-20px) scale(1.05); }
    to   { transform: translateY(0) scale(1); }
}

.disk.invalid-shake {
    animation: shake 0.35s ease;
}

@keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(6px);  }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px);  }
}

/* ── MESSAGE ──────────────────────────────────────────────────────────── */
.message-box {
    min-height: 28px;
    text-align: center;
    margin: 6px 0 4px;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    transition: opacity 0.4s;
    padding: 0 12px;
}

.message-box.error  { color: var(--crimson); }
.message-box.hint   { color: var(--text-dim); }
.message-box.victory { color: var(--gold-light); }

/* ── HELP / OPTIMAL ───────────────────────────────────────────────────── */
.hint-row {
    font-size: clamp(0.55rem, 1.5vw, 0.68rem);
    color: var(--text-dim);
    letter-spacing: 0.03em;
    margin-bottom: 4px;
    font-style: italic;
}

/* ── VICTORY OVERLAY ──────────────────────────────────────────────────── */
#victory-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(6,8,15,0.88);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
}

#victory-overlay.show { display: flex; }

.victory-box {
    background: linear-gradient(135deg, #0d1220, #1a1f30);
    border: 1px solid var(--gold-dim);
    border-radius: 20px;
    padding: clamp(24px, 5vw, 40px) clamp(28px, 7vw, 60px);
    text-align: center;
    box-shadow: 0 0 60px rgba(201,153,58,0.3), 0 20px 60px rgba(0,0,0,0.8);
    animation: box-appear 0.5s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 340px;
    width: 90%;
}

@keyframes box-appear {
    from { transform: scale(0.5) translateY(30px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
}

.victory-crown { font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 8px; }

.victory-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
}

.victory-stats {
    display: flex; gap: 16px; justify-content: center; margin-bottom: 20px;
}

.v-stat {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,153,58,0.2);
    border-radius: 10px;
    padding: 8px 14px;
}

.v-stat .v-val {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold-light);
}

.v-stat .v-lbl {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.btn-play-again {
    padding: 12px 28px;
    border-radius: 10px;
    border: 1px solid var(--gold);
    background: linear-gradient(135deg, rgba(201,153,58,0.2), rgba(201,153,58,0.08));
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-play-again:hover {
    background: linear-gradient(135deg, rgba(201,153,58,0.4), rgba(201,153,58,0.15));
    box-shadow: 0 0 20px rgba(201,153,58,0.4);
    transform: translateY(-2px);
}

#victory-canvas {
    position: fixed; inset: 0; z-index: 99; pointer-events: none;
}

/* ── RESPONSIVE ───────────────────────────────────────────────────────── */
@media (max-height: 600px) {
    h1 { font-size: 1.2rem; }
    .stats-row { margin: 4px 0; }
    .controls { margin: 3px 0 5px; }
    .diff-btn, .action-btn { padding: 6px 12px; }
    .message-box { min-height: 20px; margin: 2px 0; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="bg-gradient"></div>

<div id="app">
    <header>
        <div class="title-rune">⛧ Templo Místico ⛧</div>
        <h1>Torre de Hanoi</h1>
    </header>

    <div class="stats-row">
        <div class="stat-pill">
            <span class="label">⚔ Movimientos</span>
            <span class="value" id="stat-moves">0</span>
        </div>
        <div class="stat-pill">
            <span class="label">🏆 Óptimo</span>
            <span class="value" id="stat-optimal">7</span>
        </div>
        <div class="stat-pill">
            <span class="label">⏱ Tiempo</span>
            <span class="value" id="stat-time">0:00</span>
        </div>
        <div class="stat-pill">
            <span class="label">🎖 Record</span>
            <span class="value" id="stat-best">—</span>
        </div>
    </div>

    <div class="controls">
        <button class="diff-btn active" data-disks="3" onclick="setDifficulty(this)">3 ✦ Novato</button>
        <button class="diff-btn"        data-disks="5" onclick="setDifficulty(this)">5 ✦ Sabio</button>
        <button class="diff-btn"        data-disks="7" onclick="setDifficulty(this)">7 ✦ Maestro</button>
        <button class="action-btn" onclick="resetGame()">↺ Reiniciar</button>
        <button class="action-btn" onclick="undoMove()">⟲ Deshacer</button>
    </div>

    <div class="game-area" id="game-area">
        <canvas id="anim-canvas"></canvas>
        <div class="towers-container" id="towers-container">
            <!-- Towers rendered by JS -->
        </div>
        <div class="platform"></div>
    </div>

    <div class="message-box hint" id="message">Toca una torre para seleccionar el disco superior</div>
    <div class="hint-row" id="hint-row">Pasos óptimos: <strong id="hint-steps">7</strong></div>
</div>

<!-- Victory Overlay -->
<canvas id="victory-canvas"></canvas>
<div id="victory-overlay">
    <div class="victory-box">
        <div class="victory-crown">👑</div>
        <div class="victory-title">¡Templo Conquistado!</div>
        <div class="victory-stats">
            <div class="v-stat"><div class="v-val" id="v-moves">0</div><div class="v-lbl">Movimientos</div></div>
            <div class="v-stat"><div class="v-val" id="v-time">0:00</div><div class="v-lbl">Tiempo</div></div>
            <div class="v-stat"><div class="v-val" id="v-eff">100%</div><div class="v-lbl">Eficiencia</div></div>
        </div>
        <button class="btn-play-again" onclick="playAgain()">⚔ Jugar de Nuevo</button>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  DISK COLORS — ancient gemstone palette
// ═══════════════════════════════════════════════════════════════════════════
const DISK_COLORS = [
    { base: '#c0392b', light: '#e74c3c', glow: 'rgba(231,76,60,0.6)'    }, // Ruby
    { base: '#d35400', light: '#e67e22', glow: 'rgba(230,126,34,0.6)'   }, // Amber
    { base: '#c9a227', light: '#f1c40f', glow: 'rgba(241,196,15,0.6)'   }, // Gold
    { base: '#27ae60', light: '#2ecc71', glow: 'rgba(46,204,113,0.6)'   }, // Emerald
    { base: '#1b6ca8', light: '#2980b9', glow: 'rgba(41,128,185,0.6)'   }, // Sapphire
    { base: '#5b2c8d', light: '#8e44ad', glow: 'rgba(142,68,173,0.6)'   }, // Amethyst
    { base: '#0e7b72', light: '#1abc9c', glow: 'rgba(26,188,156,0.6)'   }, // Teal
];

// ═══════════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════════
let towers = [[], [], []];
let numDisks = 3;
let selectedTower = null;
let moves = 0;
let history = [];      // for undo: array of {from, to}
let timerInterval = null;
let seconds = 0;
let gameStarted = false;
let bestScores = JSON.parse(localStorage.getItem('hanoi_best') || '{}');

// ═══════════════════════════════════════════════════════════════════════════
//  BG CANVAS — floating rune particles
// ═══════════════════════════════════════════════════════════════════════════
(function initBg() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    const RUNES = ['✦','⛧','◈','⟁','⊕','◉','⬡','⌖'];
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function spawnParticle() {
        return {
            x: Math.random() * canvas.width,
            y: canvas.height + 10,
            vy: -(0.15 + Math.random() * 0.3),
            vx: (Math.random() - 0.5) * 0.15,
            alpha: 0,
            maxAlpha: 0.06 + Math.random() * 0.1,
            size: 8 + Math.random() * 14,
            rune: RUNES[Math.floor(Math.random() * RUNES.length)],
            phase: Math.random() * Math.PI * 2,
        };
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (Math.random() < 0.03) particles.push(spawnParticle());
        particles = particles.filter(p => p.y > -30 && p.alpha >= 0);

        particles.forEach(p => {
            p.y += p.vy;
            p.x += p.vx + Math.sin(p.phase + performance.now() * 0.001) * 0.1;
            if (p.alpha < p.maxAlpha) p.alpha += 0.001;
            if (p.y < 60) p.alpha -= 0.002;
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.font = `${p.size}px serif`;
            ctx.fillStyle = '#c9993a';
            ctx.fillText(p.rune, p.x, p.y);
            ctx.restore();
        });
        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    resize();
    loop();
})();

// ═══════════════════════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════════════════════
function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('stat-time').textContent =
            `${Math.floor(seconds/60)}:${String(seconds%60).padStart(2,'0')}`;
    }, 1000);
}

function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function resetTimer() {
    stopTimer();
    seconds = 0;
    document.getElementById('stat-time').textContent = '0:00';
}

// ═══════════════════════════════════════════════════════════════════════════
//  INIT / RESET
// ═══════════════════════════════════════════════════════════════════════════
function setDifficulty(btn) {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    numDisks = parseInt(btn.dataset.disks);
    resetGame();
}

function resetGame() {
    towers = [[], [], []];
    for (let i = numDisks; i >= 1; i--) towers[0].push(i);
    selectedTower = null;
    moves = 0;
    history = [];
    gameStarted = false;
    resetTimer();

    const optimal = (1 << numDisks) - 1;
    document.getElementById('stat-optimal').textContent = optimal;
    document.getElementById('hint-steps').textContent = optimal;
    document.getElementById('stat-moves').textContent = '0';
    updateBestDisplay();
    setMessage('Toca una torre para comenzar tu leyenda', 'hint');
    renderTowers();
}

function updateBestDisplay() {
    const key = numDisks;
    const b = bestScores[key];
    document.getElementById('stat-best').textContent = b ? b : '—';
}

function playAgain() {
    document.getElementById('victory-overlay').classList.remove('show');
    resetGame();
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════════════
function getDiskWidth(size) {
    // Returns a % of the tower width (the peg wrapper)
    const minPct = 28;
    const maxPct = 92;
    return minPct + ((size - 1) / (numDisks - 1 || 1)) * (maxPct - minPct);
}

function pegHeight() {
    const area = document.getElementById('game-area');
    const h = area ? area.clientHeight : 260;
    return Math.min(Math.max(h * 0.55, 120), 220);
}

function renderTowers() {
    const container = document.getElementById('towers-container');
    const pHeight = pegHeight();

    container.innerHTML = '';

    ['I','II','III'].forEach((label, tIdx) => {
        const tw = document.createElement('div');
        tw.className = 'tower';
        tw.id = `tower-${tIdx}`;
        if (selectedTower === tIdx) tw.classList.add('source');
        tw.onclick = () => handleTowerClick(tIdx);

        // label
        const lbl = document.createElement('div');
        lbl.className = 'tower-label';
        lbl.textContent = `Pilar ${label}`;
        tw.appendChild(lbl);

        // peg wrapper
        const pegWrap = document.createElement('div');
        pegWrap.className = 'peg-wrapper';
        pegWrap.style.height = `${pHeight}px`;

        // disk stack
        const stack = document.createElement('div');
        stack.className = 'disk-stack';
        stack.style.position = 'absolute';
        stack.style.bottom = '0';
        stack.style.left = '0';
        stack.style.right = '0';
        stack.style.display = 'flex';
        stack.style.flexDirection = 'column-reverse';
        stack.style.alignItems = 'center';

        towers[tIdx].forEach((size, dIdx) => {
            const disk = document.createElement('div');
            disk.className = 'disk';
            disk.id = `disk-${tIdx}-${dIdx}`;
            const w = getDiskWidth(size);
            disk.style.width = `${w}%`;
            const col = DISK_COLORS[(size - 1) % DISK_COLORS.length];
            disk.style.background = `linear-gradient(160deg, ${col.light} 0%, ${col.base} 60%, ${col.base}cc 100%)`;
            disk.style.boxShadow = `0 2px 8px rgba(0,0,0,0.5), 0 0 0 1px ${col.base}88`;
            disk.style.color = col.glow;

            // Is this the top (selected) disk?
            if (selectedTower === tIdx && dIdx === towers[tIdx].length - 1) {
                disk.classList.add('selected');
                disk.style.boxShadow = `0 0 18px ${col.glow}, 0 8px 24px rgba(0,0,0,0.7)`;
                tw.classList.add('source');
            }

            stack.appendChild(disk);
        });

        // peg
        const peg = document.createElement('div');
        peg.className = 'peg';
        peg.style.height = `${pHeight}px`;
        peg.style.position = 'absolute';
        peg.style.bottom = '0';

        // glow
        const glow = document.createElement('div');
        glow.className = 'tower-glow';

        pegWrap.appendChild(peg);
        pegWrap.appendChild(stack);
        pegWrap.appendChild(glow);
        tw.appendChild(pegWrap);
        container.appendChild(tw);
    });
}

// ═══════════════════════════════════════════════════════════════════════════
//  FLYING DISK ANIMATION (arc trajectory)
// ═══════════════════════════════════════════════════════════════════════════
function animateDiskFly(fromTIdx, toTIdx, diskSize, onDone) {
    const canvas = document.getElementById('anim-canvas');
    const ctx = canvas.getContext('2d');

    // Match canvas size to game-area
    const area = document.getElementById('game-area');
    const rect = area.getBoundingClientRect();
    canvas.width  = rect.width;
    canvas.height = rect.height;

    // Get start & end positions relative to canvas
    function getTowerCenter(tIdx) {
        const tw = document.getElementById(`tower-${tIdx}`);
        const twRect = tw.getBoundingClientRect();
        const x = twRect.left + twRect.width / 2 - rect.left;
        return x;
    }

    function getTopDiskY(tIdx, numDisks, diskCount) {
        const pHeight = pegHeight();
        const diskH = parseInt(getComputedStyle(document.querySelector('.disk') || document.documentElement)
            .getPropertyValue('height')) || 22;
        const dH = Math.min(Math.max(rect.height * 0.07, 16), 26);
        const gap = 3;
        return (rect.height - (dH + gap) * diskCount - dH/2);
    }

    const col = DISK_COLORS[(diskSize - 1) % DISK_COLORS.length];
    const dH = Math.min(Math.max(rect.height * 0.07, 16), 26);

    const x0 = getTowerCenter(fromTIdx);
    const x1 = getTowerCenter(toTIdx);
    const y0 = getTopDiskY(fromTIdx, numDisks, towers[fromTIdx].length + 1);
    const y1 = getTopDiskY(toTIdx, numDisks, towers[toTIdx].length);
    // Arc peak
    const arcY = Math.min(y0, y1) - rect.height * 0.28;

    const w = getDiskWidth(diskSize) / 100 * (rect.width / 3);
    const duration = 380;
    let start = null;

    function bezier(t, p0, p1, p2) {
        return (1-t)*(1-t)*p0 + 2*(1-t)*t*p1 + t*t*p2;
    }

    function draw(ts) {
        if (!start) start = ts;
        const t = Math.min((ts - start) / duration, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const cx = bezier(ease, x0, (x0+x1)/2, x1);
        const cy = bezier(ease, y0, arcY, y1);

        // Draw disk shadow
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.beginPath();
        ctx.ellipse(cx, cy + dH/2 + 8, w/2 * 0.8, 6, 0, 0, Math.PI*2);
        ctx.fillStyle = '#000';
        ctx.fill();
        ctx.restore();

        // Draw disk
        ctx.save();
        const grad = ctx.createLinearGradient(cx - w/2, cy, cx + w/2, cy + dH);
        grad.addColorStop(0, col.light);
        grad.addColorStop(0.6, col.base);
        const r = Math.min(8, dH * 0.35);
        ctx.beginPath();
        ctx.roundRect(cx - w/2, cy, w, dH, r);
        ctx.fillStyle = grad;
        ctx.fill();
        // Shine
        ctx.beginPath();
        ctx.roundRect(cx - w/2 + 2, cy + 2, w - 4, dH * 0.38, r);
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.fill();
        // Glow
        ctx.shadowColor = col.glow;
        ctx.shadowBlur = 18;
        ctx.strokeStyle = col.glow;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();

        // Particle trail
        if (t < 0.95) {
            for (let i = 0; i < 3; i++) {
                const tx = cx + (Math.random() - 0.5) * w * 0.6;
                const ty = cy + (Math.random() - 0.5) * dH;
                ctx.save();
                ctx.globalAlpha = (1 - t) * 0.35 * Math.random();
                ctx.beginPath();
                ctx.arc(tx, ty, Math.random() * 3, 0, Math.PI*2);
                ctx.fillStyle = col.light;
                ctx.fill();
                ctx.restore();
            }
        }

        if (t < 1) {
            requestAnimationFrame(draw);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            onDone();
        }
    }

    requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════════════════════════
let animating = false;

function handleTowerClick(tIdx) {
    if (animating) return;
    if (!gameStarted) {
        gameStarted = true;
        startTimer();
    }

    if (selectedTower === null) {
        if (towers[tIdx].length === 0) {
            setMessage('Torre vacía — elige otra', 'error');
            flashTower(tIdx, 'error');
            return;
        }
        selectedTower = tIdx;
        renderTowers();
        setMessage('Ahora elige el destino', 'hint');
    } else {
        if (tIdx === selectedTower) {
            selectedTower = null;
            renderTowers();
            setMessage('Selección cancelada', 'hint');
            return;
        }

        const srcDisk = towers[selectedTower][towers[selectedTower].length - 1];
        const dstTop  = towers[tIdx][towers[tIdx].length - 1];

        if (dstTop !== undefined && srcDisk > dstTop) {
            setMessage('¡Disco mayor no puede ir sobre uno menor!', 'error');
            shakeTopDisk(selectedTower);
            return;
        }

        // Valid move — animate
        animating = true;
        const diskSize = towers[selectedTower].pop();
        history.push({ from: selectedTower, to: tIdx, size: diskSize });
        const fromTIdx = selectedTower;
        selectedTower = null;
        renderTowers(); // hide selected state

        animateDiskFly(fromTIdx, tIdx, diskSize, () => {
            towers[tIdx].push(diskSize);
            moves++;
            bumpStat('stat-moves', moves);
            renderTowers();
            landEffect(tIdx);
            animating = false;

            if (towers[2].length === numDisks) {
                setTimeout(showVictory, 350);
            } else {
                setMessage('', 'hint');
            }
        });
    }
}

function undoMove() {
    if (animating || history.length === 0) return;
    const last = history.pop();
    const disk = towers[last.to].pop();
    towers[last.from].push(disk);
    moves = Math.max(0, moves - 1);
    bumpStat('stat-moves', moves);
    selectedTower = null;
    renderTowers();
    setMessage('Movimiento deshecho', 'hint');
}

// ═══════════════════════════════════════════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════════════════════════════════════════
function flashTower(tIdx, type) {
    const tw = document.getElementById(`tower-${tIdx}`);
    if (!tw) return;
    tw.style.transition = 'background 0.1s';
    tw.style.background = type === 'error' ? 'rgba(229,57,53,0.15)' : 'rgba(29,233,182,0.1)';
    setTimeout(() => { tw.style.background = ''; }, 300);
}

function shakeTopDisk(tIdx) {
    const stack = document.querySelector(`#tower-${tIdx} .disk-stack`);
    if (!stack) return;
    const top = stack.lastElementChild;
    if (!top) return;
    top.classList.add('invalid-shake');
    setTimeout(() => top.classList.remove('invalid-shake'), 400);
}

function landEffect(tIdx) {
    const stack = document.querySelector(`#tower-${tIdx} .disk-stack`);
    if (!stack) return;
    const top = stack.lastElementChild;
    if (!top) return;
    top.classList.add('landing');
    setTimeout(() => top.classList.remove('landing'), 350);
}

function bumpStat(id, val) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = val;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
}

function setMessage(txt, type) {
    const el = document.getElementById('message');
    el.textContent = txt;
    el.className = `message-box ${type}`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  VICTORY
// ═══════════════════════════════════════════════════════════════════════════
function showVictory() {
    stopTimer();
    const optimal = (1 << numDisks) - 1;
    const eff = Math.round((optimal / moves) * 100);
    const timeStr = `${Math.floor(seconds/60)}:${String(seconds%60).padStart(2,'0')}`;

    // Save best
    const key = numDisks;
    if (!bestScores[key] || moves < bestScores[key]) {
        bestScores[key] = moves;
        localStorage.setItem('hanoi_best', JSON.stringify(bestScores));
        updateBestDisplay();
    }

    document.getElementById('v-moves').textContent = moves;
    document.getElementById('v-time').textContent  = timeStr;
    document.getElementById('v-eff').textContent   = `${Math.min(eff, 100)}%`;

    document.getElementById('victory-overlay').classList.add('show');
    launchFireworks();
}

// ═══════════════════════════════════════════════════════════════════════════
//  FIREWORKS
// ═══════════════════════════════════════════════════════════════════════════
function launchFireworks() {
    const canvas = document.getElementById('victory-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const FIREWORK_COLORS = ['#fbbf24','#f97316','#ef4444','#a855f7','#1de9b6','#4f8ef7','#22c55e','#f0c060'];

    function burst(x, y) {
        const color = FIREWORK_COLORS[Math.floor(Math.random() * FIREWORK_COLORS.length)];
        for (let i = 0; i < 55; i++) {
            const angle = (Math.PI * 2 / 55) * i + Math.random() * 0.3;
            const speed = 2.5 + Math.random() * 4;
            particles.push({
                x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
                alpha: 1, life: 0.015 + Math.random() * 0.01,
                size: 2 + Math.random() * 3,
                color, tail: [],
            });
        }
    }

    const bursts = [
        [canvas.width*0.25, canvas.height*0.3],
        [canvas.width*0.75, canvas.height*0.25],
        [canvas.width*0.5,  canvas.height*0.2],
        [canvas.width*0.15, canvas.height*0.5],
        [canvas.width*0.85, canvas.height*0.4],
    ];
    let bi = 0;
    function nextBurst() {
        if (bi < bursts.length) {
            burst(...bursts[bi++]);
            if (bi < bursts.length) setTimeout(nextBurst, 160);
        }
    }
    nextBurst();

    function loop() {
        ctx.fillStyle = 'rgba(6,8,15,0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x  += p.vx;   p.y  += p.vy;
            p.vy += 0.09;   p.vx *= 0.99;
            p.alpha -= p.life;
            if (p.alpha <= 0) { particles.splice(i, 1); continue; }

            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.restore();
        }

        if (particles.length > 0) {
            requestAnimationFrame(loop);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }
    requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════════════
//  RESPONSIVE: resize redraws
// ═══════════════════════════════════════════════════════════════════════════
let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(renderTowers, 120);
});

// ═══════════════════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════════════════
resetGame();
</script>
