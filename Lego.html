<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProBuilder Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-cad: #f0f4f8;
            --grid-color: #cbd5e1;
        }
        body {
            margin: 0; padding: 0;
            overflow: hidden;
            background: #0f172a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            touch-action: none; /* Bloqueo estricto de gestos del navegador */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Cuadrícula estilo Blueprint/CAD */
        .cad-background {
            background-color: var(--bg-cad);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px; /* Unidad base = 30px */
            background-position: center center;
        }

        /* Ocultar barra de scroll en categorías */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Pantalla de inicio */
        #home-screen {
            position: fixed; inset: 0;
            background: #0f172a; z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* UI Flotante para piezas seleccionadas */
        #context-menu {
            position: absolute;
            transform: translate(-50%, -120%);
            display: none;
            pointer-events: auto;
            z-index: 30;
        }

        /* Panel inferior con margen extra para evitar que la barra de Samsung lo tape */
        .bottom-panel {
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }

    </style>
</head>
<body class="flex flex-col h-[100dvh] w-[100dvw] relative">

        <!-- Panel Inferior: Categorías y Elementos -->
        <div class="bg-slate-900 z-20 shrink-0 border-t border-slate-800 shadow-[0_-10px_30px_rgba(0,0,0,0.3)] bottom-panel">

                    <div class="w-10 h-6 bg-blue-500 rounded-sm shadow-inner flex gap-1 items-center justify-center px-1">
                        <div class="w-3 h-3 rounded-full bg-blue-600/50"></div><div class="w-3 h-3 rounded-full bg-blue-600/50"></div>

                <button onclick="addBlock(3,1)" class="w-20 h-14 bg-slate-800 rounded-lg flex items-center justify-center border border-slate-700 hover:border-blue-500 active:scale-95 shrink-0">
                    <div class="w-14 h-6 bg-green-500 rounded-sm shadow-inner flex gap-1 items-center justify-center px-1">
                        <div class="w-3 h-3 rounded-full bg-green-600/50"></div><div class="w-3 h-3 rounded-full bg-green-600/50"></div><div class="w-3 h-3 rounded-full bg-green-600/50"></div>
                    </div>
                </button>
                <button onclick="addBlock(4,2)" class="w-24 h-14 bg-slate-800 rounded-lg flex items-center justify-center border border-slate-700 hover:border-blue-500 active:scale-95 shrink-0">
                    <div class="w-16 h-10 bg-yellow-500 rounded-sm shadow-inner flex flex-wrap gap-1 p-1">
                        <div class="w-3 h-3 rounded-full bg-yellow-600/50"></div><div class="w-3 h-3 rounded-full bg-yellow-600/50"></div><div class="w-3 h-3 rounded-full bg-yellow-600/50"></div><div class="w-3 h-3 rounded-full bg-yellow-600/50"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-600/50"></div><div class="w-3 h-3 rounded-full bg-yellow-600/50"></div><div class="w-3 h-3 rounded-full bg-yellow-600/50"></div><div class="w-3 h-3 rounded-full bg-yellow-600/50"></div>
                    </div>
                </button>
                <button onclick="addBlock(2,2)" class="w-16 h-14 bg-slate-800 rounded-lg flex items-center justify-center border border-slate-700 hover:border-blue-500 active:scale-95 shrink-0">
                    <div class="w-10 h-10 bg-slate-500 rounded-sm shadow-inner flex flex-wrap gap-1 p-1">
                        <div class="w-3 h-3 rounded-full bg-slate-600/50"></div><div class="w-3 h-3 rounded-full bg-slate-600/50"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600/50"></div><div class="w-3 h-3 rounded-full bg-slate-600/50"></div>
                    </div>
                </button>
            </div>

            <div id="tray-stickers" class="hidden gap-4 p-4 overflow-x-auto no-scrollbar items-center">

                <button onclick="addSticker('🏠')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Casa">🏠</button>

                <button onclick="addSticker('🚧')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Valla">🚧</button>
                <button onclick="addSticker('🚦')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Semáforo">🚦</button>
                <button onclick="addSticker('🏁')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Meta">🏁</button>
                <button onclick="addSticker('⚡')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Rayo">⚡</button>
                <button onclick="addSticker('❤️')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Corazón">❤️</button>
                <button onclick="addSticker('🔋')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Batería">🔋</button>
                <button onclick="addSticker('🔧')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Herramienta">🔧</button>
                <button onclick="addSticker('🌳')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Árbol">🌳</button>
                <button onclick="addSticker('🐶')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Perro">🐶</button>
                <button onclick="addSticker('🚀')" class="w-14 h-14 bg-slate-800 rounded-lg text-3xl active:scale-95 shrink-0" title="Cohete">🚀</button>

    <!-- UI DE NOTIFICACIÓN TOAST -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full font-bold shadow-xl transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        Mensaje
    </div>

    <script>
        // --- MOTOR GRÁFICO ORIENTADO A OBJETOS ---
        const canvas = document.getElementById('appCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const contextMenu = document.getElementById('context-menu');
        
        const UNIT = 30; // Tamaño base de un "stud"
        const HANDLE_RADIUS = 16; 
        
        let objects = [];
        let selectedObj = null;
        
        let isDragging = false;
        let isRotating = false;
        let startX = 0, startY = 0;
        let initialObjX = 0, initialObjY = 0, initialObjRot = 0;

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            render();
        }
        window.addEventListener('resize', resizeCanvas);

        class BaseObject {
            constructor(x, y) {
                this.id = Date.now() + Math.random();
                this.x = x;
                this.y = y;
                this.rotation = 0;
            }
            localPoint(px, py) {
                const tx = px - this.x;
                const ty = py - this.y;
                const cos = Math.cos(-this.rotation);
                const sin = Math.sin(-this.rotation);
                return {
                    x: tx * cos - ty * sin,
                    y: tx * sin + ty * cos
                };
            }
            
            // Ayudante matemático avanzado para calcular el AABB (Alineado a 90 grados)
            getEffectiveBounds() {
                const isRotated90 = Math.abs(Math.sin(this.rotation)) > 0.5;
                const effW = isRotated90 ? this.h : this.w;
                const effH = isRotated90 ? this.w : this.h;
                return { w: effW, h: effH };
            }
        }

        class LegoBlock extends BaseObject {
            constructor(x, y, cols, rows, color) {
                super(x, y);
                this.cols = cols;
                this.rows = rows;
                this.w = cols * UNIT;
                this.h = rows * UNIT;
                this.color = color;
                this.type = 'block';
            }

            draw(ctx, isSelected) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.fillStyle = this.color;
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 4;
                
                const rx = -this.w / 2;
                const ry = -this.h / 2;
                ctx.beginPath();
                ctx.roundRect(rx, ry, this.w, this.h, 4);
                ctx.fill();

                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(rx + 2, ry + 2, this.w - 4, this.h - 4);

                ctx.fillStyle = this.color;
                ctx.lineWidth = 1.5;
                for (let c = 0; c < this.cols; c++) {
                    for (let r = 0; r < this.rows; r++) {
                        const sx = rx + (c * UNIT) + (UNIT / 2);
                        const sy = ry + (r * UNIT) + (UNIT / 2);
                        
                        ctx.beginPath();
                        ctx.arc(sx, sy + 1, UNIT * 0.3, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0,0,0,0.2)';
                        ctx.fill();

                        ctx.beginPath();
                        ctx.arc(sx, sy, UNIT * 0.3, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                        
                        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                        ctx.beginPath();
                        ctx.arc(sx, sy, UNIT * 0.2, Math.PI, Math.PI * 1.5);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }

            hitTest(px, py) {
                const loc = this.localPoint(px, py);
                return loc.x >= -this.w/2 && loc.x <= this.w/2 && loc.y >= -this.h/2 && loc.y <= this.h/2;
            }
        }

        class Sticker extends BaseObject {
            constructor(x, y, emoji) {
                super(x, y);
                this.emoji = emoji;
                this.size = 60;
                this.w = this.size;
                this.h = this.size;
                this.type = 'sticker';
            }

            draw(ctx, isSelected) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 4;
                
                ctx.fillStyle = 'white';
                for(let i=0; i<8; i++) {
                    ctx.fillText(this.emoji, Math.cos(i)*3, Math.sin(i)*3);
                }
                
                ctx.shadowColor = 'transparent';
                ctx.fillText(this.emoji, 0, 0);
                
                ctx.restore();
            }

            hitTest(px, py) {
                const loc = this.localPoint(px, py);
                return loc.x >= -this.w/2 && loc.x <= this.w/2 && loc.y >= -this.h/2 && loc.y <= this.h/2;
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            objects.forEach(obj => {
                obj.draw(ctx, obj === selectedObj);
            });

            if (selectedObj) {
                ctx.save();
                ctx.translate(selectedObj.x, selectedObj.y);
                ctx.rotate(selectedObj.rotation);

                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(-selectedObj.w/2 - 4, -selectedObj.h/2 - 4, selectedObj.w + 8, selectedObj.h + 8);
                
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(0, -selectedObj.h/2 - 4);
                ctx.lineTo(0, -selectedObj.h/2 - 30);
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(0, -selectedObj.h/2 - 30, HANDLE_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.stroke();
                
                ctx.fillStyle = '#3b82f6';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('↻', 0, -selectedObj.h/2 - 30);

                ctx.restore();
                updateContextMenu();
            } else {
                contextMenu.style.display = 'none';
            }
        }

        function updateContextMenu() {
            if (!selectedObj) return;
            if (isDragging || isRotating) {
                contextMenu.style.display = 'none';
                return;
            }
            contextMenu.style.display = 'flex';
            const radius = Math.max(selectedObj.w, selectedObj.h) / 2 + 50; 
            contextMenu.style.left = `${selectedObj.x}px`;
            contextMenu.style.top = `${selectedObj.y - radius}px`;

            // Actualizar el selector de color personalizado si es un bloque
            if (selectedObj.type === 'block') {
                document.getElementById('customColor').value = selectedObj.color;
            }
        }

        // --- SISTEMA MATEMÁTICO DE COLISIÓN (AABB para 90°) ---
        function checkCollision(testObj, newX, newY, newRot) {
            if (testObj.type !== 'block') return false; 
            
            // Calculamos la caja delimitadora (AABB) considerando ángulos de 90 grados
            const isRotated90 = Math.abs(Math.sin(newRot)) > 0.5;
            const w1 = isRotated90 ? testObj.h : testObj.w;
            const h1 = isRotated90 ? testObj.w : testObj.h;
            
            // Restamos 2 píxeles de tolerancia 
            const r1 = { x: newX - w1/2 + 1, y: newY - h1/2 + 1, w: w1 - 2, h: h1 - 2 };

            for (let obj of objects) {
                if (obj === testObj || obj.type !== 'block') continue;
                
                const bounds2 = obj.getEffectiveBounds();
                const r2 = { x: obj.x - bounds2.w/2, y: obj.y - bounds2.h/2, w: bounds2.w, h: bounds2.h };

                // Intersección de rectángulos
                if (r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
                    r1.y < r2.y + r2.h && r1.y + r1.h > r2.y) {
                    return true; 
                }
            }
            return false;
        }

        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;

            if (selectedObj) {
                const loc = selectedObj.localPoint(px, py);
                const handleY = -selectedObj.h/2 - 30;
                const distToHandle = Math.hypot(loc.x, loc.y - handleY);
                
                if (distToHandle <= HANDLE_RADIUS + 10) { 
                    isRotating = true;
                    startX = px;
                    startY = py;
                    initialObjRot = selectedObj.rotation;
                    initialObjX = selectedObj.x;
                    initialObjY = selectedObj.y;
                    canvas.setPointerCapture(e.pointerId);
                    contextMenu.style.display = 'none';
                    return;
                }
            }

            let hit = false;
            for (let i = objects.length - 1; i >= 0; i--) {
                if (objects[i].hitTest(px, py)) {
                    selectedObj = objects[i];
                    
                    objects.splice(i, 1);
                    objects.push(selectedObj);
                    
                    isDragging = true;
                    startX = px;
                    startY = py;
                    initialObjX = selectedObj.x;
                    initialObjY = selectedObj.y;
                    initialObjRot = selectedObj.rotation;
                    
                    hit = true;
                    canvas.setPointerCapture(e.pointerId);
                    contextMenu.style.display = 'none';
                    render();
                    break;
                }
            }

            if (!hit) {
                selectedObj = null;
                render();
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDragging && !isRotating) return;
            
            const rect = canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;

            if (isDragging && selectedObj) {
                const dx = px - startX;
                const dy = py - startY;
                selectedObj.x = initialObjX + dx;
                selectedObj.y = initialObjY + dy;
            } 
            else if (isRotating && selectedObj) {
                const cx = selectedObj.x;
                const cy = selectedObj.y;
                const angle = Math.atan2(py - cy, px - cx);
                let finalAngle = angle + Math.PI / 2;
                
                // RESTRICCIÓN LEGO: Solo giros de 90° exactos (Math.PI / 2) para encaje perfecto
                const snapAngle = Math.PI / 2; 
                selectedObj.rotation = Math.round(finalAngle / snapAngle) * snapAngle;
            }
            render();
        });

        canvas.addEventListener('pointerup', (e) => {
            if (isDragging || isRotating) {
                if (selectedObj) {
                    const bounds = selectedObj.getEffectiveBounds();
                    
                    let topLeftX = Math.round((selectedObj.x - bounds.w/2) / UNIT) * UNIT;
                    let topLeftY = Math.round((selectedObj.y - bounds.h/2) / UNIT) * UNIT;
                    
                    let targetX = topLeftX + bounds.w/2;
                    let targetY = topLeftY + bounds.h/2;

                    if (checkCollision(selectedObj, targetX, targetY, selectedObj.rotation)) {
                        selectedObj.x = initialObjX;
                        selectedObj.y = initialObjY;
                        selectedObj.rotation = initialObjRot;
                        showToast("Espacio Ocupado 🚫");
                    } else {
                        selectedObj.x = targetX;
                        selectedObj.y = targetY;
                        if(isDragging) {
                            ctx.fillStyle = 'rgba(255,255,255,0.3)';
                            ctx.fillRect(topLeftX, topLeftY, bounds.w, bounds.h);
                        }
                    }
                }
            }

            isDragging = false;
            isRotating = false;
            canvas.releasePointerCapture(e.pointerId);
            render(); 
        });

        // --- ACCIONES DE UI ---

        function addBlock(cols, rows) {
            const colors = ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#64748b'];
            let color = colors[cols % colors.length]; 
            if(cols===2 && rows===2) color = '#64748b'; 
            if(cols===4) color = '#eab308'; 
            
            let x = Math.round((canvas.width / 2) / UNIT) * UNIT;
            let y = Math.round((canvas.height / 2) / UNIT) * UNIT;
            
            const block = new LegoBlock(x, y, cols, rows, color);
            
            while(checkCollision(block, block.x, block.y, block.rotation)) {
                block.x += UNIT;
                block.y -= UNIT;
            }

            objects.push(block);
            selectedObj = block;
            render();
            showToast("Bloque añadido");
        }

        function addSticker(emoji) {
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            const sticker = new Sticker(x, y, emoji);
            objects.push(sticker);
            selectedObj = sticker;
            render();
            showToast("Sticker añadido");
        }

        function deleteSelected() {
            if (!selectedObj) return;
            objects = objects.filter(o => o !== selectedObj);
            selectedObj = null;
            render();
            showToast("Elemento eliminado");
        }

        function duplicateSelected() {
            if (!selectedObj) return;
            
            let newObj;
            let spawnX = selectedObj.x + UNIT;
            let spawnY = selectedObj.y + UNIT;

            if (selectedObj.type === 'block') {
                newObj = new LegoBlock(spawnX, spawnY, selectedObj.cols, selectedObj.rows, selectedObj.color);
                newObj.rotation = selectedObj.rotation;
                
                // Buscar espacio libre si hay colisión
                while(checkCollision(newObj, newObj.x, newObj.y, newObj.rotation)) {
                    newObj.x += UNIT;
                    newObj.y -= UNIT;
                }
            } else if (selectedObj.type === 'sticker') {
                newObj = new Sticker(spawnX, spawnY, selectedObj.emoji);
                newObj.rotation = selectedObj.rotation;
            }

            objects.push(newObj);
            selectedObj = newObj;
            render();
            showToast("Elemento duplicado 📑");
        }

        function changeColor(color) {
            if (!selectedObj || selectedObj.type !== 'block') return;
            selectedObj.color = color;
            render();
        }

        function clearCanvas() {
            if (objects.length === 0) return;
            if (confirm("¿Estás seguro de que deseas limpiar la mesa de trabajo?")) {
                objects = [];
                selectedObj = null;
                render();
                showToast("Mesa limpiada");
            }
        }

        function exportCanvas() {
            const tempSelected = selectedObj;
            selectedObj = null;
            render();

            const dataURL = canvas.toDataURL('image/png');
            
            selectedObj = tempSelected;
            render();

            const link = document.createElement('a');
            link.download = 'ProBuilder_Project.png';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Diseño Guardado 💾");
        }

        function switchTab(tab) {
            document.getElementById('tray-blocks').style.display = tab === 'blocks' ? 'flex' : 'none';
            document.getElementById('tray-stickers').style.display = tab === 'stickers' ? 'flex' : 'none';
            
            document.getElementById('tab-blocks').className = tab === 'blocks' ? "flex-1 py-3 text-sm font-bold border-b-2 border-blue-500 text-blue-400" : "flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500";
            document.getElementById('tab-stickers').className = tab === 'stickers' ? "flex-1 py-3 text-sm font-bold border-b-2 border-blue-500 text-blue-400" : "flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500";
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function startApp() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('workspace').classList.remove('hidden');
            setTimeout(() => {
                resizeCanvas();
                if(objects.length === 0) {
                    addBlock(4,2); 
                }
            }, 50);
        }

        function goHome() {
            document.getElementById('workspace').classList.add('hidden');
            document.getElementById('home-screen').style.display = 'flex';
        }

    </script>
</body>
</html>
