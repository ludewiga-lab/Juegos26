<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🎨 Pintura Mágica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --top-h: 54px;
    --bot-h: 130px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
    --bg: #1a1033;
    --panel: #241642;
    --panel2: #2e1c55;
    --border: rgba(255,255,255,0.1);
    --txt: #fff;
    --txt-dim: rgba(255,255,255,0.5);
    --radius: 14px;
    --font: 'Fredoka', sans-serif;
}

html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font);
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
}

/* ── LAYOUT ────────────────────────────────────────────────── */
#app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
}

/* ── TOP BAR ───────────────────────────────────────────────── */
#topbar {
    flex-shrink: 0;
    height: calc(var(--top-h) + var(--safe-top));
    padding-top: var(--safe-top);
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    padding-left: 10px;
    padding-right: 10px;
    gap: 6px;
    position: relative;
    z-index: 20;
    box-shadow: 0 3px 16px rgba(0,0,0,0.4);
}

.app-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.01em;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
}

.app-title span { font-size: 1.4rem; }

/* Current color preview */
#color-preview {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 10px currentColor, inset 0 1px 0 rgba(255,255,255,0.3);
    flex-shrink: 0;
    transition: background 0.2s;
    cursor: pointer;
    position: relative;
}

/* Top action buttons */
.top-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    border: none;
    background: var(--panel2);
    color: var(--txt);
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
}

.top-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.15); }

.top-btn.danger:active { background: rgba(239,68,68,0.35); }
.top-btn.save:active   { background: rgba(34,197,94,0.35); }

/* ── CANVAS AREA ───────────────────────────────────────────── */
#canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
    background: #fff;
}

#main-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
    touch-action: none;
}

/* Sparkle particles */
.sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 1rem;
    animation: sparkle-fly 0.7s ease forwards;
    z-index: 10;
}

@keyframes sparkle-fly {
    0%   { transform: scale(0) rotate(0deg); opacity: 1; }
    60%  { transform: scale(1.2) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg) translateY(-30px); opacity: 0; }
}

/* Tool cursor indicator */
#cursor-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.5);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 15;
    transition: width 0.1s, height 0.1s;
    display: none;
}

/* ── BOTTOM PANEL ──────────────────────────────────────────── */
#bottom-panel {
    flex-shrink: 0;
    background: var(--panel);
    border-top: 2px solid var(--border);
    padding-bottom: var(--safe-bot);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
    z-index: 20;
}

/* ── COLOR ROW ─────────────────────────────────────────────── */
#color-row {
    display: flex;
    align-items: center;
    padding: 8px 10px 4px;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
}
#color-row::-webkit-scrollbar { display: none; }

.color-swatch {
    width: 34px; height: 34px;
    min-width: 34px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
    position: relative;
}

.color-swatch:active { transform: scale(0.85); }

.color-swatch.active {
    border-color: #fff;
    transform: scale(1.2);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.5);
}

/* Custom color button */
#custom-color-btn {
    width: 34px; height: 34px;
    min-width: 34px;
    border-radius: 50%;
    background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red);
    border: 3px solid rgba(255,255,255,0.4);
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
}
#custom-color-btn:active { transform: scale(0.85); }
#custom-color-btn::after {
    content: '+';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
#color-input { display: none; }

/* ── TOOL ROW ──────────────────────────────────────────────── */
#tool-row {
    display: flex;
    align-items: center;
    padding: 4px 8px 6px;
    gap: 5px;
    overflow-x: auto;
    scrollbar-width: none;
}
#tool-row::-webkit-scrollbar { display: none; }

.tool-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 52px;
    height: 52px;
    border-radius: 14px;
    border: 2px solid transparent;
    background: var(--panel2);
    color: var(--txt);
    cursor: pointer;
    transition: all 0.15s;
    gap: 1px;
    padding: 4px 6px;
    flex-shrink: 0;
}

.tool-btn .tool-icon { font-size: 1.4rem; line-height: 1; }
.tool-btn .tool-name { font-size: 0.52rem; font-weight: 600; color: var(--txt-dim); letter-spacing: 0.02em; text-align: center; }

.tool-btn:active { transform: scale(0.88); }

.tool-btn.active {
    background: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 0 14px rgba(255,255,255,0.15);
}

.tool-btn.active .tool-name { color: #fff; }

/* Divider */
.tool-divider {
    width: 2px;
    height: 36px;
    background: var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    margin: 0 2px;
}

/* ── SIZE SLIDER ───────────────────────────────────────────── */
#size-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel2);
    border-radius: 14px;
    padding: 6px 10px;
    min-width: 80px;
    border: 2px solid transparent;
}

#size-preview {
    background: #fff;
    border-radius: 50%;
    flex-shrink: 0;
    transition: width 0.15s, height 0.15s;
}

#size-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 52px;
    height: 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.2);
    outline: none;
}

#size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

/* ── STAMPS PANEL ──────────────────────────────────────────── */
#stamps-row {
    display: none;
    padding: 2px 8px 4px;
    gap: 5px;
    overflow-x: auto;
    scrollbar-width: none;
}
#stamps-row::-webkit-scrollbar { display: none; }
#stamps-row.visible { display: flex; }

.stamp-btn {
    font-size: 1.6rem;
    min-width: 42px; height: 42px;
    border-radius: 12px;
    border: 2px solid transparent;
    background: var(--panel2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
}

.stamp-btn:active { transform: scale(0.85); }
.stamp-btn.active { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); }

/* ── TOAST ─────────────────────────────────────────────────── */
#toast {
    position: fixed;
    bottom: calc(var(--bot-h) + var(--safe-bot) + 16px);
    left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
}

#toast.show { opacity: 1; }

/* ── RESPONSIVE LARGE SCREEN ───────────────────────────────── */
@media (min-width: 768px) {
    :root { --top-h: 58px; --bot-h: 150px; }
    .color-swatch { width: 38px; height: 38px; min-width: 38px; }
    .tool-btn { min-width: 60px; height: 60px; }
    .tool-btn .tool-icon { font-size: 1.6rem; }
    .tool-btn .tool-name { font-size: 0.6rem; }
    .stamp-btn { font-size: 1.9rem; min-width: 48px; height: 48px; }
}
</style>
</head>
<body>

<div id="app">

    <!-- TOP BAR -->
    <div id="topbar">
        <div class="app-title"><span>🎨</span> Pintura Mágica</div>
        <div id="color-preview" onclick="document.getElementById('color-input').click()" title="Color actual"></div>
        <button class="top-btn" id="btn-undo"  title="Deshacer">↩️</button>
        <button class="top-btn" id="btn-redo"  title="Rehacer">↪️</button>
        <button class="top-btn danger" id="btn-clear" title="Limpiar">🗑️</button>
        <button class="top-btn save"   id="btn-save"  title="Guardar">💾</button>
    </div>

    <!-- CANVAS -->
    <div id="canvas-wrap">
        <canvas id="main-canvas"></canvas>
        <div id="cursor-ring"></div>
    </div>

    <!-- BOTTOM PANEL -->
    <div id="bottom-panel">

        <!-- Stamps (appears when stamp tool active) -->
        <div id="stamps-row">
            <!-- filled by JS -->
        </div>

        <!-- Colors -->
        <div id="color-row">
            <!-- filled by JS -->
            <div id="custom-color-btn" title="Color personalizado"></div>
            <input type="color" id="color-input">
        </div>

        <!-- Tools + Size -->
        <div id="tool-row">
            <!-- filled by JS -->
        </div>

    </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const COLORS = [
    '#1a1033','#000000','#4b5563','#9ca3af','#ffffff',
    '#ef4444','#f97316','#fbbf24','#84cc16','#22c55e',
    '#06b6d4','#3b82f6','#8b5cf6','#ec4899','#f43f5e',
    '#7c3aed','#0ea5e9','#10b981','#a16207','#be123c',
    '#fde68a','#bbf7d0','#bfdbfe','#e9d5ff','#fecdd3',
];

const STAMPS = ['🌟','⭐','❤️','🌈','🦋','🐱','🐶','🐸',
                '🦄','🌸','🍕','🍦','🎈','🎉','🔥','💎',
                '🚀','🌙','☀️','⚡','🌺','🐠','🦊','🎵'];

const TOOLS = [
    { id:'brush',   icon:'🖌️',  name:'Pincel'   },
    { id:'pen',     icon:'✏️',  name:'Lápiz'    },
    { id:'marker',  icon:'🖊️',  name:'Marcador' },
    { id:'spray',   icon:'💨',  name:'Spray'    },
    { id:'rainbow', icon:'🌈',  name:'Arcoíris' },
    { id:'glitter', icon:'✨',  name:'Brillos'  },
    { id:'fill',    icon:'🪣',  name:'Relleno'  },
    { id:'stamp',   icon:'🌟',  name:'Sellos'   },
    { id:'eraser',  icon:'🧹',  name:'Borrador' },
];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentColor  = '#ef4444';
let currentTool   = 'brush';
let currentSize   = 14;
let currentStamp  = '🌟';
let painting      = false;
let lastX = 0, lastY = 0;
let undoStack = [], redoStack = [];
let hue = 0;  // for rainbow brush

// ═══════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════
const canvasWrap = document.getElementById('canvas-wrap');
const canvas     = document.getElementById('main-canvas');
const ctx        = canvas.getContext('2d');

function resizeCanvas() {
    const w = canvasWrap.offsetWidth;
    const h = canvasWrap.offsetHeight;
    // Save drawing
    const tmp = canvas.toDataURL();
    canvas.width  = w;
    canvas.height = h;
    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    // Restore
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = tmp;
}

window.addEventListener('resize', () => {
    clearTimeout(window._rto);
    window._rto = setTimeout(resizeCanvas, 200);
});

// Initial setup
function initCanvas() {
    canvas.width  = canvasWrap.offsetWidth;
    canvas.height = canvasWrap.offsetHeight;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    saveUndo();
}

// ═══════════════════════════════════════════════════════════════
//  UNDO / REDO
// ═══════════════════════════════════════════════════════════════
function saveUndo() {
    undoStack.push(canvas.toDataURL());
    if (undoStack.length > 30) undoStack.shift();
    redoStack = [];
}

function undo() {
    if (undoStack.length <= 1) return showToast('¡Nada más que deshacer!');
    redoStack.push(undoStack.pop());
    restoreState(undoStack[undoStack.length - 1]);
}

function redo() {
    if (redoStack.length === 0) return showToast('¡Nada más que rehacer!');
    const state = redoStack.pop();
    undoStack.push(state);
    restoreState(state);
}

function restoreState(dataURL) {
    const img = new Image();
    img.onload = () => {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
    };
    img.src = dataURL;
}

// ═══════════════════════════════════════════════════════════════
//  CURSOR RING
// ═══════════════════════════════════════════════════════════════
const ring = document.getElementById('cursor-ring');

function updateRing(x, y) {
    if (currentTool === 'fill' || currentTool === 'stamp') {
        ring.style.display = 'none'; return;
    }
    const size = currentTool === 'eraser' ? currentSize * 3 : currentSize * 2;
    ring.style.display = 'block';
    ring.style.width  = size + 'px';
    ring.style.height = size + 'px';
    ring.style.left   = x + 'px';
    ring.style.top    = y + 'px';
    ring.style.borderColor = currentTool === 'eraser' ? 'rgba(239,68,68,0.7)' : currentColor;
}

// ═══════════════════════════════════════════════════════════════
//  DRAWING TOOLS
// ═══════════════════════════════════════════════════════════════
function getColor() {
    if (currentTool === 'eraser') return '#ffffff';
    if (currentTool === 'rainbow') {
        hue = (hue + 3) % 360;
        return `hsl(${hue}, 100%, 55%)`;
    }
    return currentColor;
}

function getLineWidth() {
    switch (currentTool) {
        case 'pen':     return Math.max(2, currentSize * 0.6);
        case 'marker':  return currentSize * 2.2;
        case 'eraser':  return currentSize * 3.5;
        case 'brush':   return currentSize;
        case 'rainbow': return currentSize * 1.3;
        default:        return currentSize;
    }
}

function drawLine(x0, y0, x1, y1) {
    ctx.save();
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';

    if (currentTool === 'marker') {
        ctx.globalAlpha = 0.6;
    } else if (currentTool === 'pen') {
        ctx.globalAlpha = 1;
        ctx.shadowBlur  = 0;
    } else if (currentTool === 'brush' || currentTool === 'rainbow') {
        ctx.globalAlpha = 0.85;
        ctx.shadowColor = getColor();
        ctx.shadowBlur  = currentSize * 0.4;
    } else {
        ctx.globalAlpha = 1;
    }

    ctx.strokeStyle = getColor();
    ctx.lineWidth   = getLineWidth();

    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
    ctx.restore();
}

function drawSpray(x, y) {
    const density = 30;
    const radius  = currentSize * 2;
    ctx.save();
    ctx.fillStyle = currentColor;
    ctx.globalAlpha = 0.12;
    for (let i = 0; i < density; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r     = Math.random() * radius;
        const px    = x + r * Math.cos(angle);
        const py    = y + r * Math.sin(angle);
        ctx.beginPath();
        ctx.arc(px, py, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawGlitter(x, y) {
    const count = 6;
    for (let i = 0; i < count; i++) {
        const spread = currentSize * 2.5;
        const px = x + (Math.random() - 0.5) * spread;
        const py = y + (Math.random() - 0.5) * spread;
        const stars = ['✦','·','*','✧'];
        const s = stars[Math.floor(Math.random() * stars.length)];
        const hueShift = Math.floor(Math.random() * 360);

        ctx.save();
        ctx.font = `bold ${4 + Math.random() * currentSize}px serif`;
        ctx.fillStyle = `hsl(${hueShift}, 100%, 65%)`;
        ctx.globalAlpha = 0.7 + Math.random() * 0.3;
        ctx.fillText(s, px, py);
        ctx.restore();
    }
    // DOM sparkle
    if (Math.random() < 0.25) addSparkle(x, y);
}

function addSparkle(x, y) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.textContent = ['✨','⭐','💫','🌟'][Math.floor(Math.random() * 4)];
    el.style.left = (x - 16) + 'px';
    el.style.top  = (y - 16) + 'px';
    canvasWrap.appendChild(el);
    setTimeout(() => el.remove(), 700);
}

function drawStamp(x, y) {
    const size = Math.max(24, currentSize * 3);
    ctx.save();
    ctx.font = `${size}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentStamp, x, y);
    ctx.restore();
    addSparkle(x, y);
}

// ── FILL TOOL (Flood Fill) ──────────────────────────────────
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r, g, b];
}

function colorsMatch(d, pos, target, tolerance=30) {
    return Math.abs(d[pos]   - target[0]) < tolerance &&
           Math.abs(d[pos+1] - target[1]) < tolerance &&
           Math.abs(d[pos+2] - target[2]) < tolerance;
}

function floodFill(startX, startY, fillColor) {
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data    = imgData.data;
    const w = canvas.width, h = canvas.height;
    const start = (Math.floor(startY) * w + Math.floor(startX)) * 4;
    const target = [data[start], data[start+1], data[start+2]];
    const fill   = hexToRgb(fillColor);

    if (colorsMatch(data, start, fill, 5)) return;

    const stack = [Math.floor(startX) + Math.floor(startY) * w];
    const visited = new Uint8Array(w * h);

    while (stack.length > 0) {
        const idx = stack.pop();
        if (visited[idx]) continue;
        visited[idx] = 1;

        const px = idx % w;
        const py = Math.floor(idx / w);
        const pos = idx * 4;

        if (!colorsMatch(data, pos, target)) continue;

        data[pos]   = fill[0];
        data[pos+1] = fill[1];
        data[pos+2] = fill[2];
        data[pos+3] = 255;

        if (px > 0)   stack.push(idx - 1);
        if (px < w-1) stack.push(idx + 1);
        if (py > 0)   stack.push(idx - w);
        if (py < h-1) stack.push(idx + w);
    }
    ctx.putImageData(imgData, 0, 0);
}

// ═══════════════════════════════════════════════════════════════
//  POINTER EVENTS
// ═══════════════════════════════════════════════════════════════
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top)  * scaleY,
        cx: src.clientX - rect.left,
        cy: src.clientY - rect.top,
    };
}

canvasWrap.addEventListener('pointerdown', e => {
    e.preventDefault();
    const {x, y, cx, cy} = getPos(e);

    if (currentTool === 'fill') {
        saveUndo();
        floodFill(x, y, currentColor);
        addSparkle(cx, cy);
        return;
    }
    if (currentTool === 'stamp') {
        saveUndo();
        drawStamp(x, y);
        return;
    }

    painting = true;
    lastX = x; lastY = y;
    saveUndo();

    // Dot on first touch
    if (currentTool === 'spray') {
        drawSpray(x, y);
    } else if (currentTool === 'glitter') {
        drawGlitter(x, y);
    } else {
        drawLine(x, y, x+0.1, y+0.1);
    }

    updateRing(cx, cy);
});

canvasWrap.addEventListener('pointermove', e => {
    e.preventDefault();
    const {x, y, cx, cy} = getPos(e);
    updateRing(cx, cy);
    if (!painting) return;

    if (currentTool === 'spray') {
        drawSpray(x, y);
    } else if (currentTool === 'glitter') {
        drawGlitter(x, y);
    } else {
        drawLine(lastX, lastY, x, y);
    }

    lastX = x; lastY = y;
});

const stopPainting = () => { painting = false; };
canvasWrap.addEventListener('pointerup',     stopPainting);
canvasWrap.addEventListener('pointercancel', stopPainting);
canvasWrap.addEventListener('pointerleave',  stopPainting);

// Hide ring when finger leaves
canvasWrap.addEventListener('pointerleave', () => {
    ring.style.display = 'none';
});

// ═══════════════════════════════════════════════════════════════
//  UI BUILDERS
// ═══════════════════════════════════════════════════════════════
function buildColors() {
    const row = document.getElementById('color-row');
    // Insert swatches before the custom button
    const custom = document.getElementById('custom-color-btn');
    COLORS.forEach(c => {
        const div = document.createElement('div');
        div.className = 'color-swatch';
        div.style.background = c;
        if (c === currentColor) div.classList.add('active');
        div.addEventListener('click', () => selectColor(c, div));
        row.insertBefore(div, custom);
    });
}

function selectColor(c, el) {
    currentColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    if (el) el.classList.add('active');
    updateColorPreview();
    if (currentTool === 'eraser') selectTool('brush');
}

function updateColorPreview() {
    const p = document.getElementById('color-preview');
    p.style.background = currentColor;
    p.style.color      = currentColor;
    p.style.boxShadow  = `0 0 12px ${currentColor}88, inset 0 1px 0 rgba(255,255,255,0.3)`;
}

// Custom color picker
document.getElementById('custom-color-btn').addEventListener('click', () => {
    document.getElementById('color-input').click();
});
document.getElementById('color-input').addEventListener('input', e => {
    selectColor(e.target.value, null);
});

function buildTools() {
    const row = document.getElementById('tool-row');

    // Size control
    const sizeWrap = document.createElement('div');
    sizeWrap.id = 'size-wrap';
    sizeWrap.innerHTML = `
        <div id="size-preview"></div>
        <input type="range" id="size-slider" min="2" max="40" value="${currentSize}">
    `;
    row.appendChild(sizeWrap);

    // Divider
    const div0 = document.createElement('div');
    div0.className = 'tool-divider';
    row.appendChild(div0);

    // Tools
    TOOLS.forEach((t, i) => {
        const btn = document.createElement('div');
        btn.className = 'tool-btn' + (t.id === currentTool ? ' active' : '');
        btn.id = `tool-${t.id}`;
        btn.innerHTML = `<div class="tool-icon">${t.icon}</div><div class="tool-name">${t.name}</div>`;
        btn.addEventListener('click', () => selectTool(t.id));
        row.appendChild(btn);
    });

    // Size slider logic
    const slider = document.getElementById('size-slider');
    slider.addEventListener('input', e => {
        currentSize = parseInt(e.target.value);
        updateSizePreview();
    });
    updateSizePreview();
}

function updateSizePreview() {
    const preview = document.getElementById('size-preview');
    const sz = Math.max(4, Math.min(currentSize, 30));
    preview.style.width  = sz + 'px';
    preview.style.height = sz + 'px';
    preview.style.background = currentColor;
    preview.style.boxShadow  = `0 0 6px ${currentColor}`;
}

function selectTool(id) {
    currentTool = id;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`tool-${id}`);
    if (btn) btn.classList.add('active');

    // Stamps sub-row
    const stampsRow = document.getElementById('stamps-row');
    if (id === 'stamp') {
        stampsRow.classList.add('visible');
    } else {
        stampsRow.classList.remove('visible');
    }

    // Canvas cursor
    canvas.style.cursor = id === 'fill' ? 'cell' : id === 'stamp' ? 'copy' : 'crosshair';

    updateSizePreview();
}

function buildStamps() {
    const row = document.getElementById('stamps-row');
    STAMPS.forEach(s => {
        const btn = document.createElement('div');
        btn.className = 'stamp-btn' + (s === currentStamp ? ' active' : '');
        btn.textContent = s;
        btn.addEventListener('click', () => {
            currentStamp = s;
            document.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Update tool icon
            const toolIcon = document.querySelector('#tool-stamp .tool-icon');
            if (toolIcon) toolIcon.textContent = s;
        });
        row.appendChild(btn);
    });
}

// ═══════════════════════════════════════════════════════════════
//  TOP BUTTONS
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);

document.getElementById('btn-clear').addEventListener('click', () => {
    if (confirm('¿Borrar todo el dibujo? 🗑️')) {
        saveUndo();
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        showToast('¡Lienzo limpio! 🌟');
    }
});

document.getElementById('btn-save').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = `pintura-magica-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('¡Dibujo guardado! 💾');
});

// ═══════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════
let toastTimeout;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════════════
//  UPDATE SIZE PREVIEW COLOR
// ═══════════════════════════════════════════════════════════════
// Re-sync size preview color when color changes
const origSelectColor = selectColor;
// monkey-patch to also update size preview
function selectColor(c, el) {
    currentColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    if (el) el.classList.add('active');
    updateColorPreview();
    updateSizePreview();
    if (currentTool === 'eraser') selectTool('brush');
}

// ═══════════════════════════════════════════════════════════════
//  PREVENT SCROLL / CONTEXT MENU
// ═══════════════════════════════════════════════════════════════
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('contextmenu', e => e.preventDefault());

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
    initCanvas();
    buildColors();
    buildTools();
    buildStamps();
    updateColorPreview();
    showToast('¡Bienvenido! Empieza a pintar 🎨');
});
</script>
</body>
