<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Regla de Oro del Viewport para móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Animal Adventure World 🦖</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #87CEEB;
            --ground: #795548;
            --grass: #4caf50;
            --accent: #f1c40f;
            --ui-bg: rgba(255, 255, 255, 0.2);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* Previene scroll táctil no deseado */
            user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%; 
            height: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #87CEEB, #b0e2f5);
            position: relative;
            overflow: hidden;
        }

        #header {
            position: absolute;
            top: env(safe-area-inset-top, 20px); /* Adaptación a Notch de iOS/Android */
            left: 0; width: 100%;
            padding: 10px 20px 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; pointer-events: none;
        }

        #title {
            font-family: 'Fredoka One', cursive;
            color: white; font-size: clamp(20px, 5vw, 24px);
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        #score-board {
            display: flex; gap: 15px;
            font-weight: 800; color: #2c3e50;
            font-size: clamp(14px, 4vw, 18px); 
            margin-top: 5px;
            background: rgba(255,255,255,0.4);
            padding: 5px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        #power-icons {
            position: absolute;
            top: 60px; right: 20px;
            display: flex; flex-direction: column;
            gap: 10px; z-index: 20;
        }

        .power-indicator {
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            display: none;
            align-items: center; justify-content: center;
            font-size: 24px;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #selector {
            position: absolute; top: 100px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px;
            background: var(--ui-bg); padding: 8px;
            border-radius: 40px; backdrop-filter: blur(10px);
            z-index: 10;
        }

        .char-option {
            width: 44px; height: 44px; /* Tamaño mínimo táctil recomendado (44x44) */
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border-radius: 50%;
            cursor: pointer; transition: 0.3s;
            background: rgba(255,255,255,0.15);
        }
        .char-option.active {
            background: var(--accent); 
            transform: scale(1.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div id="title">ANIMAL JUMP PRO</div>
        <div id="score-board">
            <span id="coinDisplay">🪙 0</span>
            <span id="highScoreDisplay">🏆 0</span>
        </div>
    </div>

    <div id="power-icons">
        <div id="icon-star" class="power-indicator">⭐</div>
        <div id="icon-feather" class="power-indicator">🪶</div>
        <div id="icon-mushroom" class="power-indicator">🍄</div>
    </div>

    <div id="selector">
        <div class="char-option active" data-emoji="🦖">🦖</div>
        <div class="char-option" data-emoji="🐰">🐰</div>
        <div class="char-option" data-emoji="🐱">🐱</div>
        <div class="char-option" data-emoji="🦄">🦄</div>
        <div class="char-option" data-emoji="🐥">🐥</div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- PREVENCIÓN DE PÉRDIDA DE DATOS ---
    window.addEventListener('beforeunload', (e) => {
        if (isGameStarted && !isGameOver && coinsCollected > 0) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const coinEl = document.getElementById('coinDisplay');
    const hiEl = document.getElementById('highScoreDisplay');
    const appContainer = document.getElementById('app');
    
    const iconStar = document.getElementById('icon-star');
    const iconFeather = document.getElementById('icon-feather');
    const iconMushroom = document.getElementById('icon-mushroom');
    
    const LOGICAL_W = 400;
    const LOGICAL_H = 600;

    function resize() {
        const rect = appContainer.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resize);
    resize();

    function getScale() { return canvas.width / LOGICAL_W; }

    let highScore = parseInt(localStorage.getItem('jumpCoinHighScore')) || 0;
    hiEl.innerText = `🏆 ${highScore}`;
    
    let coinsCollected = 0;
    let baseSpeed = 3.6;
    let gameSpeed = baseSpeed;
    let isGameOver = true;
    let isGameStarted = false; // Estado para la pantalla de bienvenida
    let isPressing = false;
    let lastTime = 0;
    let frameCount = 0;
    let animationId = null; // Para prevenir múltiples bucles de animación
    
    const groundY = LOGICAL_H - 60;
    const blockSize = 40;

    const player = {
        x: 60,
        y: groundY - 40,
        width: 34,
        height: 34,
        dy: 0,
        gravity: 0.75,
        jumpForce: -12, 
        emoji: '🦖',
        grounded: false,
        isInvincible: false,
        invincibleTime: 0,
        isBig: false,
        isFlying: false,
        flyingTime: 0,

        getCurrentHeight() {
            return this.isBig ? 58 : 34;
        },

        draw() {
            const scale = getScale();
            ctx.save();
            
            const currentSize = this.isBig ? 65 : 45;
            ctx.font = `${currentSize * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'ideographic'; 
            
            const drawX = (this.x + this.width / 2) * scale;
            const drawY = (this.y + this.getCurrentHeight() - 2) * scale;

            ctx.translate(drawX, drawY);
            ctx.scale(-1, 1); 

            if (this.isInvincible && this.invincibleTime > 2000) {
                const hue = (Date.now() / 2) % 360;
                ctx.shadowBlur = 20 * scale;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.filter = `hue-rotate(${hue}deg) brightness(1.5)`;
            } else if (this.isInvincible) {
                ctx.globalAlpha = Math.sin(Date.now() / 40) * 0.5 + 0.5;
            }

            if (this.isFlying) {
                ctx.shadowBlur = 15 * scale;
                ctx.shadowColor = "white";
            }

            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        },

        update(dt) {
            let g = this.gravity;
            
            if (this.isFlying) {
                if (isPressing) this.dy = -6.5;
                g = 0.25; 
                this.flyingTime -= dt * 16.66;
                if (this.flyingTime <= 0) {
                    this.isFlying = false;
                    iconFeather.style.display = 'none';
                }
            } else {
                if (isPressing && this.dy < 0) g *= 0.45;
            }

            this.dy += g * dt;
            this.y += this.dy * dt;

            if (this.invincibleTime > 0) {
                this.invincibleTime -= dt * 16.66;
                if (this.invincibleTime <= 0) {
                    this.isInvincible = false;
                    iconStar.style.display = 'none';
                    if (!this.isFlying) gameSpeed = baseSpeed + (Math.floor(frameCount / 600) * 0.1);
                }
            }

            if (this.y < 0) { this.y = 0; this.dy = 0; }
            if (this.y > LOGICAL_H + 100) gameOver(); 
            this.draw();
        }
    };

    let platforms = [];
    let obstacles = [];
    let items = []; 
    let clouds = [];
    let birds = [];
    let drops = [];
    let coins = []; // Nueva entidad: Monedas

    function initMap() {
        platforms = []; obstacles = []; items = []; birds = []; drops = []; coins = [];
        baseSpeed = 3.6; gameSpeed = baseSpeed;
        coinsCollected = 0;
        coinEl.innerText = `🪙 ${coinsCollected}`;
        for(let i=0; i<15; i++) {
            platforms.push({ x: i * blockSize, y: groundY, type: 'grass' });
        }
    }

    function spawnMapElement() {
        const lastP = platforms[platforms.length - 1];
        const nextX = lastP ? lastP.x + blockSize : 0;
        const rand = Math.random();
        
        // Spawn de plataformas y obstáculos
        if (rand < 0.14 && frameCount > 900) {
            if (Math.random() < 0.75) {
                let length = Math.floor(Math.random() * 6) + 6; 
                for(let j=0; j<length; j++) {
                    platforms.push({ x: nextX + (j * blockSize), y: groundY - 140, type: 'block' });
                    if (j === Math.floor(length/2) && Math.random() < 0.25) spawnObstacle(nextX + (j * blockSize), groundY - 140);
                    if (j === 3 && Math.random() < 0.18) spawnRandomItem(nextX + (j * blockSize), groundY - 190);
                }
            }
        } else {
            platforms.push({ x: nextX, y: groundY, type: 'grass' });
            if (Math.random() < 0.08) {
                const tooClose = obstacles.some(o => Math.abs(o.x - nextX) < 260);
                if (!tooClose) spawnObstacle(nextX, groundY);
            }
            if (Math.random() < 0.035) spawnRandomItem(nextX, groundY - 60);
        }

        // Spawn de Monedas (Estilo Mario - menos cantidad, flotan sobre saltos)
        if (Math.random() < 0.12) {
            let coinCount = Math.floor(Math.random() * 2) + 1; // 1 o 2 monedas juntas máximo
            for(let c = 0; c < coinCount; c++) {
                coins.push({ x: nextX + (c * 40), y: groundY - 80, emoji: '🪙' });
            }
        }
    }

    function spawnObstacle(x, y) {
        const icons = ['🌵', '🪨', '🔥'];
        obstacles.push({ x, y, emoji: icons[Math.floor(Math.random() * icons.length)], passed: false });
    }

    function spawnRandomItem(x, y) {
        const r = Math.random();
        if (r < 0.4) items.push({ x, y, emoji: '🍄', type: 'mushroom' });
        else if (r < 0.75) items.push({ x, y, emoji: '⭐', type: 'star' });
        else items.push({ x, y, emoji: '🪶', type: 'feather' });
    }

    function spawnBird() {
        if (birds.length > 0 || frameCount < 2400) return; 
        birds.push({ x: LOGICAL_W + 150, y: 80, speed: gameSpeed + 1.2, emoji: '🐦', hasDropped: false, dropX: player.x + 200 });
    }

    function checkCollisions(dt) {
        let onAnyPlatform = false;
        const pHeight = player.getCurrentHeight();
        const px = player.x + 8;
        const pw = player.width - 16;

        platforms.forEach(p => {
            if (player.dy >= 0 && 
                px + pw > p.x && 
                px < p.x + blockSize && 
                player.y + pHeight <= p.y + 15 && 
                player.y + pHeight + (player.dy * dt) >= p.y) {
                
                player.y = p.y - pHeight; 
                player.dy = 0; 
                player.grounded = true; 
                onAnyPlatform = true;
            }
        });
        if (!onAnyPlatform) player.grounded = false;

        const handleHit = () => {
            if (player.isInvincible) return;
            if (player.isBig) {
                player.isBig = false;
                player.isInvincible = true;
                player.invincibleTime = 2000; 
                iconMushroom.style.display = 'none';
            } else {
                gameOver();
            }
        };

        // Bucle Inverso para Obstáculos (Prevención de bugs de splice)
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            const hitX = player.x + 10;
            const hitY = player.y + (player.isBig ? 10 : 5);
            const hitH = player.getCurrentHeight() - 10;
            if (hitX < o.x + 25 && hitX + 15 > o.x && hitY < o.y && hitY + hitH > o.y - 25) handleHit();
        }

        // Bucle Inverso para Gotas/Peligros
        for (let i = drops.length - 1; i >= 0; i--) {
            let d = drops[i];
            if (Math.abs(player.x + 15 - d.x) < 25 && Math.abs(player.y + 15 - d.y) < 25) handleHit();
        }

        // Bucle Inverso para Power-Ups (BUG SOLUCIONADO)
        for (let i = items.length - 1; i >= 0; i--) {
            let it = items[i];
            if (Math.abs(player.x - it.x) < 40 && Math.abs(player.y - it.y) < 65) {
                if (it.type === 'mushroom') {
                    if (!player.isBig) {
                        const heightDiff = 58 - 34;
                        player.y -= heightDiff;
                    }
                    player.isBig = true;
                    iconMushroom.style.display = 'flex';
                } else if (it.type === 'star') {
                    player.invincibleTime = 7000;
                    player.isInvincible = true;
                    iconStar.style.display = 'flex';
                    gameSpeed = baseSpeed * 1.5;
                } else if (it.type === 'feather') {
                    player.isFlying = true;
                    player.flyingTime = 6000;
                    iconFeather.style.display = 'flex';
                }
                items.splice(i, 1);
            }
        }
    }

    function updateEntities(dt) {
        const scale = getScale();
        
        // Plataformas
        for (let i = platforms.length - 1; i >= 0; i--) {
            let p = platforms[i];
            p.x -= gameSpeed * dt;
            const dX = p.x * scale, dY = p.y * scale, dW = (blockSize + 0.5) * scale;
            const dH = canvas.height - dY;

            if (p.type === 'grass') {
                ctx.fillStyle = '#795548'; ctx.fillRect(dX, dY, dW, dH);
                ctx.fillStyle = '#4caf50'; ctx.fillRect(dX, dY, dW, 8 * scale);
            } else {
                ctx.fillStyle = '#8d6e63'; ctx.fillRect(dX, dY, dW, blockSize * scale);
                ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 2 * scale;
                ctx.strokeRect(dX + 2*scale, dY + 2*scale, dW - 4*scale, (blockSize-4)*scale);
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(dX + 5*scale, dY + 5*scale, 4*scale, 4*scale);
                ctx.fillRect(dX + dW - 9*scale, dY + blockSize*scale - 9*scale, 4*scale, 4*scale);
            }
            if (p.x < -blockSize * 10) platforms.splice(i, 1);
        }

        if (platforms.length < 25) spawnMapElement();

        // Nubes
        ctx.save(); ctx.globalAlpha = 0.3;
        for (let i = clouds.length - 1; i >= 0; i--) {
            let c = clouds[i];
            c.x -= c.speed * dt;
            ctx.font = `${40 * scale}px Arial`; ctx.fillText('☁️', c.x * scale, c.y * scale);
            if (c.x < -100) clouds.splice(i, 1);
        }
        ctx.restore();
        if (Math.random() < 0.005) clouds.push({x:LOGICAL_W + 100, y:Math.random()*150+40, speed: 0.3});

        // Obstáculos
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= gameSpeed * dt;
            ctx.font = `${40 * scale}px Arial`; ctx.fillText(o.emoji, o.x * scale, o.y * scale);
            if (o.x < -100) obstacles.splice(i, 1);
        }

        // Power-Ups
        for (let i = items.length - 1; i >= 0; i--) {
            let it = items[i];
            it.x -= gameSpeed * dt;
            const h = Math.sin(Date.now() / 200) * 8;
            ctx.font = `${35 * scale}px Arial`; ctx.fillText(it.emoji, it.x * scale, (it.y + h) * scale);
            if (it.x < -100) items.splice(i, 1);
        }

        // Monedas (NUEVO)
        for (let i = coins.length - 1; i >= 0; i--) {
            let c = coins[i];
            c.x -= gameSpeed * dt;
            
            // Animación suave de flotación (Se corrigió la vibración excesiva)
            const floatH = Math.sin(Date.now() / 300 + (c.x * 0.02)) * 3;
            ctx.font = `${28 * scale}px Arial`; 
            ctx.fillText(c.emoji, c.x * scale, (c.y + floatH) * scale);
            
            // Recolectar moneda
            if (Math.abs(player.x - c.x) < 35 && Math.abs(player.y - c.y) < 40) {
                coinsCollected++;
                coinEl.innerText = `🪙 ${coinsCollected}`;
                coins.splice(i, 1);
            } else if (c.x < -100) {
                coins.splice(i, 1);
            }
        }

        // Pájaros
        for (let i = birds.length - 1; i >= 0; i--) {
            let b = birds[i];
            b.x -= b.speed * dt;
            if (!b.hasDropped && Math.abs(b.x - b.dropX) < 50) { 
                ctx.font = `${20 * scale}px Arial`; ctx.fillText('❗', b.x * scale, (b.y - 20) * scale); 
            }
            ctx.font = `${35 * scale}px Arial`; ctx.fillText(b.emoji, b.x * scale, b.y * scale);
            if (!b.hasDropped && b.x < b.dropX) { 
                drops.push({ x: b.x, y: b.y, speedY: 5.5, landed: false }); 
                b.hasDropped = true; 
            }
            if (b.x < -100) birds.splice(i, 1);
        }

        // Gotas / Enemigos cayendo
        for (let i = drops.length - 1; i >= 0; i--) {
            let d = drops[i];
            if (!d.landed) {
                d.y += d.speedY * dt;
                platforms.forEach(p => { 
                    if (d.x > p.x && d.x < p.x + blockSize && d.y > p.y && d.y < p.y + 10) { 
                        d.landed = true; d.y = p.y; 
                    } 
                });
                if (d.y > LOGICAL_H) drops.splice(i, 1);
            } else { 
                d.x -= gameSpeed * dt; 
            }
            
            if (drops[i]) { // Asegurar que no haya sido eliminado
                ctx.font = `${25 * scale}px Arial`; ctx.fillText('💩', d.x * scale, d.y * scale);
                if (d.x < -100) drops.splice(i, 1);
            }
        }
    }

    function animate(time = 0) {
        if (isGameOver) return;
        
        // BUG CORREGIDO: Evita saltos temporales gigantes si el usuario cambia de pestaña
        let dt = (time - lastTime) / 16.666;
        if (dt > 3) dt = 3; 
        lastTime = time;
        frameCount += dt;
        
        // Aumentar dificultad gradualmente basada en los frames
        if (frameCount % 600 < 1 && !player.isFlying) gameSpeed += 0.05;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (frameCount % 700 < 1) spawnBird();
        updateEntities(dt);
        player.update(dt);
        checkCollisions(dt);
        
        animationId = requestAnimationFrame(animate);
    }

    function showWelcome() {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        const s = getScale();
        
        ctx.font = `bold ${32 * s}px Nunito`;
        ctx.fillText('¡BIENVENIDO!', canvas.width/2, canvas.height/2 - 40);
        
        ctx.fillStyle = '#f1c40f';
        ctx.font = `bold ${18 * s}px Nunito`;
        ctx.fillText('Elige tu personaje arriba 👆', canvas.width/2, canvas.height/2 + 10);
        
        ctx.fillStyle = 'white';
        ctx.font = `${16 * s}px Nunito`;
        ctx.fillText('Atrapa 🪙, evita obstáculos y usa poderes.', canvas.width/2, canvas.height/2 + 50);
        
        ctx.font = `bold ${22 * s}px Nunito`;
        ctx.fillText('¡TOCA PARA INICIAR!', canvas.width/2, canvas.height/2 + 100);
    }

    function gameOver() {
        if (isGameOver && isGameStarted) return;
        isGameOver = true;
        if (animationId) cancelAnimationFrame(animationId);

        if (coinsCollected > highScore) { 
            highScore = coinsCollected; 
            localStorage.setItem('jumpCoinHighScore', highScore); // Persistencia de datos por monedas
            hiEl.innerText = `🏆 ${highScore}`; 
        }
        
        if (!isGameStarted) return; // Si no ha iniciado, no mostrar pantalla de Game Over

        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        const s = getScale();
        ctx.font = `bold ${32 * s}px Nunito`;
        ctx.fillText('FIN DE LA PARTIDA', canvas.width/2, canvas.height/2 - 30);
        
        ctx.fillStyle = '#f1c40f';
        ctx.font = `bold ${36 * s}px Nunito`;
        ctx.fillText(`🪙 ${coinsCollected}`, canvas.width/2, canvas.height/2 + 20);
        
        ctx.fillStyle = 'white';
        ctx.font = `${16 * s}px Nunito`;
        ctx.fillText('Toca para reiniciar', canvas.width/2, canvas.height/2 + 80);
    }

    function reset() {
        if (animationId) cancelAnimationFrame(animationId);
        isGameOver = false; 
        isGameStarted = true;
        isPressing = false; 
        frameCount = 0;
        player.y = groundY - 100; player.dy = 0; player.isInvincible = false;
        player.isBig = false; player.isFlying = false;
        iconStar.style.display = 'none';
        iconFeather.style.display = 'none';
        iconMushroom.style.display = 'none';
        initMap(); 
        lastTime = performance.now(); 
        animate(lastTime);
    }

    function start(e) {
        if (e.target.closest('#selector')) return;
        if (e.cancelable) e.preventDefault();
        
        if (!isGameStarted) {
            reset();
            return;
        }

        if (isGameOver) { 
            reset(); 
            return; 
        }
        
        isPressing = true;
        if (player.grounded && !player.isFlying) player.dy = player.jumpForce;
    }
    
    function end() { isPressing = false; }

    // BUG CORREGIDO: Usando Pointer Events para evitar duplicación de eventos de toque/ratón
    canvas.addEventListener('pointerdown', start, { passive: false });
    window.addEventListener('pointerup', end, { passive: false });

    document.querySelectorAll('.char-option').forEach(opt => {
        const select = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.char-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            player.emoji = opt.dataset.emoji;
        };
        // Pointerdown reemplaza a mousedown/touchstart
        opt.addEventListener('pointerdown', select);
    });

    // Pantalla de inicio
    setTimeout(() => {
        initMap();
        updateEntities(0);
        player.draw();
        showWelcome();
    }, 150); // Pequeño retraso para asegurar que el canvas tome sus dimensiones correctas
</script>
</body>
</html>
