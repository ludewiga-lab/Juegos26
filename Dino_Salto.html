<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Animal Adventure World 🦖</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #87CEEB;
            --ground: #795548;
            --grass: #4caf50;
            --accent: #f1c40f;
            --ui-bg: rgba(255, 255, 255, 0.2);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
            user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e; /* Fondo oscuro exterior */
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%; 
            height: 100%;
            max-width: 500px; /* Limita el ancho en PC, pero en móvil será el 100% */
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #87CEEB, #b0e2f5);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #header {
            position: absolute;
            top: 20px; left: 0; width: 100%;
            padding: 0 20px; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; pointer-events: none;
        }

        #title {
            font-family: 'Fredoka One', cursive;
            color: white; font-size: 24px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        #score-board {
            display: flex; gap: 20px;
            font-weight: 800; color: #2c3e50;
            font-size: 18px; margin-top: 5px;
        }

        #star-timer {
            position: absolute;
            bottom: 100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(241, 196, 15, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 900;
            display: none;
            box-shadow: 0 0 20px #f1c40f;
            z-index: 20;
            border: 2px solid white;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        #selector {
            position: absolute; top: 90px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px;
            background: var(--ui-bg); padding: 8px;
            border-radius: 40px; backdrop-filter: blur(10px);
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .char-option {
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border-radius: 50%;
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.15);
        }
        .char-option.active {
            background: var(--accent); 
            transform: scale(1.2);
            box-shadow: 0 0 15px white;
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div id="title">ANIMAL JUMP PRO</div>
        <div id="score-board">
            <span id="scoreDisplay">Puntos: 0</span>
            <span id="highScoreDisplay">🏆 0</span>
        </div>
    </div>

    <div id="star-timer">✨ MODO ESTRELLA ✨</div>

    <div id="selector">
        <div class="char-option active" data-emoji="🦖">🦖</div>
        <div class="char-option" data-emoji="🐰">🐰</div>
        <div class="char-option" data-emoji="🐱">🐱</div>
        <div class="char-option" data-emoji="🦄">🦄</div>
        <div class="char-option" data-emoji="🐥">🐥</div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreDisplay');
    const hiEl = document.getElementById('highScoreDisplay');
    const starTimerEl = document.getElementById('star-timer');
    const appContainer = document.getElementById('app');
    
    // Dimensiones lógicas fijas para el juego
    const LOGICAL_W = 400;
    const LOGICAL_H = 600;

    function resize() {
        const rect = appContainer.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resize);
    resize();

    // Helper para escalar coordenadas
    function getScale() {
        return canvas.width / LOGICAL_W;
    }

    let score = 0, highScore = 0;
    let baseSpeed = 3.8;
    let gameSpeed = baseSpeed;
    let isGameOver = false;
    let isPressing = false;
    let lastTime = 0;
    let frameCount = 0;
    
    const groundY = LOGICAL_H - 60;
    const blockSize = 40;

    const player = {
        x: 60,
        y: groundY - 40,
        width: 36,
        height: 36,
        dy: 0,
        gravity: 0.75,
        jumpForce: -12, 
        emoji: '🦖',
        grounded: false,
        isInvincible: false,
        invincibleTime: 0,

        draw() {
            const scale = getScale();
            ctx.save();
            ctx.font = `${48 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            
            // Posicionamiento escalado
            const drawX = (this.x + this.width / 2) * scale;
            const drawY = (this.y + this.height) * scale;

            ctx.translate(drawX, drawY);
            ctx.scale(-1, 1); 

            if (this.isInvincible) {
                const hue = (Date.now() / 2) % 360;
                ctx.shadowBlur = 25 * scale;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.filter = `hue-rotate(${hue}deg) brightness(1.5)`;
            }

            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        },

        update(dt) {
            let g = this.gravity;
            if (isPressing && this.dy < 0) g *= 0.45;

            this.dy += g * dt;
            this.y += this.dy * dt;

            if (this.isInvincible) {
                this.invincibleTime -= dt * 16.66;
                if (this.invincibleTime <= 0) {
                    this.isInvincible = false;
                    gameSpeed = baseSpeed + (Math.floor(score / 10) * 0.2);
                    starTimerEl.style.display = 'none';
                }
            }

            if (this.y > LOGICAL_H + 50) gameOver(); 
            this.draw();
        }
    };

    let platforms = [];
    let obstacles = [];
    let items = []; 
    let clouds = [];
    let birds = [];
    let drops = [];

    function initMap() {
        platforms = []; obstacles = []; items = []; birds = []; drops = [];
        baseSpeed = 3.8; gameSpeed = baseSpeed;
        for(let i=0; i<15; i++) {
            platforms.push({ x: i * blockSize, y: groundY, type: 'grass' });
        }
    }

    function spawnMapElement() {
        const lastP = platforms[platforms.length - 1];
        const nextX = lastP ? lastP.x + blockSize : 0;
        const rand = Math.random();
        
        if (rand < 0.15 && score > 5) {
            if (Math.random() < 0.8) {
                let length = Math.floor(Math.random() * 4) + 5; 
                for(let j=0; j<length; j++) {
                    platforms.push({ x: nextX + (j * blockSize), y: groundY - 120, type: 'block' });
                    if (j === Math.floor(length/2) && Math.random() < 0.3) spawnObstacle(nextX + (j * blockSize), groundY - 120);
                    if (j === 2 && Math.random() < 0.12) spawnItem(nextX + (j * blockSize), groundY - 170);
                }
            }
        } else {
            platforms.push({ x: nextX, y: groundY, type: 'grass' });
            if (Math.random() < 0.1 && !items.some(it => Math.abs(it.x - nextX) < 120)) {
                const tooClose = obstacles.some(o => Math.abs(o.x - nextX) < 220);
                if (!tooClose) spawnObstacle(nextX, groundY);
            }
            if (Math.random() < 0.02) spawnItem(nextX, groundY - 60);
        }
    }

    function spawnObstacle(x, y) {
        const icons = ['🌵', '🍄', '🪨'];
        obstacles.push({ x, y, emoji: icons[Math.floor(Math.random() * icons.length)], type: 'hazard', passed: false });
    }

    function spawnItem(x, y) {
        items.push({ x, y, emoji: '⭐', type: 'star' });
    }

    function spawnBird() {
        if (birds.length > 0 || score < 10) return; 
        birds.push({ x: LOGICAL_W + 150, y: 80, speed: gameSpeed + 1.5, emoji: '🐦', hasDropped: false, dropX: player.x + 180 + Math.random() * 100 });
    }

    function checkCollisions(dt) {
        let onAnyPlatform = false;
        platforms.forEach(p => {
            const px = player.x + 10;
            const pw = player.width - 20;
            if (player.dy >= 0 && px + pw > p.x && px < p.x + blockSize && player.y + player.height <= p.y + 15 && player.y + player.height + (player.dy * dt) >= p.y) {
                player.y = p.y - player.height; player.dy = 0; player.grounded = true; onAnyPlatform = true;
            }
        });
        if (!onAnyPlatform) player.grounded = false;

        items.forEach((it, i) => {
            if (Math.abs(player.x - it.x) < 40 && Math.abs(player.y - it.y) < 60) { activateStar(); items.splice(i, 1); }
        });

        obstacles.forEach(o => {
            if (player.isInvincible) return;
            const px = player.x + 15; const py = player.y + 15;
            const pw = player.width - 30; const ph = player.height - 20;
            if (px < o.x + 25 && px + pw > o.x - 5 && py < o.y && py + ph > o.y - 30) gameOver();
            if (!o.passed && o.x < player.x) { o.passed = true; score++; scoreEl.innerText = `Puntos: ${score}`; if (score % 10 === 0 && !player.isInvincible) { baseSpeed += 0.2; gameSpeed = baseSpeed; } }
        });

        drops.forEach(d => {
            if (player.isInvincible) return;
            if (Math.abs(player.x + 15 - d.x) < 22 && Math.abs(player.y + 15 - d.y) < 22) gameOver();
        });
    }

    function activateStar() {
        player.isInvincible = true;
        player.invincibleTime = 7000;
        gameSpeed = baseSpeed * 1.5;
        starTimerEl.style.display = 'block';
    }

    function updateEntities(dt) {
        const scale = getScale();
        
        platforms.forEach((p, i) => {
            p.x -= gameSpeed * dt;
            const drawX = p.x * scale;
            const drawY = p.y * scale;
            const drawW = (blockSize + 1) * scale;
            const drawH = (LOGICAL_H - p.y) * scale;

            if (p.type === 'grass') {
                ctx.fillStyle = '#795548';
                ctx.fillRect(drawX, drawY, drawW, drawH);
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(drawX, drawY, drawW, 8 * scale);
            } else {
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(drawX, drawY, drawW - scale, blockSize * scale);
                ctx.fillStyle = '#d35400';
                ctx.fillRect(drawX, drawY + (blockSize - 8) * scale, drawW - scale, 8 * scale);
            }
            if (p.x < -blockSize * 10) platforms.splice(i, 1);
        });

        if (platforms.length < 25) spawnMapElement();

        ctx.save(); ctx.globalAlpha = 0.3;
        clouds.forEach((c, i) => {
            c.x -= c.speed * dt;
            ctx.font = `${40 * scale}px Arial`;
            ctx.fillText('☁️', c.x * scale, c.y * scale);
            if (c.x < -100) clouds.splice(i, 1);
        });
        ctx.restore();
        if (Math.random() < 0.005) clouds.push({x:LOGICAL_W + 100, y:Math.random()*150+40, speed: 0.3});

        obstacles.forEach((o, i) => {
            o.x -= gameSpeed * dt;
            ctx.font = `${40 * scale}px Arial`;
            ctx.fillText(o.emoji, o.x * scale, o.y * scale);
            if (o.x < -100) obstacles.splice(i, 1);
        });

        items.forEach((it, i) => {
            it.x -= gameSpeed * dt;
            const hover = Math.sin(Date.now() / 200) * 10;
            ctx.font = `${35 * scale}px Arial`;
            ctx.fillText(it.emoji, it.x * scale, (it.y + hover) * scale);
            if (it.x < -100) items.splice(i, 1);
        });

        birds.forEach((b, i) => {
            b.x -= b.speed * dt;
            if (!b.hasDropped && Math.abs(b.x - b.dropX) < 50) { ctx.font = `${20 * scale}px Arial`; ctx.fillText('❗', b.x * scale, (b.y - 20) * scale); }
            ctx.font = `${35 * scale}px Arial`; ctx.fillText(b.emoji, b.x * scale, b.y * scale);
            if (!b.hasDropped && b.x < b.dropX) { drops.push({ x: b.x, y: b.y, speedY: 5.5, landed: false }); b.hasDropped = true; }
            if (b.x < -100) birds.splice(i, 1);
        });

        drops.forEach((d, i) => {
            if (!d.landed) {
                d.y += d.speedY * dt;
                platforms.forEach(p => { if (d.x > p.x && d.x < p.x + blockSize && d.y > p.y && d.y < p.y + 10) { d.landed = true; d.y = p.y; } });
                if (d.y > LOGICAL_H) drops.splice(i, 1);
            } else { d.x -= gameSpeed * dt; }
            ctx.font = `${25 * scale}px Arial`; ctx.fillText('💩', d.x * scale, d.y * scale);
            if (d.x < -100) drops.splice(i, 1);
        });
    }

    function animate(time = 0) {
        if (isGameOver) return;
        const dt = (time - lastTime) / 16.666;
        lastTime = time;
        frameCount += dt;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (frameCount % 600 < 1) spawnBird();
        updateEntities(dt);
        player.update(dt);
        checkCollisions(dt);
        requestAnimationFrame(animate);
    }

    function gameOver() {
        if (isGameOver) return;
        isGameOver = true;
        if (score > highScore) { highScore = score; hiEl.innerText = `🏆 ${highScore}`; }
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        const scale = getScale();
        ctx.font = `bold ${32 * scale}px Nunito`;
        ctx.fillText('¡FIN DE LA AVENTURA!', canvas.width/2, canvas.height/2 - 20);
        ctx.font = `${20 * scale}px Nunito`;
        ctx.fillText(`Puntos: ${score}`, canvas.width/2, canvas.height/2 + 30);
        ctx.font = `${16 * scale}px Nunito`;
        ctx.fillText('Toca para reiniciar', canvas.width/2, canvas.height/2 + 80);
    }

    function reset() {
        score = 0; isGameOver = false; isPressing = false; frameCount = 0;
        player.y = groundY - 100; player.dy = 0; player.isInvincible = false;
        starTimerEl.style.display = 'none'; scoreEl.innerText = 'Puntos: 0';
        initMap(); lastTime = performance.now(); animate(lastTime);
    }

    function start(e) {
        if (e.target.closest('#selector')) return;
        if (e.cancelable) e.preventDefault();
        if (isGameOver) { reset(); return; }
        isPressing = true;
        if (player.grounded) player.dy = player.jumpForce;
    }
    function end() { isPressing = false; }

    canvas.addEventListener('mousedown', start);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchend', end, { passive: false });

    document.querySelectorAll('.char-option').forEach(opt => {
        const select = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.char-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            player.emoji = opt.dataset.emoji;
        };
        opt.addEventListener('mousedown', select);
        opt.addEventListener('touchstart', select);
    });

    reset();
</script>
</body>
</html>
