<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Animal Jump Vertical 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #87CEEB;
            --ground: #795548;
            --accent: #f1c40f;
            --ui-bg: rgba(255, 255, 255, 0.15);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: var(--sky);
            position: relative;
        }

        #header {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 0; width: 100%;
            padding: 0 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        #title {
            font-family: 'Fredoka One', cursive;
            color: white;
            font-size: 24px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        #score-board {
            display: flex;
            gap: 20px;
            font-weight: 800;
            color: #2c3e50;
            font-size: 18px;
            margin-top: 5px;
        }

        #selector {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: var(--ui-bg);
            padding: 8px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .char-option {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .char-option.active {
            background: var(--accent);
            transform: scale(1.2);
            box-shadow: 0 0 10px white;
        }

        #game-container {
            flex: 1;
            width: 100%;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #jump-area {
            height: 25%;
            background: rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 4px solid rgba(0,0,0,0.1);
            position: relative;
            z-index: 20;
        }

        #jump-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            border: none;
            box-shadow: 0 8px 0 #b7950b, 0 15px 30px rgba(0,0,0,0.3);
            font-size: 40px;
            color: white;
            display: flex;
            align-items: center; justify-content: center;
            transition: transform 0.1s;
        }
        #jump-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b7950b, 0 10px 20px rgba(0,0,0,0.3);
        }

        #instructions {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #5d4037;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div id="title">ANIMAL JUMP</div>
        <div id="score-board">
            <span id="scoreDisplay">Puntos: 0</span>
            <span id="highScoreDisplay">🏆 0</span>
        </div>
    </div>

    <div id="selector">
        <div class="char-option active" data-emoji="🦖">🦖</div>
        <div class="char-option" data-emoji="🐰">🐰</div>
        <div class="char-option" data-emoji="🐱">🐱</div>
        <div class="char-option" data-emoji="🦄">🦄</div>
        <div class="char-option" data-emoji="🐥">🐥</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="jump-area">
        <button id="jump-btn">🦘</button>
        <div id="instructions">MANTÉN PARA SALTAR MÁS ALTO</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreDisplay');
    const hiEl = document.getElementById('highScoreDisplay');
    
    const W = 400;
    const H = 600;
    canvas.width = W;
    canvas.height = H;

    let score = 0, highScore = 0;
    let gameSpeed = 4.5;
    let isGameOver = false;
    let isJumping = false;
    let frame = 0;
    
    const groundY = H - 60;

    const player = {
        x: 60,
        y: groundY,
        width: 44,
        height: 44,
        dy: 0,
        gravity: 0.7,
        jumpForce: -11,
        emoji: '🦖',
        grounded: true,

        draw() {
            ctx.save();
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            // Girar al personaje para que mire a la derecha
            ctx.translate(this.x + this.width / 2, this.y);
            ctx.scale(-1, 1); 
            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        },

        update() {
            this.dy += this.gravity;
            if (isJumping && this.dy < 0) {
                this.dy -= 0.35; 
            }
            this.y += this.dy;

            if (this.y > groundY) {
                this.y = groundY;
                this.dy = 0;
                this.grounded = true;
            } else {
                this.grounded = false;
            }
            this.draw();
        },

        jump() {
            if (this.grounded) {
                this.dy = this.jumpForce;
                this.grounded = false;
            }
        }
    };

    let obstacles = [];
    let clouds = [];
    let birds = [];
    let drops = [];

    function spawnObstacle() {
        const icons = ['🌵', '🍄', '🪨', '🌿'];
        obstacles.push({
            x: W + 50,
            y: groundY,
            emoji: icons[Math.floor(Math.random() * icons.length)],
            passed: false
        });
    }

    function spawnCloud() {
        clouds.push({
            x: W + 100,
            y: Math.random() * 200 + 50,
            speed: Math.random() * 0.5 + 0.2,
            size: Math.random() * 20 + 30
        });
    }

    function spawnBird() {
        birds.push({
            x: W + 50,
            y: Math.random() * 150 + 100,
            speed: gameSpeed + 1.2,
            emoji: '🐦',
            dropTimer: Math.floor(Math.random() * 40 + 30)
        });
    }

    function checkCollision(ox, oy, ow, oh) {
        // Caja de colisión ajustada del jugador
        const px = player.x + 10;
        const py = player.y - player.height + 10;
        const pw = player.width - 20;
        const ph = player.height - 15;

        return px < ox + ow &&
               px + pw > ox &&
               py < oy + oh &&
               py + ph > oy;
    }

    function updateEntities() {
        // Nubes
        clouds.forEach((c, i) => {
            c.x -= c.speed;
            ctx.globalAlpha = 0.5;
            ctx.font = `${c.size}px Arial`;
            ctx.fillText('☁️', c.x, c.y);
            ctx.globalAlpha = 1;
            if (c.x < -100) clouds.splice(i, 1);
        });

        // Pájaros
        birds.forEach((b, i) => {
            b.x -= b.speed;
            ctx.font = '35px Arial';
            ctx.fillText(b.emoji, b.x, b.y);
            
            b.dropTimer--;
            if (b.dropTimer === 0) {
                drops.push({ x: b.x, y: b.y, speedY: 5 });
            }
            if (b.x < -50) birds.splice(i, 1);
        });

        // Cacas (Drops)
        drops.forEach((d, i) => {
            if (d.y < groundY) {
                d.y += d.speedY;
            } else {
                d.y = groundY;
                d.x -= gameSpeed;
            }
            ctx.font = '30px Arial';
            ctx.fillText('💩', d.x, d.y);

            if (checkCollision(d.x - 10, d.y - 25, 20, 20)) {
                gameOver();
            }
            if (d.x < -50) drops.splice(i, 1);
        });

        // Obstáculos
        obstacles.forEach((o, i) => {
            o.x -= gameSpeed;
            ctx.font = '40px Arial';
            ctx.fillText(o.emoji, o.x, o.y);

            if (checkCollision(o.x - 15, o.y - 35, 30, 35)) {
                gameOver();
            }

            if (!o.passed && o.x < player.x) {
                o.passed = true;
                score++;
                scoreEl.innerText = `Puntos: ${score}`;
                if (score % 7 === 0) gameSpeed += 0.25;
            }

            if (o.x < -50) obstacles.splice(i, 1);
        });
    }

    function drawGround() {
        ctx.fillStyle = '#795548';
        ctx.fillRect(0, groundY, W, H - groundY);
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, groundY, W, 8);
    }

    function animate() {
        if (isGameOver) return;
        frame++;
        ctx.clearRect(0, 0, W, H);

        if (frame % 150 === 0) spawnCloud();
        if (frame % 100 === 0) spawnObstacle();
        if (frame % 250 === 0) spawnBird();

        drawGround();
        updateEntities();
        player.update();

        requestAnimationFrame(animate);
    }

    function gameOver() {
        isGameOver = true;
        if (score > highScore) {
            highScore = score;
            hiEl.innerText = `🏆 ${highScore}`;
        }

        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.font = 'bold 32px Nunito';
        ctx.fillText('¡GAME OVER!', W/2, H/2 - 20);
        ctx.font = '20px Nunito';
        ctx.fillText('¡Cuidado con la 💩!', W/2, H/2 + 20);
        ctx.font = '16px Nunito';
        ctx.fillText('Toca para reintentar', W/2, H/2 + 55);
    }

    function reset() {
        score = 0;
        gameSpeed = 4.5;
        isGameOver = false;
        obstacles = [];
        clouds = [];
        birds = [];
        drops = [];
        player.y = groundY;
        player.dy = 0;
        scoreEl.innerText = 'Puntos: 0';
        animate();
    }

    const jumpBtn = document.getElementById('jump-btn');

    function handleInputStart(e) {
        if (e) {
            e.preventDefault();
            e.stopImmediatePropagation();
        }
        if (isGameOver) {
            reset();
            return;
        }
        isJumping = true;
        player.jump();
    }

    function handleInputEnd(e) {
        if (e) e.preventDefault();
        isJumping = false;
    }

    jumpBtn.addEventListener('mousedown', handleInputStart);
    window.addEventListener('mouseup', handleInputEnd);
    jumpBtn.addEventListener('touchstart', handleInputStart, { passive: false });
    jumpBtn.addEventListener('touchend', handleInputEnd, { passive: false });
    canvas.addEventListener('touchstart', handleInputStart, { passive: false });
    canvas.addEventListener('touchend', handleInputEnd, { passive: false });

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') handleInputStart();
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') handleInputEnd();
    });

    document.querySelectorAll('.char-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.char-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            player.emoji = opt.dataset.emoji;
        });
    });

    reset();
</script>
</body>
</html>
