<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Animal Jump Pro 🦖</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #87CEEB;
            --ground: #795548;
            --grass: #4caf50;
            --accent: #f1c40f;
            --ui-bg: rgba(255, 255, 255, 0.2);
            /* Safe areas para notch y barras de gestos */
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
            user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%; 
            height: 100dvh; /* Dynamic Viewport Height para móviles */
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #87CEEB, #b0e2f5);
            position: relative;
            overflow: hidden;
        }

        #header {
            position: absolute;
            top: calc(20px + var(--sat)); 
            left: 0; width: 100%;
            padding: 0 20px; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; pointer-events: none;
        }

        #title {
            font-family: 'Fredoka One', cursive;
            color: white; font-size: clamp(18px, 6vw, 24px);
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        #score-board {
            display: flex; gap: 20px;
            font-weight: 800; color: #2c3e50;
            font-size: 18px; margin-top: 5px;
        }

        #power-icons {
            position: absolute;
            top: calc(20px + var(--sat)); right: 20px;
            display: flex; flex-direction: column;
            gap: 10px; z-index: 20;
        }

        .power-indicator {
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            display: none;
            align-items: center; justify-content: center;
            font-size: 24px;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #selector {
            position: absolute; 
            top: calc(90px + var(--sat)); 
            left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px;
            background: var(--ui-bg); padding: 8px;
            border-radius: 40px; backdrop-filter: blur(10px);
            z-index: 10;
        }

        .char-option {
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border-radius: 50%;
            cursor: pointer; transition: 0.3s;
            background: rgba(255,255,255,0.15);
        }
        .char-option.active {
            background: var(--accent); 
            transform: scale(1.2);
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div id="title">ANIMAL JUMP PRO</div>
        <div id="score-board">
            <span id="scoreDisplay">Puntos: 0</span>
            <span id="highScoreDisplay">🏆 0</span>
        </div>
    </div>

    <div id="power-icons">
        <div id="icon-star" class="power-indicator">⭐</div>
        <div id="icon-feather" class="power-indicator">🪶</div>
        <div id="icon-mushroom" class="power-indicator">🍄</div>
    </div>

    <div id="selector">
        <div class="char-option active" data-emoji="🦖">🦖</div>
        <div class="char-option" data-emoji="🐰">🐰</div>
        <div class="char-option" data-emoji="🐱">🐱</div>
        <div class="char-option" data-emoji="🦄">🦄</div>
        <div class="char-option" data-emoji="🐥">🐥</div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreDisplay');
    const hiEl = document.getElementById('highScoreDisplay');
    const appContainer = document.getElementById('app');
    
    const iconStar = document.getElementById('icon-star');
    const iconFeather = document.getElementById('icon-feather');
    const iconMushroom = document.getElementById('icon-mushroom');
    
    // Altura lógica dinámica basada en el aspecto del dispositivo
    const LOGICAL_W = 400;
    let LOGICAL_H = 600; 
    let groundY = 540;

    function resize() {
        const rect = appContainer.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        
        // Recalcular el alto lógico para que coincida con la proporción de la pantalla
        LOGICAL_H = (canvas.height / canvas.width) * LOGICAL_W;
        
        // El suelo se ajusta dinámicamente al fondo (con margen para safe area)
        const safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sab')) || 0;
        groundY = LOGICAL_H - (60 + (safeBottom / (canvas.width / LOGICAL_W)));
        
        if(!isGameOver && player) {
            player.y = groundY - player.height;
        }
    }
    
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 200));
    resize();

    function getScale() { return canvas.width / LOGICAL_W; }

    let score = 0, highScore = localStorage.getItem('animalHigh') || 0;
    hiEl.innerText = `🏆 ${highScore}`;
    
    let baseSpeed = 3.6;
    let gameSpeed = baseSpeed;
    let isGameOver = false;
    let isPressing = false;
    let lastTime = 0;
    let frameCount = 0;
    
    const blockSize = 40;

    const player = {
        x: 60,
        y: 0, 
        width: 34,
        height: 34,
        dy: 0,
        gravity: 0.75,
        jumpForce: -12, 
        emoji: '🦖',
        grounded: false,
        isInvincible: false,
        invincibleTime: 0,
        isBig: false,
        isFlying: false,
        flyingTime: 0,

        draw() {
            const scale = getScale();
            ctx.save();
            const emojiSize = this.isBig ? 70 : 45;
            ctx.font = `${emojiSize * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            
            const drawX = (this.x + this.width / 2) * scale;
            const drawY = (this.y + this.height) * scale;

            ctx.translate(drawX, drawY);
            ctx.scale(-1, 1); 

            if (this.isInvincible && this.invincibleTime > 2000) {
                const hue = (Date.now() / 2) % 360;
                ctx.shadowBlur = 20 * scale;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.filter = `hue-rotate(${hue}deg) brightness(1.5)`;
            } else if (this.isInvincible) {
                ctx.globalAlpha = Math.sin(Date.now() / 40) * 0.5 + 0.5;
            }

            if (this.isFlying) {
                ctx.shadowBlur = 15 * scale;
                ctx.shadowColor = "white";
            }

            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        },

        update(dt) {
            let g = this.gravity;
            if (this.isFlying) {
                if (isPressing) this.dy = -6.5;
                g = 0.25; 
                this.flyingTime -= dt * 16.66;
                if (this.flyingTime <= 0) {
                    this.isFlying = false;
                    iconFeather.style.display = 'none';
                }
            } else {
                if (isPressing && this.dy < 0) g *= 0.45;
            }

            this.dy += g * dt;
            this.y += this.dy * dt;

            if (this.invincibleTime > 0) {
                this.invincibleTime -= dt * 16.66;
                if (this.invincibleTime <= 0) {
                    this.isInvincible = false;
                    iconStar.style.display = 'none';
                    if (!this.isFlying) gameSpeed = baseSpeed + (Math.floor(score / 500) * 0.2);
                }
            }

            if (this.y < 0) { this.y = 0; this.dy = 0; }
            if (this.y > LOGICAL_H + 50) gameOver(); 
            this.draw();
        }
    };

    let platforms = [];
    let obstacles = [];
    let items = []; 
    let clouds = [];
    let birds = [];
    let drops = [];

    function initMap() {
        platforms = []; obstacles = []; items = []; birds = []; drops = [];
        baseSpeed = 3.6; gameSpeed = baseSpeed;
        score = 0;
        for(let i=0; i<15; i++) {
            platforms.push({ x: i * blockSize, y: groundY, type: 'grass' });
        }
    }

    function spawnMapElement() {
        const lastP = platforms[platforms.length - 1];
        const nextX = lastP ? lastP.x + blockSize : 0;
        const rand = Math.random();
        
        if (rand < 0.14 && score > 200) {
            if (Math.random() < 0.75) {
                let length = Math.floor(Math.random() * 6) + 6; 
                for(let j=0; j<length; j++) {
                    platforms.push({ x: nextX + (j * blockSize), y: groundY - 140, type: 'block' });
                    if (j === Math.floor(length/2) && Math.random() < 0.25) spawnObstacle(nextX + (j * blockSize), groundY - 140);
                    if (j === 3 && Math.random() < 0.18) spawnRandomItem(nextX + (j * blockSize), groundY - 190);
                }
            }
        } else {
            platforms.push({ x: nextX, y: groundY, type: 'grass' });
            if (Math.random() < 0.08) {
                const tooClose = obstacles.some(o => Math.abs(o.x - nextX) < 260);
                if (!tooClose) spawnObstacle(nextX, groundY);
            }
            if (Math.random() < 0.035) spawnRandomItem(nextX, groundY - 60);
        }
    }

    function spawnObstacle(x, y) {
        const icons = ['🌵', '🪨', '🔥'];
        obstacles.push({ x, y, emoji: icons[Math.floor(Math.random() * icons.length)], passed: false });
    }

    function spawnRandomItem(x, y) {
        const r = Math.random();
        if (r < 0.4) items.push({ x, y, emoji: '🍄', type: 'mushroom' });
        else if (r < 0.75) items.push({ x, y, emoji: '⭐', type: 'star' });
        else items.push({ x, y, emoji: '🪶', type: 'feather' });
    }

    function spawnBird() {
        if (birds.length > 0 || score < 1000) return; 
        birds.push({ x: LOGICAL_W + 150, y: 80, speed: gameSpeed + 1.2, emoji: '🐦', hasDropped: false, dropX: player.x + 200 });
    }

    function checkCollisions(dt) {
        let onAnyPlatform = false;
        player.height = player.isBig ? 60 : 34; 

        platforms.forEach(p => {
            const px = player.x + 8;
            const pw = player.width - 16;
            if (player.dy >= 0 && px + pw > p.x && px < p.x + blockSize && player.y + player.height <= p.y + 15 && player.y + player.height + (player.dy * dt) >= p.y) {
                player.y = p.y - player.height; 
                player.dy = 0; 
                player.grounded = true; 
                onAnyPlatform = true;
            }
        });
        if (!onAnyPlatform) player.grounded = false;

        items.forEach((it, i) => {
            if (Math.abs(player.x - it.x) < 40 && Math.abs(player.y - it.y) < 65) {
                if (it.type === 'mushroom') {
                    if (!player.isBig) player.y -= 26;
                    player.isBig = true;
                    iconMushroom.style.display = 'flex';
                } else if (it.type === 'star') {
                    player.invincibleTime = 7000;
                    player.isInvincible = true;
                    iconStar.style.display = 'flex';
                    gameSpeed = baseSpeed * 1.5;
                } else if (it.type === 'feather') {
                    player.isFlying = true;
                    player.flyingTime = 6000;
                    iconFeather.style.display = 'flex';
                }
                items.splice(i, 1);
            }
        });

        const handleHit = () => {
            if (player.isInvincible) return;
            if (player.isBig) {
                player.isBig = false;
                player.isInvincible = true;
                player.invincibleTime = 2000; 
                iconMushroom.style.display = 'none';
            } else {
                gameOver();
            }
        };

        obstacles.forEach(o => {
            const px = player.x + 10;
            const py = player.y + 10;
            if (px < o.x + 30 && px + 20 > o.x && py < o.y && py + 40 > o.y - 30) handleHit();
        });

        drops.forEach(d => {
            if (Math.abs(player.x + 15 - d.x) < 25 && Math.abs(player.y + 15 - d.y) < 25) handleHit();
        });
    }

    function updateEntities(dt) {
        const scale = getScale();
        
        platforms.forEach((p, i) => {
            p.x -= gameSpeed * dt;
            const dX = p.x * scale, dY = p.y * scale, dW = (blockSize + 0.5) * scale, dH = (LOGICAL_H - p.y + 100) * scale;

            if (p.type === 'grass') {
                ctx.fillStyle = '#795548'; ctx.fillRect(dX, dY, dW, dH);
                ctx.fillStyle = '#4caf50'; ctx.fillRect(dX, dY, dW, 8 * scale);
            } else {
                ctx.fillStyle = '#8d6e63'; ctx.fillRect(dX, dY, dW, blockSize * scale);
                ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 2 * scale;
                ctx.strokeRect(dX + 2*scale, dY + 2*scale, dW - 4*scale, (blockSize-4)*scale);
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(dX + 5*scale, dY + 5*scale, 4*scale, 4*scale);
                ctx.fillRect(dX + dW - 9*scale, dY + blockSize*scale - 9*scale, 4*scale, 4*scale);
            }
            if (p.x < -blockSize * 10) platforms.splice(i, 1);
        });

        if (platforms.length < 25) spawnMapElement();

        ctx.save(); ctx.globalAlpha = 0.3;
        clouds.forEach((c, i) => {
            c.x -= c.speed * dt;
            ctx.font = `${40 * scale}px Arial`; ctx.fillText('☁️', c.x * scale, c.y * scale);
            if (c.x < -100) clouds.splice(i, 1);
        });
        ctx.restore();
        if (Math.random() < 0.005) clouds.push({x:LOGICAL_W + 100, y:Math.random()*150+40, speed: 0.3});

        obstacles.forEach((o, i) => {
            o.x -= gameSpeed * dt;
            ctx.font = `${40 * scale}px Arial`; ctx.fillText(o.emoji, o.x * scale, o.y * scale);
            if (o.x < -100) obstacles.splice(i, 1);
        });

        items.forEach((it, i) => {
            it.x -= gameSpeed * dt;
            const h = Math.sin(Date.now() / 200) * 8;
            ctx.font = `${35 * scale}px Arial`; ctx.fillText(it.emoji, it.x * scale, (it.y + h) * scale);
            if (it.x < -100) items.splice(i, 1);
        });

        birds.forEach((b, i) => {
            b.x -= b.speed * dt;
            ctx.font = `${35 * scale}px Arial`; ctx.fillText(b.emoji, b.x * scale, b.y * scale);
            if (!b.hasDropped && b.x < b.dropX) { drops.push({ x: b.x, y: b.y, speedY: 5.5, landed: false }); b.hasDropped = true; }
            if (b.x < -100) birds.splice(i, 1);
        });

        drops.forEach((d, i) => {
            if (!d.landed) {
                d.y += d.speedY * dt;
                platforms.forEach(p => { if (d.x > p.x && d.x < p.x + blockSize && d.y > p.y && d.y < p.y + 10) { d.landed = true; d.y = p.y; } });
                if (d.y > LOGICAL_H) drops.splice(i, 1);
            } else { d.x -= gameSpeed * dt; }
            ctx.font = `${25 * scale}px Arial`; ctx.fillText('💩', d.x * scale, d.y * scale);
            if (d.x < -100) drops.splice(i, 1);
        });
    }

    function animate(time = 0) {
        if (isGameOver) return;
        const dt = Math.min((time - lastTime) / 16.666, 3);
        lastTime = time;
        frameCount += dt;
        
        score += Math.floor(dt * 1);
        scoreEl.innerText = `Puntos: ${score}`;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (frameCount % 700 < 1) spawnBird();
        updateEntities(dt);
        player.update(dt);
        checkCollisions(dt);
        requestAnimationFrame(animate);
    }

    function gameOver() {
        if (isGameOver) return;
        isGameOver = true;
        if (score > highScore) { 
            highScore = score; 
            localStorage.setItem('animalHigh', highScore);
            hiEl.innerText = `🏆 ${highScore}`; 
        }
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        const s = getScale();
        ctx.font = `bold ${32 * s}px Nunito`;
        ctx.fillText('FIN DE LA PARTIDA', canvas.width/2, canvas.height/2 - 20);
        ctx.font = `${20 * s}px Nunito`;
        ctx.fillText(`Puntos: ${score}`, canvas.width/2, canvas.height/2 + 30);
        ctx.font = `${16 * s}px Nunito`;
        ctx.fillText('Toca para reiniciar', canvas.width/2, canvas.height/2 + 80);
    }

    function reset() {
        resize();
        score = 0; isGameOver = false; isPressing = false; frameCount = 0;
        player.y = groundY - 100; player.dy = 0; player.isInvincible = false;
        player.isBig = false; player.isFlying = false;
        player.height = 34;
        iconStar.style.display = 'none';
        iconFeather.style.display = 'none';
        iconMushroom.style.display = 'none';
        scoreEl.innerText = 'Puntos: 0';
        initMap(); lastTime = performance.now(); animate(lastTime);
    }

    function start(e) {
        if (e.target.closest('#selector')) return;
        if (e.cancelable) e.preventDefault();
        if (isGameOver) { reset(); return; }
        isPressing = true;
        if (player.grounded && !player.isFlying) player.dy = player.jumpForce;
    }
    function end() { isPressing = false; }

    canvas.addEventListener('mousedown', start);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchend', end, { passive: false });

    document.querySelectorAll('.char-option').forEach(opt => {
        const select = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.char-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            player.emoji = opt.dataset.emoji;
        };
        opt.addEventListener('mousedown', select);
        opt.addEventListener('touchstart', select);
    });

    reset();
</script>
</body>
</html>
