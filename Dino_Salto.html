<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Animal Jump Vertical 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #87CEEB;
            --ground: #795548;
            --accent: #f1c40f;
            --ui-bg: rgba(255, 255, 255, 0.2);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
            user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: var(--sky);
            position: relative;
            overflow: hidden;
        }

        #header {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 0; width: 100%;
            padding: 0 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        #title {
            font-family: 'Fredoka One', cursive;
            color: white;
            font-size: 24px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }

        #score-board {
            display: flex;
            gap: 20px;
            font-weight: 800;
            color: #2c3e50;
            font-size: 18px;
            margin-top: 5px;
        }

        #selector {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: var(--ui-bg);
            padding: 8px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10;
        }

        .char-option {
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.1);
        }
        .char-option.active {
            background: var(--accent);
            transform: scale(1.2);
            box-shadow: 0 0 15px white;
        }

        #game-container {
            flex: 1;
            width: 100%;
            position: relative;
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #instructions {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #5d4037;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div id="title">ANIMAL JUMP</div>
        <div id="score-board">
            <span id="scoreDisplay">Puntos: 0</span>
            <span id="highScoreDisplay">🏆 0</span>
        </div>
    </div>

    <div id="selector">
        <div class="char-option active" data-emoji="🦖">🦖</div>
        <div class="char-option" data-emoji="🐰">🐰</div>
        <div class="char-option" data-emoji="🐱">🐱</div>
        <div class="char-option" data-emoji="🦄">🦄</div>
        <div class="char-option" data-emoji="🐥">🐥</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="instructions">Pulsa en cualquier parte para saltar</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreDisplay');
    const hiEl = document.getElementById('highScoreDisplay');
    
    const W = 400;
    const H = 600;
    canvas.width = W;
    canvas.height = H;

    let score = 0, highScore = 0;
    let gameSpeed = 4.5;
    let isGameOver = false;
    let isJumping = false;
    let frame = 0;
    
    const groundY = H - 60;

    const player = {
        x: 60,
        y: groundY,
        width: 44,
        height: 44,
        dy: 0,
        gravity: 0.7,
        jumpForce: -11,
        emoji: '🦖',
        grounded: true,

        draw() {
            ctx.save();
            ctx.globalAlpha = 1.0; 
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.translate(this.x + this.width / 2, this.y);
            ctx.scale(-1, 1); 
            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        },

        update() {
            this.dy += this.gravity;
            if (isJumping && this.dy < 0) {
                this.dy -= 0.35; 
            }
            this.y += this.dy;

            if (this.y > groundY) {
                this.y = groundY;
                this.dy = 0;
                this.grounded = true;
            } else {
                this.grounded = false;
            }
            this.draw();
        },

        jump() {
            if (this.grounded) {
                this.dy = this.jumpForce;
                this.grounded = false;
            }
        }
    };

    let obstacles = [];
    let clouds = [];
    let birds = [];
    let drops = [];

    function spawnObstacle() {
        const icons = ['🌵', '🍄', '🪨', '🌿'];
        obstacles.push({
            x: W + 50,
            y: groundY,
            emoji: icons[Math.floor(Math.random() * icons.length)],
            passed: false
        });
    }

    function spawnCloud() {
        clouds.push({
            x: W + 100,
            y: Math.random() * 200 + 50,
            speed: Math.random() * 0.5 + 0.2,
            size: Math.random() * 20 + 30
        });
    }

    function spawnBird() {
        birds.push({
            x: W + 50,
            y: Math.random() * 100 + 100, 
            speed: gameSpeed + 1.5,
            emoji: '🐦',
            hasDropped: false,
            dropX: Math.random() * (W * 0.3) + (W * 0.4) 
        });
    }

    // FUNCIÓN DE COLISIÓN AJUSTADA: Ahora es más permisiva
    function checkCollision(ox, oy, ow, oh) {
        // Reducimos drásticamente la caja del jugador para que deba tocar "de verdad"
        const px = player.x + 18; // Más margen lateral
        const py = player.y - player.height + 22; // Más margen superior
        const pw = player.width - 36; // Hitbox muy estrecha
        const ph = player.height - 30; // Hitbox más baja

        return px < ox + ow &&
               px + pw > ox &&
               py < oy + oh &&
               py + ph > oy;
    }

    function updateEntities() {
        // NUBES
        ctx.save();
        ctx.globalAlpha = 0.4;
        clouds.forEach((c, i) => {
            ctx.font = `${c.size}px Arial`;
            c.x -= c.speed;
            ctx.fillText('☁️', c.x, c.y);
            if (c.x < -100) clouds.splice(i, 1);
        });
        ctx.restore();

        ctx.globalAlpha = 1.0;

        // Pájaros
        birds.forEach((b, i) => {
            b.x -= b.speed;
            ctx.font = '35px Arial';
            ctx.fillText(b.emoji, b.x, b.y);
            
            if (!b.hasDropped && b.x < b.dropX) {
                drops.push({ 
                    x: b.x, 
                    y: b.y, 
                    speedY: 6,
                    isOnGround: false
                });
                b.hasDropped = true;
            }
            if (b.x < -100) birds.splice(i, 1);
        });

        // Cacas (Drops)
        drops.forEach((d, i) => {
            if (!d.isOnGround) {
                d.y += d.speedY;
                if (d.y >= groundY) {
                    d.y = groundY;
                    d.isOnGround = true;
                }
            } else {
                d.x -= gameSpeed;
            }
            
            ctx.font = '30px Arial';
            ctx.fillText('💩', d.x, d.y);

            // Colisión con la caca (Hitbox reducida para justicia)
            if (checkCollision(d.x - 8, d.y - 15, 16, 15)) {
                gameOver();
            }
            
            if (d.x < -100) drops.splice(i, 1);
        });

        // Obstáculos
        obstacles.forEach((o, i) => {
            o.x -= gameSpeed;
            ctx.font = '40px Arial';
            ctx.fillText(o.emoji, o.x, o.y);

            // Colisión con obstáculos (Hitbox reducida para justicia)
            if (checkCollision(o.x - 10, o.y - 25, 20, 25)) {
                gameOver();
            }

            if (!o.passed && o.x < player.x) {
                o.passed = true;
                score++;
                scoreEl.innerText = `Puntos: ${score}`;
                if (score > 0 && score % 10 === 0) gameSpeed += 0.3;
            }

            if (o.x < -100) obstacles.splice(i, 1);
        });
    }

    function drawGround() {
        ctx.save();
        ctx.globalAlpha = 1.0;
        ctx.fillStyle = '#795548';
        ctx.fillRect(0, groundY, W, H - groundY);
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, groundY, W, 8);
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, groundY + 8, W, 4);
        ctx.restore();
    }

    function animate() {
        if (isGameOver) return;
        frame++;
        
        ctx.clearRect(0, 0, W, H);

        if (frame % 160 === 0) spawnCloud();
        if (frame % 120 === 0) spawnObstacle();
        if (frame % 320 === 0) spawnBird();

        drawGround();
        updateEntities();
        player.update();

        requestAnimationFrame(animate);
    }

    function gameOver() {
        if (isGameOver) return;
        isGameOver = true;
        isJumping = false;
        
        if (score > highScore) {
            highScore = score;
            hiEl.innerText = `🏆 ${highScore}`;
        }

        ctx.save();
        ctx.globalAlpha = 1.0;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.font = 'bold 36px Nunito';
        ctx.fillText('¡GAME OVER!', W/2, H/2 - 20);
        ctx.font = '22px Nunito';
        ctx.fillText('¡Cuidado con la 💩!', W/2, H/2 + 25);
        ctx.font = '16px Nunito';
        ctx.fillStyle = '#f1c40f';
        ctx.fillText('Pulsa en la pantalla para reintentar', W/2, H/2 + 65);
        ctx.restore();
    }

    function reset() {
        score = 0;
        gameSpeed = 4.5;
        isGameOver = false;
        isJumping = false;
        obstacles = [];
        clouds = [];
        birds = [];
        drops = [];
        player.y = groundY;
        player.dy = 0;
        player.grounded = true;
        scoreEl.innerText = 'Puntos: 0';
        animate();
    }

    const gameArea = document.getElementById('app');

    function handleInputStart(e) {
        if (e.target.closest('#selector')) return;
        if (e.cancelable) e.preventDefault();
        
        if (isGameOver) {
            reset();
            return;
        }
        
        isJumping = true;
        player.jump();
    }

    function handleInputEnd(e) {
        if (e && e.cancelable) e.preventDefault();
        isJumping = false;
    }

    gameArea.addEventListener('mousedown', handleInputStart);
    window.addEventListener('mouseup', handleInputEnd);
    gameArea.addEventListener('touchstart', handleInputStart, { passive: false });
    gameArea.addEventListener('touchend', handleInputEnd, { passive: false });
    gameArea.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

    document.querySelectorAll('.char-option').forEach(opt => {
        const selectChar = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.char-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            player.emoji = opt.dataset.emoji;
        };
        opt.addEventListener('mousedown', selectChar);
        opt.addEventListener('touchstart', selectChar, { passive: false });
    });

    reset();
</script>
</body>
</html>
