<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blue Sphere: Mobile Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #020617;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            width: 100vw;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #020617;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #1e1b4b, #020617);
        }
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }
        #overlay, #exit-modal {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #exit-modal {
            z-index: 200;
            display: none;
        }
        .btn-main {
            background: #2563eb;
            color: white;
            font-weight: 900;
            padding: 24px 60px;
            border-radius: 9999px;
            font-size: 2.5rem;
            border-bottom: 8px solid #1e40af;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI -->
        <div class="ui-layer">
            <div class="text-5xl font-black italic text-yellow-400 drop-shadow-md" id="score">0</div>
            <div class="text-xs opacity-60 font-bold uppercase tracking-widest">RECORD: <span id="highscore">0</span></div>
            <div class="mt-4 flex gap-2" id="jump-indicators">
                <div class="w-6 h-6 bg-blue-500 rounded-full border-2 border-white"></div>
                <div class="w-6 h-6 bg-blue-500 rounded-full border-2 border-white"></div>
                <div class="w-6 h-6 bg-blue-500 rounded-full border-2 border-white"></div>
            </div>
        </div>

        <!-- Pantalla de Inicio -->
        <div id="overlay">
            <h1 class="text-6xl font-black text-white mb-4 italic tracking-tighter text-center uppercase">Sonic <span class="text-blue-500">Sphere</span></h1>
            <p class="text-slate-400 mb-12 text-xl">Toca cualquier parte para saltar</p>
            <button id="startBtn" class="btn-main">¡JUGAR!</button>
        </div>

        <!-- Modal Anti-Salida -->
        <div id="exit-modal">
            <div class="bg-slate-900 border-2 border-blue-500 p-8 rounded-[2rem] text-center max-w-[80%]">
                <h2 class="text-3xl font-black text-white mb-2 italic">¿ESTÁS SEGURO?</h2>
                <p class="text-slate-400 mb-8 text-lg">Si sales ahora perderás tu puntuación.</p>
                <div class="flex flex-col gap-4">
                    <button id="resumeBtn" class="bg-blue-600 text-white font-bold py-5 rounded-2xl text-2xl">VOLVER AL JUEGO</button>
                    <button id="confirmExitBtn" class="text-slate-500 font-bold py-2">SÍ, SALIR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const overlay = document.getElementById('overlay');
        const exitModal = document.getElementById('exit-modal');
        const startBtn = document.getElementById('startBtn');
        const jumpIndicators = document.getElementById('jump-indicators').children;

        let gameActive = false;
        let score = 0;
        let highscore = localStorage.getItem('sonicSphereHighscore') || 0;
        highscoreEl.innerText = highscore;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const player = {
            x: 100,
            y: 0,
            radius: 22,
            dy: 0,
            rotation: 0,
            jumpCount: 0,
            maxJumps: 3,
            rampBoost: 0
        };

        let platforms = [];
        let ramps = [];
        let particles = [];
        const gravity = 0.6;
        const jumpForce = -13;
        let gameSpeed = 7;

        // --- PREVENCIÓN DE SALIDA SAMSUNG S24 ---
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function() {
            if (gameActive) {
                gameActive = false;
                exitModal.style.display = 'flex';
                window.history.pushState(null, null, window.location.href);
            }
        };

        document.getElementById('resumeBtn').onclick = () => {
            exitModal.style.display = 'none';
            gameActive = true;
        };

        document.getElementById('confirmExitBtn').onclick = () => {
            window.location.reload();
        };

        // --- LÓGICA DE JUEGO ---

        function createParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1.0,
                    color
                });
            }
        }

        function jump() {
            if (!gameActive) return;
            if (player.jumpCount < player.maxJumps) {
                player.dy = jumpForce;
                player.jumpCount++;
                for(let i=0; i<3; i++) {
                    jumpIndicators[i].style.opacity = i < (player.maxJumps - player.jumpCount) ? "1" : "0.2";
                }
                createParticles(player.x, player.y, '#60a5fa', 8);
            }
        }

        function spawn() {
            const groundY = canvas.height * 0.8;
            if (platforms.length === 0 || platforms[platforms.length-1].x < canvas.width + 500) {
                const lastX = platforms.length > 0 ? platforms[platforms.length-1].x + platforms[platforms.length-1].w : 0;
                const gap = platforms.length === 0 ? 0 : (Math.random() < 0.3 ? 160 : 0);
                const w = 1200 + Math.random() * 800;
                
                platforms.push({ x: lastX + gap, y: groundY, w: w, h: 100 });
                
                if (platforms.length > 1 && Math.random() < 0.5) {
                    ramps.push({ x: lastX + gap + 400, y: groundY, w: 100, h: 60, passed: false });
                }
            }
        }

        function resetGame() {
            // Se elimina requestFullscreen para evitar el error de "Permissions Policy"
            score = 0;
            scoreEl.innerText = "0";
            player.y = canvas.height / 2;
            player.dy = 0;
            player.jumpCount = 0;
            player.rampBoost = 0;
            platforms = [];
            ramps = [];
            particles = [];
            gameActive = true;
            overlay.style.display = 'none';
            spawn();
        }

        function update() {
            if (!gameActive) return;

            if (player.rampBoost > 0) player.rampBoost *= 0.98;
            player.dy += gravity;
            player.y += player.dy;
            player.rotation += (gameSpeed + player.rampBoost) * 0.1;

            let onGround = false;
            platforms.forEach(p => {
                p.x -= (gameSpeed + player.rampBoost);
                if (player.x > p.x && player.x < p.x + p.w && 
                    player.y + player.radius > p.y && player.y + player.radius < p.y + 50 && 
                    player.dy >= 0) {
                    player.y = p.y - player.radius;
                    player.dy = 0;
                    player.jumpCount = 0;
                    onGround = true;
                }
            });

            if (onGround) {
                for(let i=0; i<3; i++) jumpIndicators[i].style.opacity = "1";
            }

            ramps.forEach(r => {
                r.x -= (gameSpeed + player.rampBoost);
                if (!r.passed && player.x > r.x && player.x < r.x + r.w && 
                    player.y + player.radius > r.y - r.h && player.y < r.y) {
                    player.dy = -18;
                    player.rampBoost = 15;
                    player.jumpCount = 1;
                    r.passed = true;
                    score += 100;
                    scoreEl.innerText = score;
                    createParticles(player.x, player.y, '#fbbf24', 20);
                }
            });

            platforms = platforms.filter(p => p.x + p.w > -100);
            ramps = ramps.filter(r => r.x + r.w > -100);

            particles.forEach((p, i) => {
                p.x += p.vx - (gameSpeed * 0.5);
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });

            if (player.y > canvas.height + 100) {
                gameActive = false;
                overlay.style.display = 'flex';
                if (score > highscore) {
                    highscore = score;
                    localStorage.setItem('sonicSphereHighscore', highscore);
                    highscoreEl.innerText = highscore;
                }
            }

            spawn();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#1e293b';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 4;
                ctx.strokeRect(p.x, p.y, p.w, 1);
            });

            ramps.forEach(r => {
                ctx.fillStyle = '#2563eb';
                ctx.beginPath();
                ctx.moveTo(r.x, r.y);
                ctx.lineTo(r.x + r.w, r.y);
                ctx.lineTo(r.x + r.w, r.y - r.h);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#93c5fd'; ctx.stroke();
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.rotation);
            const g = ctx.createRadialGradient(-5, -5, 2, 0, 0, player.radius);
            g.addColorStop(0, '#60a5fa'); g.addColorStop(1, '#1d4ed8');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        // SALTO EN CUALQUIER PARTE DE LA VENTANA
        window.addEventListener('touchstart', (e) => {
            // Ignorar el toque si es sobre el botón de inicio para evitar conflictos
            if (e.target === startBtn) return; 
            
            if (gameActive) {
                e.preventDefault();
                jump();
            }
        }, { passive: false });

        // Inicio de juego robusto
        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetGame();
        });

        // Loop de dibujo principal
        draw();
    </script>
</body>
</html>
