<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blue Sphere: Platformer Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #020617;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            width: 100vw;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #020617;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #0f172a, #020617);
        }
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .btn-main {
            background: #2563eb;
            color: white;
            font-weight: 900;
            padding: 20px 50px;
            border-radius: 9999px;
            font-size: 2rem;
            border-bottom: 6px solid #1e40af;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s;
        }
        .btn-main:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
        .active-power-badge {
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-layer">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🪙</span>
                <div class="text-5xl font-black italic text-yellow-400 drop-shadow-md" id="score">0</div>
            </div>
            <div class="text-xs opacity-60 font-bold uppercase tracking-widest mt-1">RECORD: <span id="highscore">0</span></div>
            
            <!-- Indicadores de Salto -->
            <div class="mt-4 flex gap-2" id="jump-indicators">
                <div class="w-5 h-5 bg-blue-500 rounded-full border-2 border-white"></div>
                <div class="w-5 h-5 bg-blue-500 rounded-full border-2 border-white"></div>
                <div class="w-5 h-5 bg-blue-500 rounded-full border-2 border-white"></div>
            </div>

            <!-- Badges de Poder Activo -->
            <div id="active-powers" class="flex flex-col gap-2 mt-4"></div>
        </div>

        <div id="overlay">
            <h1 class="text-5xl font-black text-white mb-2 italic tracking-tighter text-center uppercase">Sonic <span class="text-blue-500">Sphere</span></h1>
            <p class="text-slate-400 mb-8 text-lg text-center px-6">Salta sobre plataformas estilo Mario.<br>¡Cuidado con las puyas!</p>
            <button id="startBtn" class="btn-main">¡JUGAR!</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const jumpIndicators = document.getElementById('jump-indicators').children;
        const activePowersContainer = document.getElementById('active-powers');

        let gameActive = false;
        let score = 0;
        let highscore = localStorage.getItem('sonicSphereCoins') || 0;
        highscoreEl.innerText = highscore;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Configuración de Poderes
        const POWER_TYPES = {
            TURBO: { id: 'turbo', icon: '⚡', color: '#fbbf24', duration: 7000 },
            SHIELD: { id: 'shield', icon: '🛡️', color: '#10b981', duration: 8000 },
            MAGNET: { id: 'magnet', icon: '🧲', color: '#ec4899', duration: 10000 }
        };

        const player = {
            x: 150,
            y: 0,
            radius: 20,
            dy: 0,
            rotation: 0,
            jumpCount: 0,
            maxJumps: 3,
            powers: {}, // Objeto para guardar tiempos de poderes activos
            baseJumpForce: -13
        };

        let platforms = [];
        let collectibles = []; 
        let obstacles = []; 
        let particles = [];
        
        const gravity = 0.65;
        let baseSpeed = 8; // Dificultad aumentada

        function jump() {
            if (!gameActive) return;
            if (player.jumpCount < player.maxJumps) {
                const boost = player.powers.turbo ? 1.2 : 1.0;
                player.dy = player.baseJumpForce * boost;
                player.jumpCount++;
                updateJumpUI();
                createParticles(player.x, player.y, player.powers.turbo ? '#fbbf24' : '#60a5fa', 12);
            }
        }

        function updateJumpUI() {
            for(let i=0; i<3; i++) {
                jumpIndicators[i].style.opacity = i < (player.maxJumps - player.jumpCount) ? "1" : "0.2";
            }
        }

        function createParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1.0,
                    color
                });
            }
        }

        function spawn() {
            const groundLevel = canvas.height * 0.85;
            
            if (platforms.length === 0 || platforms[platforms.length-1].x < canvas.width + 300) {
                const lastP = platforms[platforms.length-1];
                const startX = lastP ? lastP.x + lastP.w : 0;
                
                // Gap estilo Mario (huecos entre plataformas)
                const gap = lastP ? (Math.random() < 0.5 ? 140 : 80) : 0;
                const width = 400 + Math.random() * 800;
                
                // Variación de altura estilo Mario
                let targetY = lastP ? lastP.y + (Math.random() * 160 - 80) : groundLevel;
                // Mantener dentro de límites legibles
                targetY = Math.max(canvas.height * 0.4, Math.min(targetY, groundLevel));

                const newP = { x: startX + gap, y: targetY, w: width, h: 400 };
                platforms.push(newP);

                // Spawneo de items y peligros sobre la plataforma
                if (width > 200) {
                    const step = width / 3;
                    for (let i = 50; i < width - 50; i += step) {
                        const rand = Math.random();
                        const itemX = newP.x + i;
                        const itemY = newP.y - 40;

                        if (rand < 0.15) {
                            // Poder aleatorio
                            const pKeys = Object.keys(POWER_TYPES);
                            const pType = POWER_TYPES[pKeys[Math.floor(Math.random() * pKeys.length)]];
                            collectibles.push({ x: itemX, y: itemY - 40, type: 'power', pData: pType, radius: 22 });
                        } else if (rand < 0.6) {
                            // Monedas
                            collectibles.push({ x: itemX, y: itemY - 20, type: 'coin', radius: 14 });
                        } else if (rand < 0.8) {
                            // Puya
                            obstacles.push({ x: itemX, y: newP.y, w: 40, h: 40 });
                        }
                    }
                }
            }
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = "0";
            player.y = canvas.height / 2;
            player.dy = 0;
            player.jumpCount = 0;
            player.powers = {};
            platforms = [];
            collectibles = [];
            obstacles = [];
            particles = [];
            gameActive = true;
            overlay.style.display = 'none';
            activePowersContainer.innerHTML = '';
            
            // Primera plataforma segura
            platforms.push({ x: 0, y: canvas.height * 0.75, w: 800, h: 400 });
            updateJumpUI();
        }

        function update() {
            if (!gameActive) return;

            // Velocidad dinámica (Turbo afecta al desplazamiento)
            const currentSpeed = baseSpeed * (player.powers.turbo ? 1.5 : 1);
            
            player.dy += gravity;
            player.y += player.dy;
            player.rotation += currentSpeed * 0.12;

            // Lógica de Poderes Activos
            activePowersContainer.innerHTML = '';
            for (let key in player.powers) {
                player.powers[key] -= 16;
                if (player.powers[key] <= 0) {
                    delete player.powers[key];
                } else {
                    const p = POWER_TYPES[key.toUpperCase()];
                    const badge = document.createElement('div');
                    badge.className = 'active-power-badge';
                    badge.style.color = p.color;
                    badge.innerHTML = `<span>${p.icon}</span> <div class="w-16 h-1 bg-white/20"><div class="h-full" style="background:${p.color}; width:${(player.powers[key]/p.duration)*100}%"></div></div>`;
                    activePowersContainer.appendChild(badge);
                }
            }

            // Colisión Plataformas (Estilo Mario: Solo colisiona desde arriba)
            let onGround = false;
            platforms.forEach(p => {
                p.x -= currentSpeed;
                
                if (player.dy >= 0 && 
                    player.x + player.radius*0.7 > p.x && 
                    player.x - player.radius*0.7 < p.x + p.w &&
                    player.y + player.radius >= p.y && 
                    player.y + player.radius <= p.y + player.dy + 10) {
                    
                    player.y = p.y - player.radius;
                    player.dy = 0;
                    if (player.jumpCount > 0) {
                        player.jumpCount = 0;
                        updateJumpUI();
                    }
                    onGround = true;
                }
            });

            // Colisión Items
            collectibles.forEach((c, idx) => {
                c.x -= currentSpeed;
                
                // Efecto Imán
                if (player.powers.magnet && c.type === 'coin') {
                    const dx = player.x - c.x;
                    const dy = player.y - c.y;
                    c.x += dx * 0.15;
                    c.y += dy * 0.15;
                }

                const dist = Math.hypot(player.x - c.x, player.y - c.y);
                if (dist < player.radius + c.radius) {
                    if (c.type === 'coin') {
                        score++;
                        scoreEl.innerText = score;
                        createParticles(c.x, c.y, '#facc15', 6);
                    } else {
                        // Activar Superpoder
                        player.powers[c.pData.id] = c.pData.duration;
                        createParticles(c.x, c.y, c.pData.color, 20);
                    }
                    collectibles.splice(idx, 1);
                }
            });

            // Colisión Obstáculos
            obstacles.forEach(o => {
                o.x -= currentSpeed;
                const distX = Math.abs(player.x - (o.x + o.w/2));
                const distY = Math.abs(player.y - (o.y - o.h/2));
                
                if (distX < player.radius * 0.8 && distY < player.radius * 0.8) {
                    if (player.powers.shield) {
                        delete player.powers.shield;
                        createParticles(o.x, o.y, '#ffffff', 30);
                        // Eliminar la puya para no chocar dos veces
                        o.x = -1000;
                    } else {
                        gameOver();
                    }
                }
            });

            // Caída al vacío
            if (player.y > canvas.height + 50) gameOver();

            // Limpieza
            platforms = platforms.filter(p => p.x + p.w > -100);
            collectibles = collectibles.filter(c => c.x > -50);
            obstacles = obstacles.filter(o => o.x > -50);

            particles.forEach((p, i) => {
                p.x += p.vx - (currentSpeed * 0.4);
                p.y += p.vy;
                p.life -= 0.025;
                if (p.life <= 0) particles.splice(i, 1);
            });

            spawn();
        }

        function gameOver() {
            gameActive = false;
            overlay.style.display = 'flex';
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('sonicSphereCoins', highscore);
                highscoreEl.innerText = highscore;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Plataformas (Diseño de bloques)
            platforms.forEach(p => {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                // Borde neón
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3;
                ctx.strokeRect(p.x, p.y, p.w, 5);
                // Detalle decorativo interno
                ctx.fillStyle = '#334155';
                ctx.fillRect(p.x + 10, p.y + 15, p.w - 20, 2);
            });

            // Dibujar Monedas y Poderes
            collectibles.forEach(c => {
                if (c.type === 'coin') {
                    ctx.fillStyle = '#facc15';
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#eab308'; ctx.lineWidth = 2; ctx.stroke();
                } else {
                    // Icono de poder en el canvas
                    ctx.fillStyle = c.pData.color;
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(c.pData.icon, c.x, c.y + 7);
                }
            });

            // Dibujar Puyas (Triángulos rojos)
            ctx.fillStyle = '#ef4444';
            obstacles.forEach(o => {
                ctx.beginPath();
                ctx.moveTo(o.x, o.y);
                ctx.lineTo(o.x + o.w/2, o.y - o.h);
                ctx.lineTo(o.x + o.w, o.y);
                ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 1; ctx.stroke();
            });

            // Dibujar Partículas
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Dibujar Jugador
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.rotation);
            
            // Efecto visual de Escudo
            if (player.powers.shield) {
                ctx.beginPath();
                ctx.arc(0, 0, player.radius + 10, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(16, 185, 129, 0.6)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            const g = ctx.createRadialGradient(-5, -5, 2, 0, 0, player.radius);
            g.addColorStop(0, player.powers.turbo ? '#fde047' : '#60a5fa'); 
            g.addColorStop(1, player.powers.turbo ? '#b45309' : '#1d4ed8');
            
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        // CONTROL TÁCTIL
        window.addEventListener('touchstart', (e) => {
            if (e.target === startBtn) return;
            if (gameActive) {
                e.preventDefault();
                jump();
            }
        }, { passive: false });

        startBtn.addEventListener('click', resetGame);
        draw();
    </script>
</body>
</html>
