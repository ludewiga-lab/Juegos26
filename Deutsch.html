<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deutsch Lernen - Kindergarten Edition</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --primary: #ff9800;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --idle: #3498db;
            --candy: #e84393;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100dvh; 
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Barra de progreso de recompensas */
        .progress-container {
            width: 100%;
            max-width: 500px;
            background: #e0e0e0;
            border-radius: 20px;
            height: 15px;
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff9800, #f1c40f);
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-candy {
            position: absolute;
            right: 5px;
            top: -2px;
            font-size: 14px;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            max-width: 500px;
        }

        .level-menu { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px; 
            margin-bottom: 15px; 
            width: 100%;
        }

        .btn-level {
            padding: 8px 12px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            background: #bdc3c7;
            transition: 0.3s;
        }
        .btn-level.active { background: var(--primary); transform: scale(1.05); box-shadow: 0 4px 10px rgba(255,152,0,0.4); }
        .btn-repaso { background: #9b59b6; }
        .btn-repaso.active { background: #8e44ad; box-shadow: 0 4px 10px rgba(142,68,173,0.4); }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            gap: 10px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            background: white;
            padding: 5px 10px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            gap: 5px;
            font-size: 1rem;
            font-weight: bold;
        }

        .speed-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 0 5px;
        }
        .speed-btn:active { transform: scale(0.8); }

        .stats {
            display: flex;
            gap: 15px;
            background: white;
            padding: 8px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 1.1rem;
        }

        .game-box {
            background: var(--card);
            padding: 15px;
            border-radius: 30px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.05);
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            max-height: 60vh;
            overflow-y: auto;
        }

        .btn-speak {
            background: var(--primary);
            border: none;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #e68a00;
            margin-bottom: 20px;
            flex-shrink: 0;
            transition: transform 0.1s;
        }

        .btn-speak:active { transform: translateY(4px); box-shadow: 0 2px 0 #e68a00; }

        .options-grid { 
            display: grid; 
            gap: 10px; 
            width: 100%; 
        }

        .btn-option {
            background: var(--idle);
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #2980b9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            white-space: normal;
            line-height: 1.2;
        }

        .btn-option.correct { background: var(--correct) !important; box-shadow: 0 5px 0 #27ae60 !important; }
        .btn-option.wrong { background: var(--wrong) !important; box-shadow: 0 5px 0 #c0392b !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        #canvas-confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* Celebración de 30 palabras */
        .mega-celebration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .mega-celebration.active {
            opacity: 1;
            pointer-events: all;
        }
        .candy-icon {
            font-size: 8rem;
            animation: bounce 1s infinite alternate;
        }
        .celebration-text {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            text-shadow: 0 4px 10px rgba(255,255,255,0.5);
        }

        @keyframes bounce {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }
    </style>
</head>

        let currentLevel = 1;
        let wordQueue = [];
        let currentWord = {};
        let stats = { streak: 0, good: 0, bad: 0 };
        let milestoneProgress = 0; // Progreso hacia los 30
        let isLocked = false;
        let speechRate = 0.75; // Velocidad de voz por defecto
        
        // Banco de palabras para repasar
        let reviewWords = [];
        
        const canvas = document.getElementById("canvas-confetti");
        const ctx = canvas.getContext("2d");
        let particles = [];
        let animId;

        function changeSpeed(delta) {
            speechRate += delta;
            if(speechRate < 0.25) speechRate = 0.25;
            if(speechRate > 1.5) speechRate = 1.5;
            document.getElementById('speed-display').innerText = speechRate.toFixed(2) + "x";
            
            // Cancela cualquier audio reproduciéndose para evitar acumulaciones
            window.speechSynthesis.cancel();
            // Eliminada la llamada a playCurrentWord() para que NO repita automáticamente.
        }

        function changeLevel(lvl, btn) {
            if (lvl === 'repaso' && reviewWords.length === 0) {
                const ut = new SpeechSynthesisUtterance("No hay palabras para repasar. ¡Todo perfecto!");
                ut.lang = 'es-ES';
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(ut);
                alert("¡No tienes errores guardados! Sigue jugando en otros niveles.");
                return;
            }

            currentLevel = lvl;
            document.querySelectorAll('.btn-level').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initLevel();
        }

        function initLevel() {
            if (currentLevel === 'repaso') {
                wordQueue = [...reviewWords].sort(() => Math.random() - 0.5);
            } else if (currentLevel === 'aleatorio') {
                wordQueue = [...allLevels[1], ...allLevels[2], ...allLevels[3], ...allLevels[5], ...allLevels[6]].sort(() => Math.random() - 0.5);
            } else {
                wordQueue = [...allLevels[currentLevel]].sort(() => Math.random() - 0.5);
            }
            nextQuestion();
        }

        function nextQuestion() {
            isLocked = false;
            
            if (wordQueue.length === 0) {
                if (currentLevel === 'repaso') {
                    // Si vació el repaso, volver al nivel 1
                    document.querySelector('.btn-level').click(); // Clic en el primer botón (Nivel 1)
                    return;
                }
                if (currentLevel === 'aleatorio') {
                    wordQueue = [...allLevels[1], ...allLevels[2], ...allLevels[3], ...allLevels[5], ...allLevels[6]].sort(() => Math.random() - 0.5);
                } else {
                    wordQueue = [...allLevels[currentLevel]].sort(() => Math.random() - 0.5);
                }
            }
            
            currentWord = wordQueue.pop();
            let choices = [];

            // Si es una frase (ya sea en nivel 4 o en el repaso), mostramos solo 1 opción.
            if (currentWord.isPhrase) {
                choices = [currentWord];
            } else {
                let distractors = [];
                let sourceForDistractors = [];

                if (currentLevel === 'aleatorio') {
                    // En modo aleatorio, los distractores pueden ser de todas las categorías (excepto frases)
                    sourceForDistractors = [...allLevels[1], ...allLevels[2], ...allLevels[3], ...allLevels[5], ...allLevels[6]];
                } else if (currentLevel === 'repaso') {
                    // Para repaso, buscar de qué nivel es la palabra para mantener la coherencia
                    let levelOfWord = Object.keys(allLevels).find(key => allLevels[key].some(w => w.de === currentWord.de));
                    if (levelOfWord) {
                        sourceForDistractors = [...allLevels[levelOfWord]];
                    } else {
                        sourceForDistractors = [...allLevels[1], ...allLevels[2], ...allLevels[3]];
                    }
                } else {
                    // STRICT CATEGORY: Solo objetos de la misma categoría actual
                    sourceForDistractors = [...allLevels[currentLevel]];
                }

                let allAvailable = sourceForDistractors.filter(w => w.de !== currentWord.de && !w.isPhrase);
                allAvailable.sort(() => Math.random() - 0.5);
                distractors = allAvailable.slice(0, 2);
                choices = [currentWord, ...distractors].sort(() => Math.random() - 0.5);
            }

            const container = document.getElementById('options');
            container.innerHTML = '';
            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn-option';
                
                // Si la opción está marcada para mostrar solo ícono (Números y ABC)
                if (c.onlyIcon) {
                    b.innerHTML = `<span>${c.icon}</span>`;
                    b.style.fontSize = "2rem"; // Hacer el número/letra más grande y destacado
                } else {
                    b.innerHTML = `<span>${c.icon}</span> <span>${c.es}</span>`;
                }
                
                b.onclick = (e) => check(c, e.currentTarget);
                container.appendChild(b);
            });
            playCurrentWord();
        }

        function playCurrentWord() {
            window.speechSynthesis.cancel(); // Detiene audios previos
            const ut = new SpeechSynthesisUtterance(currentWord.de);
            ut.lang = 'de-DE';
            ut.rate = speechRate; 
            window.speechSynthesis.speak(ut);
        }

        function triggerMegaCelebration() {
            const overlay = document.getElementById('mega-celebration');
            overlay.classList.add('active');
            
            // Mega Confeti en 3 ráfagas
            startConfetti();
            setTimeout(startConfetti, 500);
            setTimeout(startConfetti, 1000);

            // Audio de celebración
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance("Fantastisch! Du bist ein Champion!");
            v.lang = 'de-DE';
            window.speechSynthesis.speak(v);

            setTimeout(() => {
                overlay.classList.remove('active');
                stopConfetti();
                nextQuestion();
            }, 4000);
        }

        function updateProgressBar() {
            const bar = document.getElementById('progress-bar');
            const percentage = (milestoneProgress / 30) * 100;
            bar.style.width = percentage + "%";
        }

        function handleCorrectAnswer(element) {
            isLocked = true;
            stats.good++; stats.streak++;
            milestoneProgress++;
            updateStats();
            updateProgressBar();
            
            element.classList.add('correct');

            // Si estaba en repaso, la eliminamos de la lista porque ya la aprendió
            if (currentLevel === 'repaso') {
                reviewWords = reviewWords.filter(w => w.de !== currentWord.de);
            }

            // Comprobar si llegó a la meta de 30
            if (milestoneProgress >= 30) {
                milestoneProgress = 0; // Reiniciar meta
                updateProgressBar();
                triggerMegaCelebration();
                return; // nextQuestion se llama dentro de triggerMegaCelebration
            }

            // Comportamiento especial para frases (Reproducir en español)
            if (currentWord.isPhrase) {
                const vEs = new SpeechSynthesisUtterance(currentWord.es);
                vEs.lang = 'es-ES';
                window.speechSynthesis.speak(vEs);
                startConfetti();
                vEs.onend = () => { setTimeout(() => { stopConfetti(); nextQuestion(); }, 500); };
                setTimeout(() => { stopConfetti(); nextQuestion(); }, 2500); // Respaldo
                return;
            }

            // Comportamiento normal (Palabras)
            const v = new SpeechSynthesisUtterance("Richtig!"); 
            v.lang = 'de-DE'; 
            window.speechSynthesis.speak(v);
            startConfetti();
            setTimeout(() => { stopConfetti(); nextQuestion(); }, 1500);
        }

        function handleWrongAnswer(element) {
            stats.bad++; stats.streak = 0;
            updateStats();
            element.classList.add('wrong');
            
            // Guardar en la lista de Repaso si no existe ya
            if (!reviewWords.some(w => w.de === currentWord.de)) {
                reviewWords.push(currentWord);
            }

            const v = new SpeechSynthesisUtterance("Nein"); 
            v.lang = 'de-DE'; 
            window.speechSynthesis.speak(v);
            setTimeout(() => element.classList.remove('wrong'), 500);
        }

        function check(selected, element) {
            if(isLocked) return;
            
            if(selected.de === currentWord.de) {
                handleCorrectAnswer(element);
            } else {
                handleWrongAnswer(element);
            }
        }

        function updateStats() {
            document.getElementById('streak').innerText = stats.streak;
            document.getElementById('good').innerText = stats.good;
            document.getElementById('bad').innerText = stats.bad;
        }

        function startConfetti() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array.from({length: 50}, () => ({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random()-0.5)*20, vy: (Math.random()-0.8)*20,
                color: `hsl(${Math.random()*360}, 100%, 50%)`, size: 8, opacity: 1
            }));
            animate();
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let activeParticles = 0;
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.opacity -= 0.015;
                if(p.opacity > 0) activeParticles++;
                ctx.globalAlpha = Math.max(0, p.opacity);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            if(activeParticles > 0) {
                animId = requestAnimationFrame(animate);
            } else {
                ctx.clearRect(0,0,canvas.width,canvas.height);
            }
        }

        function stopConfetti() { cancelAnimationFrame(animId); ctx.clearRect(0,0,canvas.width,canvas.height); }

        window.speechSynthesis.onvoiceschanged = initLevel;
        if(window.speechSynthesis.getVoices().length > 0) initLevel();
    </script>
</body>
